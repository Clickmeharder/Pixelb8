<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELB8 | Auth Bridge</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        /* CRT Effect Overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .status-container {
            border: 1px solid #00ff41;
            padding: 30px;
            background: rgba(0, 20, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            z-index: 3;
        }
        .loader {
            border: 2px solid #1a1a1a;
            border-top: 2px solid #00ff41;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glitch { font-size: 12px; letter-spacing: 3px; animation: flicker 0.1s infinite; }
        @keyframes flicker { 0% { opacity: 0.9; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="loader"></div>
        <div id="status" class="glitch">INITIALIZING HANDSHAKE...</div>
        <div id="sub-status" style="font-size: 10px; margin-top: 15px; color: #888;">GITHUB GATEWAY v1.0</div>
    </div>

    <script type="module">
        // Import exact versions used in your app
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, signInWithPopup, GithubAuthProvider } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        // Your specific Pixelb8 Project Config
        const firebaseConfig = {
            apiKey: "AIzaSyBiOOomMnXO0Ps7ak0kkPJwRCgV8ThWBb0",
            authDomain: "pixelb8lol.firebaseapp.com",
            projectId: "pixelb8lol",
            storageBucket: "pixelb8lol.appspot.com",
            messagingSenderId: "373700849652",
            appId: "1:373700849652:web:c3e59f1653dd224ba153a1",
            measurementId: "G-5EGV2VNMX3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const statusEl = document.getElementById('status');

        async function performAuth() {
            try {
                statusEl.innerText = "WAITING FOR GITHUB...";
                const provider = new GithubAuthProvider();
                
                // Triggers the real-browser popup (Safe from CSP blocks)
                const result = await signInWithPopup(auth, provider);
                
                // Get the refresh token to pass back to the Electron desktop environment
                const token = result.user.refreshToken;
                
                statusEl.innerText = "HANDSHAKE SUCCESSFUL.";
                
                // Protocol redirect to S.U.S.P.E.C.T.
                setTimeout(() => {
                    statusEl.innerText = "RE-LINKING TO DESKTOP...";
                    window.location.href = `pixelb8://auth/${token}`;
                }, 1000);

                // Auto-close tab after handshake
                setTimeout(() => {
                    statusEl.innerText = "SAFE TO CLOSE WINDOW.";
                }, 4000);

            } catch (error) {
                console.error("Auth Bridge Error:", error);
                statusEl.style.color = "#ff4141";
                statusEl.innerText = "ERROR: " + error.code;
            }
        }

        // Execute auth when page loads
        window.onload = performAuth;
    </script>
</body>
</html>
