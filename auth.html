<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELB8 | Auth Bridge</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        /* CRT Effect Overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .status-container {
            border: 1px solid #00ff41;
            padding: 30px;
            background: rgba(0, 20, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            z-index: 3;
            max-width: 80%;
        }
        .loader {
            border: 2px solid #1a1a1a;
            border-top: 2px solid #00ff41;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glitch { font-size: 12px; letter-spacing: 3px; animation: flicker 0.1s infinite; text-transform: uppercase; }
        @keyframes flicker { 0% { opacity: 0.9; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="loader"></div>
        <div id="status" class="glitch">INITIALIZING HANDSHAKE...</div>
        <div id="sub-status" style="font-size: 10px; margin-top: 15px; color: #888;">GITHUB GATEWAY v1.1 - REDIRECT MODE</div>
    </div>

<script type="module">
  // --- YOUR EXISTING IMPORTS ---
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
  import { getAuth, signInWithPopup, GithubAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

  // --- YOUR CONFIG ---
  const firebaseConfig = {
    apiKey: "AIzaSyBiOOomMnXO0Ps7ak0kkPJwRCgV8ThWBb0",
    authDomain: "pixelb8lol.firebaseapp.com",
    projectId: "pixelb8lol",
    storageBucket: "pixelb8lol.appspot.com",
    messagingSenderId: "373700849652",
    appId: "1:373700849652:web:c3e59f1653dd224ba153a1",
    measurementId: "G-5EGV2VNMX3"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GithubAuthProvider();
  const statusEl = document.getElementById('status');

  // --- THE MODIFIED LISTENER ---
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      // === USER IS LOGGED IN ===
      statusEl.innerText = "AUTHENTICATED: " + (user.displayName || "Colonist");
      
      try {
        // 1. Get the token needed for the Desktop Handshake
        // We use getIdToken(true) to force a fresh token for the app
        const token = await user.getIdToken(true);
        
        statusEl.innerText = "SHOUTING TO DESKTOP...";

        // 2. Perform the Deep Link Shout
        // This triggers handleDeepLink(url) in your engineroom.js
        setTimeout(() => {
          window.location.href = `pixelb8://auth/${token}`;
        }, 1500);

        // 3. UI Cleanup
        setTimeout(() => {
          statusEl.innerText = "HANDSHAKE COMPLETE. YOU MAY CLOSE THIS TAB.";
        }, 4000);

      } catch (e) {
        console.error("Bridge Error:", e);
        statusEl.innerText = "BRIDGE ERROR: " + e.message;
      }
    } else {
      // === USER IS LOGGED OUT ===
      statusEl.innerText = "INITIALIZING GITHUB GATEWAY...";
      
      // Since this is the bridge page, we auto-trigger the login
      // We use popup here because it's a real browser window
      signInWithPopup(auth, provider).catch((error) => {
        console.error("Popup blocked or closed:", error);
        statusEl.innerText = "CLICK 'LOGIN' TO START HANDSHAKE";
        
        // Show your existing login button if the auto-popup fails
        const loginBtn = document.getElementById('loginbutt');
        if(loginBtn) loginBtn.classList.remove('hidden');
      });
    }
  });

  // Keep your existing event listeners for the manual buttons just in case
  document.getElementById('loginbutt').addEventListener('click', () => {
    signInWithPopup(auth, provider);
  });
</script>
</body>
</html>
