<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelb8 OMEGA | Roleplay Core</title>
    <style>
        :root { 
            --p8-accent: #f472b6; /* Pink accent for RP edition */
            --p8-bg: #09090b; 
            --bubble-ai: #18181b; 
            --rp-glow: linear-gradient(45deg, #ff00cc, #3333ff, #00d4ff, #ff00cc);
        }
        
        body { background: var(--p8-bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #stage { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; align-items: center; scroll-behavior: smooth; }
        .bubble { max-width: 600px; width: 100%; padding: 20px; border-radius: 12px; line-height: 1.6; animation: fadeIn 0.4s ease; background: var(--bubble-ai); border: 1px solid #27272a; box-sizing: border-box; }
        .user-input-zone { width: 100%; max-width: 600px; display: flex; gap: 10px; padding: 20px; background: #000; border-top: 1px solid #27272a; margin: 0 auto; }
        
        .model-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin-top: 20px; }
        .model-card { position: relative; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; gap: 8px; }

        /* Roleplay Tier Glow */
        .rp-tier { border: none; background: rgba(0, 0, 0, 0.8); }
        .rp-tier::before {
            content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 2px; 
            background: var(--rp-glow); background-size: 400% 400%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude;
            animation: gradientMove 8s linear infinite;
        }

        .benchmark-tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.7rem; background: rgba(255, 255, 255, 0.1); color: #fff; }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .skills-list { font-size: 0.75rem; color: #888; }
        
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input { flex: 1; background: #18181b; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--p8-accent); color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="stage">
    <div style="font-size: 3rem; margin-bottom: 20px;">🎭</div>
</div>

<div class="user-input-zone">
    <input type="text" id="user-text" placeholder="Type your response..." autocomplete="off">
    <button id="send-btn">Send</button>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const stage = document.getElementById('stage');
    const userText = document.getElementById('user-text');
    const sendBtn = document.getElementById('send-btn');
    
    let step = 0;
    let engine;
    let systemPrompt = "You are a versatile roleplay assistant. Follow the user's character prompts exactly.";

    const scripts = [
        () => addAiBubble("Roleplay Engine Initialized. First, who are you? (User Name)"),
        () => addAiBubble("Describe the AI's role or character. (e.g. 'You are Nora, a CDF Scout in Entropia Universe')"),
        () => addAiBubble("Select your 'Brain'. For Roleplay, I highly recommend the **Hermes** variants:"),
    ];

    function addAiBubble(text) {
        const div = document.createElement('div');
        div.className = "bubble";
        div.innerHTML = `<strong>OMEGA:</strong> ${text}`;
        stage.appendChild(div);
        stage.scrollTo({ top: stage.scrollHeight, behavior: 'smooth' });
    }

    async function handleInput() {
        const val = userText.value.trim();
        if (!val) return;
        userText.value = "";

        if (step === 0) {
            addAiBubble(`Welcome, ${val}. Now, set the scene. Who should I become?`);
            step++;
            return;
        }
        if (step === 1) {
            systemPrompt = val;
            addAiBubble("System prompt set. Now, select your local model to begin.");
            showModelPicker();
            step++;
            return;
        }
    }

    function showModelPicker() {
        const grid = document.createElement('div');
        grid.className = "model-grid";
        
        const models = [
            { id: "Hermes-3-Llama-3.1-8B-q4f16_1-MLC", name: "Hermes 3 (8B)", tier: "rp-tier", desc: "Best for Unfiltered RP", ram: "6GB" },
            { id: "Llama-3.1-8B-Instruct-q4f32_1-MLC", name: "Llama 3.1 (8B)", tier: "standard", desc: "Balanced & Smart", ram: "5GB" },
            { id: "Gemma-2-2b-it-q4f16_1-MLC", name: "Gemma 2 (2B)", tier: "potato", desc: "Fast on any PC", ram: "2GB" }
        ];

        models.forEach(m => {
            const card = document.createElement('div');
            card.className = `model-card ${m.tier}`;
            card.innerHTML = `
                <div class="card-header"><strong>${m.name}</strong></div>
                <div class="benchmark-tag">RP Optimized</div>
                <div class="skills-list">${m.desc}</div>
                <div style="font-size:0.7rem; color:#666; margin-top:10px;">Req: ${m.ram} RAM</div>
            `;
            card.onclick = () => startLoading(m.id);
            grid.appendChild(card);
        });
        stage.appendChild(grid);
    }

    async function startLoading(modelId) {
        stage.innerHTML = `<div class="bubble">Downloading Brain... <span id="progress">0%</span></div>`;
        try {
            engine = await webllm.CreateMLCEngine(modelId, {
                initProgressCallback: (p) => { document.getElementById('progress').innerText = `${Math.round(p.progress * 100)}% - ${p.text}`; }
            });
            startChat();
        } catch (e) {
            addAiBubble("⚠️ Error: Hardware might be too weak. Try the 'Gemma 2B' model instead.");
            showModelPicker();
        }
    }

    function startChat() {
        stage.innerHTML = "";
        addAiBubble("Neural link established. Your story begins now.");
        sendBtn.onclick = async () => {
            const text = userText.value;
            if(!text) return;
            userText.value = "";
            
            const uDiv = document.createElement('div');
            uDiv.className = "bubble"; uDiv.style.textAlign = "right"; uDiv.style.border = "none";
            uDiv.innerHTML = `<span style="color:#666">You:</span> ${text}`;
            stage.appendChild(uDiv);

            const aiDiv = document.createElement('div');
            aiDiv.className = "bubble"; aiDiv.innerHTML = "<strong>...</strong>";
            stage.appendChild(aiDiv);

            const messages = [
                { role: "system", content: systemPrompt },
                { role: "user", content: text }
            ];

            const chunks = await engine.chat.completions.create({ messages, stream: true });
            let full = "";
            for await (const chunk of chunks) {
                full += chunk.choices[0]?.delta?.content || "";
                aiDiv.innerHTML = `<strong>AI:</strong> ${full}`;
                stage.scrollTop = stage.scrollHeight;
            }
        };
    }

    sendBtn.onclick = handleInput;
    userText.onkeypress = (e) => { if(e.key === 'Enter') handleInput(); };
    scripts[0]();
</script>
</body>
</html>
