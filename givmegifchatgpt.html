<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Emote Studio - Scale & Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #111; padding: 2rem; border-radius: 15px; box-shadow: 0 0 30px rgba(0,255,200,0.1); max-width: 900px; width: 100%; border: 1px solid #222; }
        
        /* Layout */
        .editor-layout { display: flex; gap: 30px; margin-top: 20px; flex-wrap: wrap; }
        .preview-box { background: #000; border: 2px solid #00ffcc; width: 112px; height: 112px; display: flex; align-items: center; justify-content: center; position: sticky; top: 20px; }
        #liveCanvas { width: 112px; height: 112px; image-rendering: pixelated; background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%); background-size: 10px 10px; }

        /* Controls */
        .controls-panel { flex: 1; min-width: 300px; }
        .slider-group { margin-bottom: 15px; background: #1a1a1a; padding: 10px; border-radius: 8px; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: #00ffcc; }
        
        /* Timeline */
        #timeline { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; padding: 10px; background: #050505; border-radius: 8px; border: 1px solid #222; }
        .frame-card { background: #222; padding: 4px; border-radius: 4px; border: 1px solid #333; position: relative; }
        .frame-card img { width: 60px; height: 60px; object-fit: contain; }
        .mini-btns { display: flex; justify-content: space-between; margin-top: 4px; }
        .mini-btns button { padding: 2px 4px; font-size: 9px; background: #444; color: white; border: none; cursor: pointer; }
        
        .main-btn { background: #00ffcc; color: #000; border: none; padding: 12px 24px; font-weight: 800; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        #status { margin-top: 15px; text-align: center; color: #00ffcc; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin:0; color: #00ffcc;">Emote Precision Tool v2</h2>
    
    <div class="editor-layout">
        <div class="preview-box">
            <canvas id="liveCanvas" width="112" height="112"></canvas>
        </div>

        <div class="controls-panel">
            <input type="file" id="fileInput" accept="image/png" multiple style="margin-bottom: 15px;">
            
            <div class="slider-group">
                <label>Scale (Zoom): <span id="scaleVal">1.0</span>x</label>
                <input type="range" id="scale" min="0.1" max="3.0" step="0.05" value="1.0">
            </div>

            <div class="slider-group">
                <label>Vertical Offset (Y): <span id="yVal">0</span>px</label>
                <input type="range" id="yOffset" min="-100" max="100" step="1" value="0">
            </div>

            <div class="slider-group">
                <label>Frame Speed (ms):</label>
                <input type="number" id="delay" value="80" style="width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 5px;">
            </div>

            <button class="main-btn" onclick="generateGif()">RENDER PRO GIF</button>
        </div>
    </div>

    <div id="timeline">
        <p style="color: #444; width: 100%; text-align: center;">Upload PNGs to start...</p>
    </div>

    <div id="status"></div>
    <div id="result" style="text-align: center; margin-top: 20px;"></div>
</div>

<script>
    let frameList = [];
    const canvas = document.getElementById('liveCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    // UI Elements
    const scaleInput = document.getElementById('scale');
    const yInput = document.getElementById('yOffset');
    const scaleText = document.getElementById('scaleVal');
    const yText = document.getElementById('yVal');

    // Live update listeners
    [scaleInput, yInput].forEach(input => {
        input.addEventListener('input', () => {
            scaleText.innerText = scaleInput.value;
            yText.innerText = yInput.value;
            drawPreview();
        });
    });

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        for (let file of e.target.files) {
            const img = await loadImage(file);
            frameList.push(img);
        }
        renderTimeline();
        drawPreview();
    });

    function drawPreview() {
        if (frameList.length === 0) return;
        
        const scale = parseFloat(scaleInput.value);
        const yOff = parseInt(yInput.value);
        
        ctx.clearRect(0, 0, 112, 112);
        
        // Use the first frame for the live preview
        const img = frameList[0];
        const w = 112 * scale;
        const h = 112 * scale;
        const x = (112 - w) / 2;
        const y = ((112 - h) / 2) + yOff;

        ctx.drawImage(img, x, y, w, h);
    }

    function renderTimeline() {
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = '';
        frameList.forEach((img, i) => {
            const div = document.createElement('div');
            div.className = 'frame-card';
            div.innerHTML = `
                <img src="${img.src}">
                <div class="mini-btns">
                    <button onclick="move(${i}, -1)">◀</button>
                    <button onclick="dup(${i})">＋</button>
                    <button onclick="rem(${i})">X</button>
                    <button onclick="move(${i}, 1)">▶</button>
                </div>
            `;
            timeline.appendChild(div);
        });
    }

    function dup(i) { 
        const c = new Image(); c.src = frameList[i].src; 
        frameList.splice(i+1, 0, c); renderTimeline(); 
    }
    function rem(i) { frameList.splice(i, 1); renderTimeline(); drawPreview(); }
    function move(i, d) {
        if(i+d < 0 || i+d >= frameList.length) return;
        [frameList[i], frameList[i+d]] = [frameList[i+d], frameList[i]];
        renderTimeline();
    }

    async function generateGif() {
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        if (frameList.length === 0) return alert("No frames!");

        status.innerText = "🚀 Rending Transparent GIF...";
        result.innerHTML = "";

        const scale = parseFloat(scaleInput.value);
        const yOff = parseInt(yInput.value);
        const delay = parseInt(document.getElementById('delay').value);

        const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
        const workerBlob = new Blob([await response.text()], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(workerBlob);

        const gif = new GIF({
            workers: 4, quality: 1, width: 112, height: 112,
            transparent: 'rgba(0,0,0,0)', workerScript: workerUrl
        });

        const w = 112 * scale;
        const h = 112 * scale;
        const x = (112 - w) / 2;
        const y = ((112 - h) / 2) + yOff;

        frameList.forEach(img => {
            ctx.clearRect(0, 0, 112, 112);
            ctx.drawImage(img, x, y, w, h);
            gif.addFrame(ctx, {copy: true, delay: delay});
        });

        gif.on('finished', blob => {
            status.innerText = "✨ SUCCESS ✨";
            const url = URL.createObjectURL(blob);
            result.innerHTML = `<img src="${url}"><br><a href="${url}" download="emote_perfect.gif" style="color:#00ffcc; text-decoration:none; font-weight:bold;">DOWNLOAD FINAL GIF</a>`;
            URL.revokeObjectURL(workerUrl);
        });

        gif.render();
    }

    function loadImage(file) {
        return new Promise(r => {
            const rd = new FileReader();
            rd.onload = e => { const i = new Image(); i.onload = () => r(i); i.src = e.target.result; };
            rd.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
