<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entropia Universe OBS Overlay</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Load ComfyJS before modules -->
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.js"></script>
</head>
<body>

    <!-- Overlay Visuals -->
    <div id="overlay-container">
        <div id="bubble" class="chat-bubble"></div>
        <div id="terminaloutput" class="textcontainer"></div>
        <div id="nameplate">Connecting...</div>
        
        <!-- NEW: High-density Loot Display[cite: 4] -->
        <div id="session-manifest" style="position: absolute; bottom: 20px; right: 20px; text-align: right;">
            <div id="manifest-grid" style="display: flex; flex-direction: column; gap: 4px;"></div>
            <div style="border-top: 1px solid #0ec3c3; margin-top: 5px; padding-top: 5px; font-size: 12px; color: #0ec3c3;">
                TOTAL: <span id="session-grand-total">0.0000</span> PED
            </div>
        </div>
    </div>
    
    <button id="openMenu-Butt" style="position:fixed; top:10px; right:10px; z-index:9999;">⚙️</button>

    <!-- Control Panel -->
    <div id="comfycontrolContainer">
        <h4>Twitch Config</h4>
        <input type="text" id="streamerInput" placeholder="Twitch User">
        <button id="connectBtn">Connect Twitch</button>

        <div class="settings-group">
            <h4>Session Control</h4>
            <div class="setting-row">
                <label>Log Path:</label>
                <!-- Matches polling.js 'pathInput'[cite: 4] -->
                <input type="text" id="pathInput" readonly placeholder="Click Link Log...">
            </div>
            <button id="browseBtn">📁 Link Chat.log</button>
            <button id="start-session-btn" style="background: #2e7d32;">START SESSION</button>
            <div id="session-timer" style="text-align:center; font-size:12px; margin-top:5px; color:#0ec3c3;">00:00:00</div>
        </div>

        <div class="settings-group">
            <h4>UI Positioning</h4>
            <div class="setting-row"><label>Name X</label><input type="range" id="nameX" min="0" max="100"></div>
            <div class="setting-row"><label>Name Y</label><input type="range" id="nameY" min="0" max="100"></div>
            <div class="setting-row"><label>Terminal X</label><input type="range" id="terminalOutputX" min="0" max="100"></div>
            <div class="setting-row"><label>Terminal Y</label><input type="range" id="terminalOutputY" min="0" max="100"></div>
        </div>

        <div class="settings-group">
            <h4>Overlay Layout</h4>
            <div class="setting-row">
                <label>Show Nameplate</label>
                <input type="checkbox" id="showStreamerName" checked>
            </div>
            <div class="setting-row">
                <label>Show Terminal</label>
                <input type="checkbox" id="showTerminalOutput" checked>
            </div>
            <div id="PrimaryColorSwatches" style="display: flex; gap: 5px; flex-wrap: wrap;"></div>
        </div>

        <div class="settings-group">
            <h4>Sound Settings</h4>
            <div class="setting-row">
                <label>Master Audio</label>
                <input type="checkbox" id="masterEnabled" checked>
            </div>
            
            <div class="setting-row" data-key="meowSound">
                <label>Meow Sound</label>
                <input type="checkbox" checked>
                <button class="file-btn">📁</button>
                <button class="test-btn">Test</button>
                <input type="file" class="hidden-file-input" accept="audio/*" style="display:none">
            </div>
        </div>

        <!-- Corrected Reset Button[cite: 4] -->
        <button id="btnReset" style="color:red; margin-top:10px; width:100%;">Hard Reset</button>
    </div>

    <!-- Scripts: Ordered for proper module dependency[cite: 1] -->
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/comfyEU.js"></script>
    <script type="module" src="js/polling.js"></script>
</body>
</html>
