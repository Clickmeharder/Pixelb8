<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entropia Scout - OBS Overlay V2</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- ComfyJS for Twitch integration -->
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.js"></script>
</head>
<body>



    <!-- Overlay Visuals: All elements are positioned via js/app.js state -->
    <div id="overlay-container">
        <!-- Absolute positioned bubble for !sessiontotal -->
        <div id="bubble" class="chat-bubble"></div>
        <div id="terminaloutput" class="textcontainer"></div>
        <div id="nameplate">Connecting...</div>
        
        <!-- NEW: Overlay Timer Clone -->
        <div id="overlay-timer" class="textcontainer">00:00:00</div>
        
        <!-- High-density Loot Display (The Grid) -->
        <div id="session-manifest">
            <div id="manifest-grid"></div>
        </div>

        <!-- SEPARATED: Grand Total Footer (The Total) -->
        <div id="session-totalContainer" class="textcontainer">
           <span style="font-size:12px;">  RETURNS: </span> <span id="session-grand-total">0.0000</span> PED
        </div>
    </div>
    
    <!-- Settings Toggle Button -->
    <button id="openMenu-Butt" style="position:fixed; top:10px; right: 50%; width: 50px; opacity:0.0; z-index:9999;">⚙️</button>

    <!-- Control Panel -->
    <div id="comfycontrolContainer">
        <h4>Twitch Config</h4>
        <input type="text" id="streamerInput" placeholder="Twitch User">
        <button id="connectBtn">Connect Twitch</button>

        <div class="settings-group">
            <h4>Session Control</h4>
            <div class="setting-row">
                <label>Log Path:</label>
                <input type="text" id="pathInput" readonly placeholder="Click Link Log...">
            </div>
            <button id="browseBtn">📁 Link Chat.log</button>
            <button id="start-session-btn" style="background: #2e7d32; color: white; font-weight: bold;">START SESSION</button>
            <div id="session-timer">00:00:00</div>
        </div>

        <!-- Visual Styling Suite -->
        <div class="settings-group">
            <h4>Visual Styling</h4>
            
            <div class="setting-row">
                <label>Text Color</label>
                <div class="rgb-group">
                    <input type="range" class="rgb-slider" data-color="textColor" data-channel="r" min="0" max="255">
                    <input type="range" class="rgb-slider" data-color="textColor" data-channel="g" min="0" max="255">
                    <input type="range" class="rgb-slider" data-color="textColor" data-channel="b" min="0" max="255">
                    <div id="preview-textColor" class="color-preview"></div>
                </div>
            </div>

            <div class="setting-row">
                <label>BG Color 1</label>
                <div class="rgb-group">
                    <input type="range" class="rgb-slider" data-color="bgColor1" data-channel="r" min="0" max="255">
                    <input type="range" class="rgb-slider" data-color="bgColor1" data-channel="g" min="0" max="255">
                    <input type="range" class="rgb-slider" data-color="bgColor1" data-channel="b" min="0" max="255">
                    <div id="preview-bgColor1" class="color-preview"></div>
                </div>
                <input type="range" id="bgAlpha" min="0" max="1" step="0.1" title="Opacity">
            </div>
            
            <div class="setting-row">
                <label>BG Color 2</label>
                <div class="rgb-group">
                    <input type="range" class="rgb-slider" data-color="bgColor2" data-channel="r" min="0" max="255">
                    <input type="range" class="rgb-slider" data-color="bgColor2" data-channel="g" min="0" max="255">
                    <input type="range" class="rgb-slider" data-color="bgColor2" data-channel="b" min="0" max="255">
                    <div id="preview-bgColor2" class="color-preview"></div>
                </div>
            </div>

            <div class="setting-row">
                <label>Border Start</label>
                <div class="rgb-group">
                    <input type="range" class="rgb-slider" data-color="borderColor1" data-channel="r" min="0" max="255">
                    <input type="range" class="rgb-slider" data-color="borderColor1" data-channel="g" min="0" max="255">
                    <input type="range" class="rgb-slider" data-color="borderColor1" data-channel="b" min="0" max="255">
                    <div id="preview-borderColor1" class="color-preview"></div>
                </div>
            </div>
            
            <div class="setting-row">
                <label>Border End</label>
                <div class="rgb-group">
                    <input type="range" class="rgb-slider" data-color="borderColor2" data-channel="r" min="0" max="255">
                    <input type="range" class="rgb-slider" data-color="borderColor2" data-channel="g" min="0" max="255">
                    <input type="range" class="rgb-slider" data-color="borderColor2" data-channel="b" min="0" max="255">
                    <div id="preview-borderColor2" class="color-preview"></div>
                </div>
            </div>

            <div class="setting-row">
                <label>Font Family</label>
                <select id="fontFamily">
                    <option value="'Segoe UI', sans-serif">Standard</option>
                    <option value="'Courier New', monospace">Monospace</option>
                    <option value="Georgia, serif">Serif</option>
                    <option value="'Arial Black', sans-serif">Chunky</option>
                    <option value="Impact, sans-serif">Impact</option>
                </select>
            </div>

            <div class="setting-row">
                <label>Border Style</label>
                <select id="borderStyle">
                    <option value="solid">Solid</option>
                    <option value="dashed">Dashed</option>
                    <option value="double">Double</option>
                    <option value="none">None</option>
                </select>
            </div>

            <div class="setting-row"><label>Border Width</label><input type="range" id="borderWidth" min="0" max="10"></div>
            <div class="setting-row"><label>Border Radius</label><input type="range" id="borderRadius" min="0" max="50"></div>
            <div class="setting-row"><label>Font Size</label><input type="range" id="fontSize" min="8" max="40"></div>
            <div class="setting-row"><label>Text Outline</label><input type="range" id="textOutline" min="0" max="5"></div>
        </div>

        <!-- UI Positioning -->
        <div class="settings-group">
            <h4>UI Positioning</h4>
            <div class="setting-row"><label>Name X</label><input type="range" id="nameX" min="0" max="100"></div>
            <div class="setting-row"><label>Name Y</label><input type="range" id="nameY" min="0" max="100"></div>
            <div class="setting-row"><label>Terminal X</label><input type="range" id="terminalOutputX" min="0" max="100"></div>
            <div class="setting-row"><label>Terminal Y</label><input type="range" id="terminalOutputY" min="0" max="100"></div>
            
            <div class="setting-row"><label>Loot Grid X</label><input type="range" id="manifestX" min="0" max="100"></div>
            <div class="setting-row"><label>Loot Grid Y</label><input type="range" id="manifestY" min="0" max="100"></div>
            
            <!-- NEW: Independent Total Positioning -->
            <div class="setting-row"><label>Grand Total X</label><input type="range" id="totalX" min="0" max="100"></div>
            <div class="setting-row"><label>Grand Total Y</label><input type="range" id="totalY" min="0" max="100"></div>

            <div class="setting-row"><label>Bubble X</label><input type="range" id="bubbleX" min="0" max="100"></div>
            <div class="setting-row"><label>Bubble Y</label><input type="range" id="bubbleY" min="0" max="100"></div>
            <div class="setting-row"><label>Timer X</label><input type="range" id="overlayTimerX" min="0" max="100"></div>
            <div class="setting-row"><label>Timer Y</label><input type="range" id="overlayTimerY" min="0" max="100"></div>
        </div>

        <div class="settings-group">
            <h4>Visibility</h4>
            <div class="setting-row"><label>Show Nameplate</label><input type="checkbox" id="showStreamerName" checked></div>
            <div class="setting-row"><label>Show Terminal</label><input type="checkbox" id="showTerminalOutput" checked></div>
            <div class="setting-row"><label>Show Loot Grid</label><input type="checkbox" id="showManifest" checked></div>
            
            <!-- NEW: Independent Total Visibility -->
            <div class="setting-row"><label>Show Grand Total</label><input type="checkbox" id="showTotal" checked></div>
            
            <div class="setting-row"><label>Show Timer</label><input type="checkbox" id="showOverlayTimer" checked></div>
        </div>

        <div class="settings-group">
            <h4>Sound Settings</h4>
            <div class="setting-row"><label>Master Audio</label><input type="checkbox" id="masterEnabled" checked></div>
            <div class="setting-row" data-key="meowSound">
                <label>Meow Sound</label>
                <input type="checkbox" checked>
                <button class="file-btn">📁</button>
                <button class="test-btn">Test</button>
                <input type="file" class="hidden-file-input" accept="audio/*" style="display:none">
            </div>
        </div>

        <button id="btnReset" style="color:red; margin-top:10px; width:100%;">Hard Reset</button>
    </div>

    <!-- Core Modules -->
    <script type="module" src="js/polling.js"></script>
    <script type="module" src="js/newapp.js"></script>
</body>
</html>
