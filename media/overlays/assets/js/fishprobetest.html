<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixelb8 Holographic Arcade Studio v16.8</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: transparent;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      width: 800px;
      height: 450px;
    }

    #arcade-monitor {
      position: absolute;
      top: 20px; left: 20px; width: 760px; height: 410px;
      background: #02121a; border: 3px solid #00ffcc; border-radius: 16px;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.4), inset 0 0 30px rgba(0,0,0,0.9);
      overflow: hidden; display: flex; flex-direction: row; opacity: 1;
      transition: opacity 0.8s ease-in-out;
    }

    #arcade-monitor::before {
      content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
      z-index: 10; background-size: 100% 4px; pointer-events: none;
    }

    #view-screen { width: 440px; height: 100%; background: #010a0f; border-right: 2px dashed rgba(0, 255, 204, 0.3); }
    canvas { display: block; image-rendering: pixelated; width: 100%; height: 100%; }

    #hud-panel {
      width: 320px; height: 100%; padding: 15px; display: flex; flex-direction: column;
      justify-content: space-between; background: linear-gradient(135deg, rgba(2, 18, 26, 0.95) 0%, rgba(5, 40, 50, 0.9) 100%);
      color: #ffffff; position: relative;
    }

    .hud-title { font-size: 12px; font-weight: bold; text-align: center; color: #88eeff; border-bottom: 1px solid rgba(0, 255, 204, 0.3); padding-bottom: 6px; }
    #result-title { font-size: 20px; font-weight: 900; margin-top: 10px; text-transform: uppercase; text-align: center; color: #ffaa00; min-height: 30px; }
    #result-item { font-size: 13px; text-align: center; color: #ffffff; margin: 4px 0; }
    .ped-counter { font-size: 36px; text-align: center; font-weight: 900; color: #00ffcc; font-family: 'Courier New', monospace; margin: 5px 0; }
    #feed-log { font-size: 11px; font-family: 'Courier New', monospace; background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 255, 204, 0.2); padding: 6px; height: 85px; overflow: hidden; color: #88ccff; }

    .holo-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 22, 31, 0.98); z-index: 5; padding: 12px; display: none; flex-direction: column; border-left: 2px solid #00ffcc; }
    .menu-header { font-size: 13px; font-weight: bold; color: #00ffcc; text-transform: uppercase; margin-bottom: 4px; }
    
    .holo-tabs { display: flex; gap: 2px; margin-bottom: 10px; border-bottom: 1px solid rgba(0, 255, 204, 0.4); padding-bottom: 2px; }
    .tab-btn { flex: 1; background: rgba(0, 255, 204, 0.1); border: 1px solid rgba(0, 255, 204, 0.3); color: #88eeff; padding: 4px 0; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; text-align: center; }
    .tab-btn.active { background: #00ffcc; color: #000; border-color: #00ffcc; }

    .menu-body { flex-grow: 1; overflow-y: auto; font-size: 11px; padding-right: 2px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .menu-group { margin-bottom: 8px; }
    .menu-group label { display: block; color: #ffaa00; font-weight: bold; margin-bottom: 2px; }
    .menu-group input[type="text"], .menu-group input[type="number"], .menu-group select { width: 100%; background: #000; border: 1px solid #00ffcc; color: #fff; padding: 4px; font-family: monospace; font-size: 11px; }
    
    .btn-save { background: #00ffcc; color: #000; border: none; padding: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; margin-top: 4px; font-size: 11px; }
    .btn-save:hover { background: #fff; }

    /* Color Palette Picker */
    .palette-box { display: flex; gap: 4px; margin: 6px 0; justify-content: center; }
    .color-swatch { width: 22px; height: 22px; border: 2px solid #333; cursor: pointer; border-radius: 4px; }
    .color-swatch.selected { border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.8); }

    /* Inline Painter Section */
    #inline-painter-box { display: none; background: rgba(0,0,0,0.5); padding: 8px; border: 1px solid #ffaa00; margin-top: 8px; border-radius: 4px; }
    #pixel-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1px; background: rgba(0,255,204,0.2); width: 168px; height: 168px; margin: 6px auto; }
    .pixel-cell { background: #000; border: 1px solid #112222; cursor: pointer; }

    .global-flash { animation: globalAlertPulse 0.5s infinite alternate; }
    .hof-shake { animation: monitorShake 0.15s infinite, hofAlertPulse 0.4s infinite alternate; }

    @keyframes globalAlertPulse { from { border-color: #00ffcc; } to { border-color: #ff5500; } }
    @keyframes hofAlertPulse { from { border-color: #00ffcc; } to { border-color: #ffcc00; } }
    @keyframes monitorShake { 0% { transform: translate(1px, 2px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(2px, 1px); } }
  </style>
</head>
<body>

  <div id="arcade-monitor">
    <div id="view-screen">
      <canvas id="retroCanvas" width="440" height="410"></canvas>
    </div>

    <div id="hud-panel">
      <div class="hud-title">📡 Calypso Surveyor OS v16.8</div>
      
      <div id="main-hud-view" style="display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1;">
        <div>
          <div id="result-title">STANDBY</div>
          <div id="result-item">Enter !fish, !mine, or !craft</div>
          <div class="ped-counter"><span id="ped-val">0.00</span> <span style="font-size:14px; color: rgba(0, 255, 204, 0.6);">PED</span></div>
        </div>
        <div id="feed-log"><div>[SYS] Overlay Engine running. Listening...</div></div>
      </div>

      <!-- LOOT POOL CONFIG MANAGER WITH INLINE DYNAMIC SELECT PAINTER -->
      <div id="prize-screen" class="holo-menu">
        <div class="menu-header">Edit Custom Pools</div>
        
        <div class="holo-tabs">
          <div class="tab-btn active" onclick="setMenuTab('prize', 'mine')">Mine</div>
          <div class="tab-btn" onclick="setMenuTab('prize', 'fish')">Fish</div>
          <div class="tab-btn" onclick="setMenuTab('prize', 'craft')">Craft</div>
        </div>

        <div class="menu-body">
          <div id="prize-tab-mine" class="tab-content active">
            <div class="menu-group"><label>Common Ores</label><input type="text" id="pool-mine-common" onchange="syncPoolInputsToData('mine')"></div>
            <div class="menu-group"><label>Uncommon Ores</label><input type="text" id="pool-mine-uncommon" onchange="syncPoolInputsToData('mine')"></div>
            <div class="menu-group"><label>Rare Ores</label><input type="text" id="pool-mine-rare" onchange="syncPoolInputsToData('mine')"></div>
          </div>
          <div id="prize-tab-fish" class="tab-content">
            <div class="menu-group"><label>Common Catches</label><input type="text" id="pool-fish-common" onchange="syncPoolInputsToData('fish')"></div>
            <div class="menu-group"><label>Uncommon Catches</label><input type="text" id="pool-fish-uncommon" onchange="syncPoolInputsToData('fish')"></div>
            <div class="menu-group"><label>Rare Catches</label><input type="text" id="pool-fish-rare" onchange="syncPoolInputsToData('fish')"></div>
          </div>
          <div id="prize-tab-craft" class="tab-content">
            <div class="menu-group"><label>Common Components</label><input type="text" id="pool-craft-common" onchange="syncPoolInputsToData('craft')"></div>
            <div class="menu-group"><label>Uncommon Components</label><input type="text" id="pool-craft-uncommon" onchange="syncPoolInputsToData('craft')"></div>
            <div class="menu-group"><label>Rare Blueprints</label><input type="text" id="pool-craft-rare" onchange="syncPoolInputsToData('craft')"></div>
          </div>

          <!-- OBS GRAPHICS PAINTER INTERFACE -->
          <div style="border-top:1px dashed #00ffcc; padding-top:6px; margin-top:6px;">
            <label style="color:#00ffcc; font-weight:bold; display:block; margin-bottom:2px;">Target Vector Blueprint:</label>
            
            <div class="menu-group">
              <select id="painter-item-dropdown" onchange="handleDropdownSelection()">
                <!-- Populated dynamically via JS -->
              </select>
            </div>

            <div id="new-item-input-block" class="menu-group" style="display:none; background:rgba(255,170,0,0.1); padding:4px; border:1px solid #ffaa00;">
              <label>New Item Name Identity:</label>
              <input type="text" id="new-item-name-field" placeholder="e.g., Calypso Cod">
              <button class="btn-save" style="background:#ffaa00; width:100%;" onclick="createNewDropdownAsset()">Register & Load Asset</button>
            </div>
            
            <div id="inline-painter-box">
              <div style="font-size:10px; color:#ffaa00; text-align:center; font-weight:bold; text-transform:uppercase;">Drawing: <span id="drawing-item-name">None</span></div>
              
              <!-- Paint Brush Color Palettes -->
			<div class="palette-box" style="display: flex; gap: 3px; margin: 8px 0; justify-content: center; flex-wrap: wrap;">
			  <div class="color-swatch selected" style="background:#00ffcc;" onclick="selectBrushColor('#00ffcc', this)" title="Neon Teal"></div>
			  <div class="color-swatch" style="background:#ffaa00;" onclick="selectBrushColor('#ffaa00', this)" title="Fire Orange"></div>
			  <div class="color-swatch" style="background:#ffff00;" onclick="selectBrushColor('#ffff00', this)" title="Calypso Gold"></div>
			  <div class="color-swatch" style="background:#ff3366;" onclick="selectBrushColor('#ff3366', this)" title="Hot Pink"></div>
			  <div class="color-swatch" style="background:#9933ff;" onclick="selectBrushColor('#9933ff', this)" title="Deep Purple"></div>
			  <div class="color-swatch" style="background:#33ccff;" onclick="selectBrushColor('#33ccff', this)" title="Electric Blue"></div>
			  <div class="color-swatch" style="background:#33ff33;" onclick="selectBrushColor('#33ff33', this)" title="Acid Green"></div>
			  <div class="color-swatch" style="background:#ffffff;" onclick="selectBrushColor('#ffffff', this)" title="Pure White"></div>
			  <div class="color-swatch" style="background:#000000; border:1px dashed #ffaa00;" onclick="selectBrushColor('#000000', this)" title="Eraser"></div>
			</div>

              <div id="pixel-grid"></div>
              <div style="display:flex; gap:4px;">
                <button class="btn-save" style="flex:1; background:#ff3330; color:#fff; margin:0;" onclick="clearPixelGrid()">Wipe</button>
                <button class="btn-save" style="flex:1; margin:0; background:#00ffcc;" onclick="savePixelArtwork()">Bind Vector Art</button>
              </div>
            </div>
          </div>
        </div>
        <button class="btn-save" id="btn-master-save" style="background:#88eeff;" onclick="savePrizePools()">Commit Asset Tables</button>
      </div>

      <!-- SYSTEM PROBABILITY MANAGEMENT OPTIONS -->
      <div id="options-screen" class="holo-menu">
        <div class="menu-header">Adjust Drop Percentages</div>
        <!-- Left as previous build -->
      </div>

    </div>
  </div>

  <script>
    const STREAMER_NAME = "jaedraze";
    const userCooldowns = new Map();
    let actionQueue = [], activeSession = null;

    let systemOptions = { fadeaway: true };
    let activeBrushColor = "#00ffcc"; // Default color hex value
    
    let LOOT_POOLS = {
      mine: { common: ["Lysterium Ore", "Oil Deposit"], uncommon: ["Iron Ore", "Blausariam Ore"], rare: ["Zorn Star Ore"] },
      fish: { common: ["Calypso Cod", "Rusty Hook"], uncommon: ["Rigid Snapper", "Moonfish"], rare: ["Deep Sea Skreem"] },
      craft: { common: ["Standard Matrix"], uncommon: ["Electronic Component"], rare: ["Weapon Blueprint", "Armor Plate"] }
    };

    let GAME_RATES = {
      mine: { wCommon: 60, wUncommon: 30, rGlobal: 5, rHof: 1.5 },
      fish: { wCommon: 65, wUncommon: 25, rGlobal: 5, rHof: 1.0 },
      craft: { wCommon: 70, wUncommon: 22, rGlobal: 4, rHof: 2.0 }
    };

    // Stored matrix artwork format: key -> Array of color codes/strings (0 or hex string)
    let CUSTOM_ARTWORKS = {}; 

    const monitor = document.getElementById('arcade-monitor');
    const canvas = document.getElementById('retroCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    if (systemOptions.fadeaway) monitor.style.opacity = "0";

    // Setup 12x12 Pixel Cells
    const gridContainer = document.getElementById('pixel-grid');
    for (let i = 0; i < 144; i++) {
      const cell = document.createElement('div');
      cell.className = 'pixel-cell';
      cell.dataset.index = i;
      cell.onclick = function() {
        this.style.backgroundColor = activeBrushColor;
        if(activeBrushColor === "#000000") {
          this.removeAttribute('data-color');
        } else {
          this.setAttribute('data-color', activeBrushColor);
        }
      };
      gridContainer.appendChild(cell);
    }

    function selectBrushColor(colorHex, swatchElement) {
      activeBrushColor = colorHex;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      swatchElement.classList.add('selected');
    }

    // Pull real items from loot fields dynamically to update dropdown choices
    function rebuildDropdown() {
      const dropdown = document.getElementById('painter-item-dropdown');
      dropdown.innerHTML = '<option value="" disabled selected>-- Select Item Asset --</option>';

      let addedItems = new Set();
      ['mine', 'fish', 'craft'].forEach(mode => {
        ['common', 'uncommon', 'rare'].forEach(tier => {
          LOOT_POOLS[mode][tier].forEach(item => {
            let clean = item.trim();
            if (clean && !addedItems.has(clean.toLowerCase())) {
              addedItems.add(clean.toLowerCase());
              let opt = document.createElement('option');
              opt.value = clean;
              opt.innerText = clean;
              dropdown.appendChild(opt);
            }
          });
        });
      });

      // Special control options
      let divider = document.createElement('option');
      divider.disabled = true;
      divider.innerText = "-------------------";
      dropdown.appendChild(divider);

      let addOpt = document.createElement('option');
      addOpt.value = "__ADD_NEW__";
      addOpt.innerText = "➕ Add New Asset...";
      dropdown.appendChild(addOpt);
    }

	function handleDropdownSelection() {
	  const dropdown = document.getElementById('painter-item-dropdown');
	  const val = dropdown.value;

	  if (val === "__ADD_NEW__") {
		document.getElementById('new-item-input-block').style.display = "block";
		document.getElementById('inline-painter-box').style.display = "none";
		return;
	  }

	  document.getElementById('new-item-input-block').style.display = "none";
	  if (!val) return;

	  document.getElementById('drawing-item-name').innerText = val;
	  clearPixelGrid();

	  let lookUpKey = val.toLowerCase().trim();
	  if (CUSTOM_ARTWORKS[lookUpKey]) {
		const cells = gridContainer.children;
		CUSTOM_ARTWORKS[lookUpKey].forEach((colorVal, index) => {
		  // Clear or paint with precise hex codes loaded out of vector arrays
		  if (colorVal && colorVal !== 0 && colorVal !== "#000000") {
			cells[index].style.backgroundColor = colorVal;
			cells[index].setAttribute('data-color', colorVal);
		  } else {
			cells[index].style.backgroundColor = "#000000";
			cells[index].removeAttribute('data-color');
		  }
		});
	  }

	  document.getElementById('inline-painter-box').style.display = "block";
	}

    function createNewDropdownAsset() {
      const inputEl = document.getElementById('new-item-name-field');
      const name = inputEl.value.trim();
      if (!name) return alert("Please specify a valid item name.");

      // Shove it default into the fish common tier table array for data validation loops
      LOOT_POOLS.fish.common.push(name);
      
      // Update inputs on display so user tracking matches
      document.getElementById('pool-fish-common').value = LOOT_POOLS.fish.common.join(', ');

      rebuildDropdown();
      document.getElementById('painter-item-dropdown').value = name;
      inputEl.value = "";
      document.getElementById('new-item-input-block').style.display = "none";
      
      handleDropdownSelection();
    }

    function syncPoolInputsToData(gameKey) {
      LOOT_POOLS[gameKey].common = document.getElementById(`pool-${gameKey}-common`).value.split(',').map(s => s.trim()).filter(Boolean);
      LOOT_POOLS[gameKey].uncommon = document.getElementById(`pool-${gameKey}-uncommon`).value.split(',').map(s => s.trim()).filter(Boolean);
      LOOT_POOLS[gameKey].rare = document.getElementById(`pool-${gameKey}-rare`).value.split(',').map(s => s.trim()).filter(Boolean);
      rebuildDropdown();
    }

    function clearPixelGrid() {
      Array.from(gridContainer.children).forEach(c => {
        c.style.backgroundColor = "#000000";
        c.removeAttribute('data-color');
      });
    }

    function savePixelArtwork() {
      const itemName = document.getElementById('drawing-item-name').innerText.trim();
      if(!itemName) return;

      const matrix = Array.from(gridContainer.children).map(c => {
        let savedColor = c.getAttribute('data-color');
        return savedColor ? savedColor : 0;
      });

      // Crucial: Store lowercase key mapping to avoid mismatch lookups later
      CUSTOM_ARTWORKS[itemName.toLowerCase()] = matrix;
      
      document.getElementById('inline-painter-box').style.display = "none";
      document.getElementById('painter-item-dropdown').value = "";
      printLog(`[SYS] Artwork locked & indexed for: ${itemName}`);
    }

    function savePrizePools() {
      ['mine', 'fish', 'craft'].forEach(g => {
        LOOT_POOLS[g].common = document.getElementById(`pool-${g}-common`).value.split(',').map(s => s.trim()).filter(Boolean);
        LOOT_POOLS[g].uncommon = document.getElementById(`pool-${g}-uncommon`).value.split(',').map(s => s.trim()).filter(Boolean);
        LOOT_POOLS[g].rare = document.getElementById(`pool-${g}-rare`).value.split(',').map(s => s.trim()).filter(Boolean);
      });
      document.getElementById('prize-screen').style.display = "none";
      if (systemOptions.fadeaway && !activeSession) monitor.style.opacity = "0";
    }

    function setMenuTab(menuPrefix, gameKey) {
      const containerId = menuPrefix === 'prize' ? 'prize-screen' : 'options-screen';
      const container = document.getElementById(containerId);
      
      const tabs = container.querySelectorAll('.tab-btn');
      tabs.forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      const contents = container.querySelectorAll('.tab-content');
      contents.forEach(c => c.classList.remove('active'));
      container.querySelector(`#${menuPrefix}-tab-${gameKey}`).classList.add('active');
    }

    ComfyJS.onCommand = (user, command, message, flags, extra) => {
      const cmd = command.toLowerCase();
      const isStreamer = (user.toLowerCase() === STREAMER_NAME.toLowerCase() || flags.broadcaster || flags.mod);

      if (isStreamer && cmd === "editholoscreenprizes") {
        ['mine', 'fish', 'craft'].forEach(g => {
          document.getElementById(`pool-${g}-common`).value = LOOT_POOLS[g].common.join(', ');
          document.getElementById(`pool-${g}-uncommon`).value = LOOT_POOLS[g].uncommon.join(', ');
          document.getElementById(`pool-${g}-rare`).value = LOOT_POOLS[g].rare.join(', ');
        });
        rebuildDropdown();
        document.getElementById('prize-screen').style.display = "flex";
        monitor.style.opacity = "1";
        return;
      }

      if (cmd === "fish" || cmd === "mine" || cmd === "craft") {
        const now = Date.now();
        if (!isStreamer && userCooldowns.has(user) && (now - userCooldowns.get(user) < 10000)) return;
        userCooldowns.set(user, now);
        actionQueue.push({ user, type: cmd });
        if (systemOptions.fadeaway) monitor.style.opacity = "1";
        if (!activeSession) processNextQueueItem();
      }
    };

    function printLog(msg) {
      const log = document.getElementById('feed-log');
      const div = document.createElement('div'); div.innerText = msg; log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      if (log.children.length > 5) log.removeChild(log.firstChild);
    }

    function processNextQueueItem() {
      if (actionQueue.length === 0) {
        activeSession = null; resetCanvasFrame();
        if (systemOptions.fadeaway) setTimeout(() => { if (!activeSession) monitor.style.opacity = "0"; }, 1500);
        return;
      }
      activeSession = actionQueue.shift();
      initAnimation(activeSession.type, activeSession.user);
    }

    function resetCanvasFrame() {
      ctx.fillStyle = "#010a0f"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#00ffcc"; ctx.font = "bold 11px monospace";
      ctx.fillText("SYSTEM ONLINE // OBS CHANNELS BOUND", 40, 200);
      monitor.className = "";
      document.getElementById('result-title').innerText = "STANDBY";
      document.getElementById('result-item').innerText = "Enter !fish, !mine, or !craft";
    }

    function initAnimation(type, user) {
      let frame = 0, maxFrames = 100;
      const rates = GAME_RATES[type];

      const rollTier = Math.random() * 100;
      let activeTier = "common";
      if (rollTier > rates.wCommon + rates.wUncommon) activeTier = "rare";
      else if (rollTier > rates.wCommon) activeTier = "uncommon";
      
      const pool = LOOT_POOLS[type][activeTier];
      const winItem = pool[Math.floor(Math.random() * pool.length)] || "Spelt Residue";

      const rollGold = Math.random() * 100;
      let sizeText = "Minimal Trace", classification = "normal", ped = (Math.random() * 1.4 + 0.01).toFixed(2);

      if (rollGold < rates.rHof) { sizeText = "HALL OF FAME!!!"; ped = (Math.random() * 1500 + 1000).toFixed(2); classification = "hof"; }
      else if (rollGold < rates.rHof + rates.rGlobal) { sizeText = "GLOBAL!"; ped = (Math.random() * 350 + 200).toFixed(2); classification = "global"; }
      else if (rollGold < 25) { sizeText = "Sizable Return"; ped = (Math.random() * 40 + 7).toFixed(2); }

      document.getElementById('result-title').innerText = "CALIBRATING...";
      document.getElementById('result-item').innerText = `Target Lock: ${user}`;

      function renderLoop() {
        ctx.fillStyle = "#010a0f"; ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (type === 'fish') {
          ctx.fillStyle = "#022433"; ctx.fillRect(0, 240, canvas.width, 170); 
          ctx.fillStyle = "#00ffcc"; ctx.fillRect(40, 210, 15, 30); 
          ctx.strokeStyle = "#88eeff"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(55, 215); ctx.lineTo(190 + (frame*0.4), 245 + Math.sin(frame*0.25)*6); ctx.stroke(); 
        } else if (type === 'mine') {
          ctx.fillStyle = "#3a2212"; ctx.fillRect(0, 160, canvas.width, 250); 
          ctx.fillStyle = "#00ffcc"; ctx.fillRect(200, 40, 40, 20); 
          ctx.fillStyle = "#ffaa00"; ctx.fillRect(218, 60, 4, Math.min(frame * 4, 280)); 
        } else if (type === 'craft') {
          ctx.fillStyle = "rgba(0, 255, 204, 0.05)"; ctx.fillRect(120, 130, 200, 150);
          ctx.fillStyle = (frame % 6 < 3) ? "#ffaa00" : "#00ffcc"; ctx.fillRect(170 + Math.sin(frame*0.5)*3, 175, 100, 60); 
        }

        frame++;
        if (frame < maxFrames) requestAnimationFrame(renderLoop);
        else triggerLootReveal(user, winItem, ped, sizeText, classification);
      }
      renderLoop();
    }

    function triggerLootReveal(user, item, ped, sizeText, classification) {
      document.getElementById('result-title').innerText = sizeText;
      document.getElementById('result-item').innerText = `${user} extracted: ${item}`;
      document.getElementById('ped-val').innerText = ped;
      printLog(`[FIND] ${user} -> ${item} (${ped} PED)`);

      monitor.className = "";
      if (classification === 'global') monitor.classList.add('global-flash');
      if (classification === 'hof') monitor.classList.add('hof-shake');

      ctx.fillStyle = "#02121a"; ctx.fillRect(140, 100, 160, 160);
      ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 2; ctx.strokeRect(140, 100, 160, 160);
      
      // Sanitized string check match lookup
      let artworkKey = item.toLowerCase().trim();

      if (CUSTOM_ARTWORKS[artworkKey]) {
        let matrix = CUSTOM_ARTWORKS[artworkKey];
        let pSize = 10; 
        let startX = 160, startY = 120;
        
        for (let i = 0; i < 144; i++) {
          let cellColor = matrix[i];
          if (cellColor && cellColor !== 0 && cellColor !== "#000000") {
            ctx.fillStyle = cellColor;
            let row = Math.floor(i / 12);
            let col = i % 12;
            ctx.fillRect(startX + (col * pSize), startY + (row * pSize), pSize - 1, pSize - 1);
          }
        }
      } else {
        // Fallback default box graphics if unpainted
        ctx.fillStyle = "rgba(0, 255, 204, 0.2)"; ctx.fillRect(165, 145, 110, 50);
        ctx.fillStyle = "#ffffff"; ctx.fillRect(190, 135, 60, 10);
        ctx.fillStyle = "#ffaa00"; ctx.fillRect(215, 210, 12, 12);
      }

      setTimeout(() => { processNextQueueItem(); }, 6000);
    }

    ComfyJS.Init(STREAMER_NAME);
    resetCanvasFrame();
  </script>
</body>
</html>
