<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixelb8 Advanced Holo-Arcade Studio</title>
  <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: transparent;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      width: 800px;
      height: 450px;
    }

    #arcade-monitor {
      position: absolute;
      top: 20px; left: 20px; width: 760px; height: 410px;
      background: #02121a; border: 3px solid #00ffcc; border-radius: 16px;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.4), inset 0 0 30px rgba(0,0,0,0.9);
      overflow: hidden; display: flex; flex-direction: row; opacity: 1;
      transition: opacity 0.8s ease-in-out;
    }

    #arcade-monitor::before {
      content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
      z-index: 10; background-size: 100% 4px; pointer-events: none;
    }

    #view-screen { width: 440px; height: 100%; background: #010a0f; border-right: 2px dashed rgba(0, 255, 204, 0.3); }
    canvas { display: block; image-rendering: pixelated; width: 100%; height: 100%; }

    #hud-panel {
      width: 320px; height: 100%; padding: 15px; display: flex; flex-direction: column;
      justify-content: space-between; background: linear-gradient(135deg, rgba(2, 18, 26, 0.95) 0%, rgba(5, 40, 50, 0.9) 100%);
      color: #ffffff; position: relative;
    }

    .hud-title { font-size: 12px; font-weight: bold; text-align: center; color: #88eeff; border-bottom: 1px solid rgba(0, 255, 204, 0.3); padding-bottom: 6px; }
    #result-title { font-size: 20px; font-weight: 900; margin-top: 10px; text-transform: uppercase; text-align: center; color: #ffaa00; min-height: 30px; }
    #result-item { font-size: 13px; text-align: center; color: #ffffff; margin: 4px 0; }
    .ped-counter { font-size: 36px; text-align: center; font-weight: 900; color: #00ffcc; font-family: 'Courier New', monospace; margin: 5px 0; }
    #feed-log { font-size: 11px; font-family: 'Courier New', monospace; background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 255, 204, 0.2); padding: 6px; height: 85px; overflow: hidden; color: #88ccff; }

    .holo-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 22, 31, 0.98); z-index: 5; padding: 12px; display: none; flex-direction: column; border-left: 2px solid #00ffcc; }
    .menu-header { font-size: 13px; font-weight: bold; color: #00ffcc; border-bottom: 1px solid #00ffcc; padding-bottom: 4px; margin-bottom: 8px; text-transform: uppercase; }
    .menu-body { flex-grow: 1; overflow-y: auto; font-size: 11px; }
    .menu-group { margin-bottom: 8px; }
    .menu-group label { display: block; color: #ffaa00; font-weight: bold; margin-bottom: 2px; }
    .menu-group input[type="text"], .menu-group input[type="number"] { width: 100%; background: #000; border: 1px solid #00ffcc; color: #fff; padding: 4px; font-family: monospace; }
    
    .btn-save { background: #00ffcc; color: #000; border: none; padding: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; margin-top: 4px; font-size: 11px; }
    .btn-save:hover { background: #fff; }

    /* Pixel Editor Layout */
    #pixel-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1px; background: rgba(0,255,204,0.2); width: 180px; height: 180px; margin: 10px auto; }
    .pixel-cell { background: #000; border: 1px solid #112222; cursor: pointer; }
    .pixel-cell.active { background: #00ffcc; box-shadow: 0 0 4px #00ffcc; }

    .global-flash { animation: globalAlertPulse 0.5s infinite alternate; }
    .hof-shake { animation: monitorShake 0.15s infinite, hofAlertPulse 0.4s infinite alternate; }

    @keyframes globalAlertPulse { from { border-color: #00ffcc; } to { border-color: #ff5500; } }
    @keyframes hofAlertPulse { from { border-color: #00ffcc; } to { border-color: #ffcc00; } }
    @keyframes monitorShake { 0% { transform: translate(1px, 2px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(2px, 1px); } }
  </style>
</head>
<body>

  <div id="arcade-monitor">
    <div id="view-screen">
      <canvas id="retroCanvas" width="440" height="410"></canvas>
    </div>

    <div id="hud-panel">
      <div class="hud-title">📡 Calypso Surveyor OS v16.5</div>
      
      <!-- Primary Core Screen -->
      <div id="main-hud-view" style="display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1;">
        <div>
          <div id="result-title">STANDBY</div>
          <div id="result-item">Enter !fish, !mine, or !craft</div>
          <div class="ped-counter"><span id="ped-val">0.00</span> <span style="font-size:14px; color: rgba(0, 255, 204, 0.6);">PED</span></div>
        </div>
        <div id="feed-log"><div>[SYS] HUD Ready. Listening to jaedraze...</div></div>
      </div>

      <!-- LOOT POOL CONFIG MANAGER -->
      <div id="prize-screen" class="holo-menu">
        <div class="menu-header">Edit Rarity Pools</div>
        <div class="menu-body">
          <div class="menu-group">
            <label>Common Items (Comma Sep.)</label>
            <input type="text" id="pool-common">
          </div>
          <div class="menu-group">
            <label>Uncommon Items (Comma Sep.)</label>
            <input type="text" id="pool-uncommon">
          </div>
          <div class="menu-group">
            <label>Rare Items (Comma Sep.)</label>
            <input type="text" id="pool-rare">
          </div>
          <div style="border-top:1px dashed #00ffcc; padding-top:5px; margin-top:5px;">
            <label style="color:#00ffcc;">Target Matrix Drawing tool:</label>
            <input type="text" id="target-draw-item" placeholder="Type exact item name to draw...">
            <button class="btn-save" style="width:100%; background:#ffaa00;" onclick="openPixelEditor()">Open Matrix Canvas Box</button>
          </div>
        </div>
        <button class="btn-save" onclick="savePrizePools()">Save Setup</button>
      </div>

      <!-- RATES OPTIONS SCREEN -->
      <div id="options-screen" class="holo-menu">
        <div class="menu-header">Adjust Probability %</div>
        <div class="menu-body">
          <div class="menu-group"><label>Common Tier Weight (%)</label><input type="number" id="weight-common" value="60"></div>
          <div class="menu-group"><label>Uncommon Tier Weight (%)</label><input type="number" id="weight-uncommon" value="30"></div>
          <div class="menu-group"><label>Global Threshold Probability (%)</label><input type="number" id="rate-global" value="5"></div>
          <div class="menu-group"><label>HOF Threshold Probability (%)</label><input type="number" id="rate-hof" value="1.5"></div>
          <div style="margin-top:10px;">
            <input type="checkbox" id="opt-fadeaway" checked> <label style="display:inline;" for="opt-fadeaway">Auto-Fadeaway</label>
          </div>
        </div>
        <button class="btn-save" onclick="saveOptions()">Apply Parameters</button>
      </div>

      <!-- PIXEL DESIGN MATRIX FRAME -->
      <div id="pixel-editor-screen" class="holo-menu" style="z-index:10;">
        <div class="menu-header">Drawing: <span id="drawing-item-name" style="color:#ffaa00;">None</span></div>
        <div id="pixel-grid"></div>
        <div style="display:flex; gap:5px;">
          <button class="btn-save" style="flex:1; background:#ff3330; color:#fff;" onclick="clearPixelGrid()">Clear</button>
          <button class="btn-save" style="flex:1;" onclick="savePixelArtwork()">Bind Image</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const STREAMER_NAME = "jaedraze";
    const userCooldowns = new Map();
    let actionQueue = [], activeSession = null;

    let systemOptions = { fadeaway: true, wCommon: 60, wUncommon: 30, rGlobal: 5, rHof: 1.5 };
    
    let LOOT_POOLS = {
      common: ["Lysterium Ore", "Calypso Cod", "Rusty Hook", "Standard Matrix"],
      uncommon: ["Iron Ore", "Rigid Snapper", "Electronic Component"],
      rare: ["Zorn Star Ore", "Deep Sea Skreem", "Weapon Blueprint"]
    };

    let CUSTOM_ARTWORKS = {}; // Holds string mapping of 144 bit matrices

    const monitor = document.getElementById('arcade-monitor');
    const canvas = document.getElementById('retroCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    if (systemOptions.fadeaway) monitor.style.opacity = "0";

    // Build the 12x12 Editor Matrix grid components dynamically
    const gridContainer = document.getElementById('pixel-grid');
    for (let i = 0; i < 144; i++) {
      const cell = document.createElement('div');
      cell.className = 'pixel-cell';
      cell.onclick = () => cell.classList.toggle('active');
      gridContainer.appendChild(cell);
    }

    ComfyJS.onCommand = (user, command, message, flags, extra) => {
      const cmd = command.toLowerCase();
      const isStreamer = (user.toLowerCase() === STREAMER_NAME.toLowerCase() || flags.broadcaster || flags.mod);

      if (isStreamer && cmd === "editholoscreenprizes") {
        document.getElementById('pool-common').value = LOOT_POOLS.common.join(', ');
        document.getElementById('pool-uncommon').value = LOOT_POOLS.uncommon.join(', ');
        document.getElementById('pool-rare').value = LOOT_POOLS.rare.join(', ');
        document.getElementById('prize-screen').style.display = "flex";
        monitor.style.opacity = "1";
        return;
      }

      if (isStreamer && cmd === "options") {
        document.getElementById('weight-common').value = systemOptions.wCommon;
        document.getElementById('weight-uncommon').value = systemOptions.wUncommon;
        document.getElementById('rate-global').value = systemOptions.rGlobal;
        document.getElementById('rate-hof').value = systemOptions.rHof;
        document.getElementById('opt-fadeaway').checked = systemOptions.fadeaway;
        document.getElementById('options-screen').style.display = "flex";
        monitor.style.opacity = "1";
        return;
      }

      if (cmd === "fish" || cmd === "mine" || cmd === "craft") {
        const now = Date.now();
        if (!isStreamer && userCooldowns.has(user) && (now - userCooldowns.get(user) < 10000)) return;
        userCooldowns.set(user, now);
        actionQueue.push({ user, type: cmd });
        if (systemOptions.fadeaway) monitor.style.opacity = "1";
        if (!activeSession) processNextQueueItem();
      }
    };

    function openPixelEditor() {
      const itemName = document.getElementById('target-draw-item').value.trim();
      if (!itemName) return alert("Please enter a valid item name first!");
      document.getElementById('drawing-item-name').innerText = itemName;
      clearPixelGrid();
      
      if (CUSTOM_ARTWORKS[itemName]) {
        const dots = gridContainer.children;
        CUSTOM_ARTWORKS[itemName].forEach((val, index) => {
          if (val === 1) dots[index].classList.add('active');
        });
      }
      document.getElementById('pixel-editor-screen').style.display = "flex";
    }

    function clearPixelGrid() {
      Array.from(gridContainer.children).forEach(c => c.classList.remove('active'));
    }

    function savePixelArtwork() {
      const itemName = document.getElementById('drawing-item-name').innerText;
      const matrix = Array.from(gridContainer.children).map(c => c.classList.contains('active') ? 1 : 0);
      CUSTOM_ARTWORKS[itemName] = matrix;
      document.getElementById('pixel-editor-screen').style.display = "none";
      printLog(`[SYS] Custom matrix artwork bound to ${itemName}`);
    }

    function savePrizePools() {
      LOOT_POOLS.common = document.getElementById('pool-common').value.split(',').map(s => s.trim()).filter(Boolean);
      LOOT_POOLS.uncommon = document.getElementById('pool-uncommon').value.split(',').map(s => s.trim()).filter(Boolean);
      LOOT_POOLS.rare = document.getElementById('pool-rare').value.split(',').map(s => s.trim()).filter(Boolean);
      document.getElementById('prize-screen').style.display = "none";
      if (systemOptions.fadeaway && !activeSession) monitor.style.opacity = "0";
    }

    function saveOptions() {
      systemOptions.wCommon = parseFloat(document.getElementById('weight-common').value);
      systemOptions.wUncommon = parseFloat(document.getElementById('weight-uncommon').value);
      systemOptions.rGlobal = parseFloat(document.getElementById('rate-global').value);
      systemOptions.rHof = parseFloat(document.getElementById('rate-hof').value);
      systemOptions.fadeaway = document.getElementById('opt-fadeaway').checked;
      document.getElementById('options-screen').style.display = "none";
      monitor.style.opacity = systemOptions.fadeaway && !activeSession ? "0" : "1";
    }

    function printLog(msg) {
      const log = document.getElementById('feed-log');
      const div = document.createElement('div'); div.innerText = msg; log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      if (log.children.length > 5) log.removeChild(log.firstChild);
    }

    function processNextQueueItem() {
      if (actionQueue.length === 0) {
        activeSession = null; resetCanvasFrame();
        if (systemOptions.fadeaway) setTimeout(() => { if (!activeSession) monitor.style.opacity = "0"; }, 1500);
        return;
      }
      activeSession = actionQueue.shift();
      initAnimation(activeSession.type, activeSession.user);
    }

    function resetCanvasFrame() {
      ctx.fillStyle = "#010a0f"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#00ffcc"; ctx.font = "bold 11px monospace";
      ctx.fillText("SYSTEM LOGGED // WAITING FOR DIRECTIVE", 40, 200);
      monitor.className = "";
      document.getElementById('result-title').innerText = "STANDBY";
      document.getElementById('result-item').innerText = "Enter !fish, !mine, or !craft";
    }

    function initAnimation(type, user) {
      let frame = 0, maxFrames = 100;
      
      // Roll Rarity Tier based on weights
      const rollTier = Math.random() * 100;
      let activeTier = "common";
      if (rollTier > systemOptions.wCommon + systemOptions.wUncommon) activeTier = "rare";
      else if (rollTier > systemOptions.wCommon) activeTier = "uncommon";
      
      const pool = LOOT_POOLS[activeTier];
      const winItem = pool[Math.floor(Math.random() * pool.length)] || "Spelt Fragment";

      // Roll Cash Returns (Global / HOF Checks)
      const rollGold = Math.random() * 100;
      let sizeText = "Minimal Find", classification = "normal", ped = (Math.random() * 1.2 + 0.02).toFixed(2);

      if (rollGold < systemOptions.rHof) { sizeText = "HALL OF FAME!!!"; ped = (Math.random() * 1200 + 1000).toFixed(2); classification = "hof"; }
      else if (rollGold < systemOptions.rHof + systemOptions.rGlobal) { sizeText = "GLOBAL!"; ped = (Math.random() * 300 + 200).toFixed(2); classification = "global"; }
      else if (rollGold < 30) { sizeText = "Sizable Extract"; ped = (Math.random() * 35 + 8).toFixed(2); }

      document.getElementById('result-title').innerText = "SCANNING...";
      document.getElementById('result-item').innerText = `Target Lock: ${user}`;

      function renderLoop() {
        ctx.fillStyle = "#010a0f"; ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (type === 'fish') {
          ctx.fillStyle = "#022433"; ctx.fillRect(0, 240, canvas.width, 170); 
          ctx.fillStyle = "#00ffcc"; ctx.fillRect(40, 210, 15, 30); 
          ctx.strokeStyle = "#88eeff"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(55, 215); ctx.lineTo(190 + (frame*0.4), 245 + Math.sin(frame*0.25)*6); ctx.stroke(); 
        } else if (type === 'mine') {
          ctx.fillStyle = "#3a2212"; ctx.fillRect(0, 160, canvas.width, 250); 
          ctx.fillStyle = "#00ffcc"; ctx.fillRect(200, 40, 40, 20); 
          ctx.fillStyle = "#ffaa00"; ctx.fillRect(218, 60, 4, Math.min(frame * 4, 280)); 
        } else if (type === 'craft') {
          ctx.fillStyle = "rgba(0, 255, 204, 0.05)"; ctx.fillRect(120, 130, 200, 150);
          ctx.fillStyle = (frame % 6 < 3) ? "#ffaa00" : "#00ffcc"; ctx.fillRect(170 + Math.sin(frame*0.5)*3, 175, 100, 60); 
        }

        frame++;
        if (frame < maxFrames) requestAnimationFrame(renderLoop);
        else triggerLootReveal(user, winItem, ped, sizeText, classification);
      }
      renderLoop();
    }

    function triggerLootReveal(user, item, ped, sizeText, classification) {
      document.getElementById('result-title').innerText = sizeText;
      document.getElementById('result-item').innerText = `${user} extracted: ${item}`;
      document.getElementById('ped-val').innerText = ped;
      printLog(`[FIND] ${user} -> ${item} (${ped} PED)`);

      monitor.className = "";
      if (classification === 'global') monitor.classList.add('global-flash');
      if (classification === 'hof') monitor.classList.add('hof-shake');

      // Draw item matrix display container card 
      ctx.fillStyle = "#02121a"; ctx.fillRect(140, 100, 160, 160);
      ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 2; ctx.strokeRect(140, 100, 160, 160);
      
      if (CUSTOM_ARTWORKS[item]) {
        // Render Streamer Custom Pixels
        let matrix = CUSTOM_ARTWORKS[item];
        let pSize = 10; // Pixel size bounds
        let startX = 160, startY = 120;
        ctx.fillStyle = "#00ffcc";
        for (let i = 0; i < 144; i++) {
          if (matrix[i] === 1) {
            let row = Math.floor(i / 12);
            let col = i % 12;
            ctx.fillRect(startX + (col * pSize), startY + (row * pSize), pSize - 1, pSize - 1);
          }
        }
      } else {
        // Procedural Fallback Blueprint Default Image
        ctx.fillStyle = "rgba(0, 255, 204, 0.2)"; ctx.fillRect(165, 145, 110, 50);
        ctx.fillStyle = "#ffffff"; ctx.fillRect(190, 135, 60, 10);
        ctx.fillStyle = "#ffaa00"; ctx.fillRect(215, 210, 12, 12);
      }

      setTimeout(() => { processNextQueueItem(); }, 6000);
    }

    ComfyJS.Init(STREAMER_NAME);
    resetCanvasFrame();
  </script>
</body>
</html>
