<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Fishing Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: transparent; /* Essential for OBS */
            font-family: 'Segoe UI', sans-serif;
        }

        #fishing-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        /* Chat Overlay Styling */
        #twitchMessagebox {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 320px;
            z-index: 10;
            display: flex;
            flex-direction: column-reverse;
        }

        .chatMessage {
            background: rgba(15, 15, 15, 0.85);
            border-left: 4px solid #00f2ff;
            color: white;
            margin: 4px 0;
            padding: 8px;
            border-radius: 0 4px 4px 0;
            font-size: 14px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Settings Box */
        #comfycontrolBox {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 8px;
            color: white;
            z-index: 100;
            border: 1px solid #333;
        }
        
        input { padding: 8px; border-radius: 4px; border: none; width: 180px; }
        button { cursor: pointer; padding: 8px 12px; border-radius: 4px; border: none; background: #9146ff; color: white; font-weight: bold; }
        button:hover { background: #772ce8; }
    </style>
</head>
<body>
    <div id="twitchMessagebox"></div>
    
<!--     <div id="comfycontrolBox">
        <input type="text" name="yourTextName" placeholder="Streamer Name">
        <button id="streamersButt">Connect</button>
        <button id="twitchdisconnectButt" style="display:none;">Disconnect</button>
        <button id="controls-toggle">Close</button>
    </div> -->
    <canvas id="fishing-canvas"></canvas>
    
    <div id="twitchMessagebox"></div>
    
    <div id="comfycontrolBox" style="display:none;">
        <input type="text" id="streamerNameInput" placeholder="Enter Twitch Name">
        <button id="streamersButt">Connect</button>
        <button id="twitchdisconnectButt" style="display:none;">Disconnect</button>
    </div>

    <script src="twitchChat.js"></script>
    <script src="fishGame.js"></script>

    <script>
        // Connect the UI buttons to your existing twitchChat.js functions
        document.getElementById("streamersButt").addEventListener("click", function() {
            const name = document.getElementById("streamerNameInput").value;
            if(typeof setStreamer === "function") setStreamer(name);
        });

        // Auto-connect if name is in local storage
        window.onload = () => {
            if(typeof connectStreamer === "function") connectStreamer();
        };
    </script>
</body>
</html>
