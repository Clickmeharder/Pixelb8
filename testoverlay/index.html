<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelb8 Omega | CMS Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.js"></script>
    <style>
        :root {
            --bg: rgba(24, 24, 27, 0.8);
            --border-width: 2px;
            --border-style: solid;
            --border-color: #9146ff;
            --border-radius: 12px;
            --font-size: 18px;
            --text-color: #ffffff;
            --accent: #9146ff;
        }

        body { 
            background: transparent; 
            color: var(--text-color); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 0;
            overflow: hidden; width: 100vw; height: 100vh;
        }

        .setup-container { 
            background: #18181b; border: 2px solid var(--accent);
            padding: 40px; border-radius: 12px; max-width: 550px; 
            margin: 50px auto; text-align: center; display: none;
            position: relative; z-index: 9999;
        }

        .p8-widget {
            position: absolute;
            background: var(--bg);
            border: var(--border-width) var(--border-style) var(--border-color);
            border-radius: var(--border-radius);
            font-size: var(--font-size);
            min-width: 200px; padding: 15px; 
            cursor: default; box-sizing: border-box;
            user-select: none;
        }
        
        body.edit-mode .p8-widget { 
            outline: 2px dashed rgba(145, 70, 255, 0.6); 
            cursor: grab; 
        }
        body.edit-mode .p8-widget:active { cursor: grabbing; }

        #p8-ctx-menu {
            position: fixed; background: #18181b; border: 1px solid #3f3f46;
            border-radius: 6px; display: none; z-index: 10000; width: 200px;
        }
        .ctx-item { padding: 10px 15px; cursor: pointer; font-size: 14px; color: #e4e4e7; border-bottom: 1px solid #27272a; }
        .ctx-item:last-child { border-bottom: none; }
        .ctx-item:hover { background: #27272a; color: var(--accent); }
        .ctx-danger { color: #ff4b4b !important; }

        #style-editor {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #18181b; border: 2px solid var(--accent);
            padding: 25px; display: none; z-index: 10001; width: 320px;
            border-radius: 12px; max-height: 85vh; overflow-y: auto;
        }
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { display: block; font-size: 11px; color: #a1a1aa; margin-bottom: 4px; }
        .input-group input { width: 100%; background: #09090b; border: 1px solid #3f3f46; color: white; padding: 8px; border-radius: 4px; box-sizing: border-box; }

        .obs-box { 
            background: #000; padding: 12px; border: 1px dashed #444; 
            margin: 10px 0; font-family: monospace; font-size: 12px; 
            cursor: copy; color: #00ff88; word-break: break-all;
        }

        .p8-btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: opacity 0.2s; }
        .p8-btn:hover { opacity: 0.8; }
        .save-btn { background: var(--accent); color: white; }
        .alt-btn { background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; }

        #chat-feed { display: flex; flex-direction: column-reverse; max-height: 300px; overflow: hidden; }
        .chat-msg { margin-bottom: 5px; font-size: 0.9em; }
        .chat-user { color: var(--accent); font-weight: bold; }
        #status-indicator { font-weight: bold; color: var(--accent); margin-bottom: 5px; }
        #mode-badge { font-size: 10px; opacity: 0.6; text-transform: uppercase; margin-top: 5px; color: #ffeb3b; }
    </style>
</head>
<body class="edit-mode">

    <div id="setup-interface" class="setup-container">
        <h2>PIXELB8 OMEGA</h2>
        <div id="auth-gate">
            <p>Authorize to generate your draggable overlay link.</p>
            <button id="login-button" class="p8-btn save-btn">Connect Twitch</button>
        </div>
        
        <div id="obs-instructions" style="display:none; margin-top: 20px;">
            <div id="obs-url-output" class="obs-box">Generating...</div>
            <p style="font-size: 11px; color: #71717a;">Copy this link into an OBS Browser Source.</p>
            <hr style="border: 0; border-top: 1px solid #27272a; margin: 20px 0;">
            <button id="quick-theme-btn" class="p8-btn alt-btn">Open Theme Editor</button>
            <button id="logout-btn-ui" class="p8-btn" style="background:transparent; color:#ef4444; font-size: 12px;">Disconnect Account</button>
        </div>
    </div>

    <div id="overlay-wrapper" style="display:none;">
        <div id="chat-widget" class="p8-widget" style="top: 500px; left: 20px; width: 400px;">
            <div id="chat-feed"></div>
        </div>
        <div id="alert-widget" class="p8-widget" style="top: 50px; left: 500px; text-align: center;">
            <div id="status-indicator">SYSTEM: OFFLINE</div>
            <div id="overlay-ui">Awaiting Signal...</div>
            <div id="mode-badge">Edit Mode Active</div>
        </div>
    </div>

    <div id="p8-ctx-menu">
        <div class="ctx-item" id="ctx-edit-global">Global Theme</div>
        <div class="ctx-item" id="ctx-edit-this">Edit This Element</div>
        <div class="ctx-item" id="ctx-lock">Lock/Unlock Layout</div>
        <div class="ctx-item ctx-danger" id="ctx-reset">Reset System (Logout)</div>
    </div>

    <div id="style-editor">
        <h3 style="margin-top:0">Editor</h3>
        <div id="controls-container"></div>
        <button class="p8-btn save-btn" id="save-style-btn">Save & Close</button>
        <button class="p8-btn" id="close-editor-btn" style="background:transparent; color:#666;">Cancel</button>
    </div>

    <script>
        const CLIENT_ID = "l1zvkm35dmtw4doj4y699nhnvx655c";
        const REDIRECT_URI = "pixelb8.lol/testoverlay";
        const FULL_REDIRECT = "https://" + REDIRECT_URI;
        
        let isEditMode = true, dragTarget = null, currentTarget = null, offset = { x: 0, y: 0 };

        const styleSchema = [
            { id: 'bg', label: 'Background Color', type: 'color', var: '--bg' },
            { id: 'border-width', label: 'Border (px)', type: 'number', var: '--border-width' },
            { id: 'border-color', label: 'Border Color', type: 'color', var: '--border-color' },
            { id: 'border-radius', label: 'Radius (px)', type: 'number', var: '--border-radius' },
            { id: 'font-size', label: 'Font Size (px)', type: 'number', var: '--font-size' }
        ];

        function init() {
            loadPersistedSettings();
            const params = new URLSearchParams(window.location.search);
            const obsToken = params.get("token"), obsChannel = params.get("channel");

            if (obsToken && obsChannel) {
                document.getElementById("overlay-wrapper").style.display = "block";
                setEditMode(false);
                startTwitch(obsChannel, obsToken);
            } else {
                document.getElementById("setup-interface").style.display = "block";
                checkTwitchAuth();
            }
            bindEvents();
        }

        function setEditMode(state) {
            isEditMode = state;
            const badge = document.getElementById('mode-badge');
            if (isEditMode) {
                document.body.classList.add('edit-mode');
                if(badge) badge.style.display = 'block';
            } else {
                document.body.classList.remove('edit-mode');
                if(badge) badge.style.display = 'none';
            }
            console.log("Edit Mode set to:", isEditMode);
        }

        function systemReset() {
            if(confirm("This will log you out and reset layout positions. Continue?")) {
                localStorage.clear();
                window.location.href = FULL_REDIRECT;
            }
        }

        function bindEvents() {
            // Login Logic
            document.getElementById("login-button").addEventListener("click", () => {
                window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(FULL_REDIRECT)}&response_type=token&scope=chat:read+chat:edit`;
            });

            // OBS Copy Logic
            document.getElementById("obs-url-output").addEventListener("click", function() {
                navigator.clipboard.writeText(this.innerText);
                const oldText = this.innerText;
                this.innerText = "COPIED!";
                setTimeout(() => this.innerText = oldText, 1500);
            });

            // Context Menu Actions
            document.getElementById("ctx-edit-global").addEventListener("click", (e) => { e.stopPropagation(); openEditor(null); });
            document.getElementById("quick-theme-btn").addEventListener("click", () => openEditor(null));
            document.getElementById("ctx-edit-this").addEventListener("click", (e) => { e.stopPropagation(); openEditor(currentTarget); });
            document.getElementById("ctx-reset").addEventListener("click", (e) => { e.stopPropagation(); systemReset(); });
            document.getElementById("logout-btn-ui").addEventListener("click", systemReset);
            
            document.getElementById("ctx-lock").addEventListener("click", (e) => {
                e.stopPropagation();
                setEditMode(!isEditMode);
                document.getElementById('p8-ctx-menu').style.display = 'none';
            });

            document.getElementById("save-style-btn").addEventListener("click", () => document.getElementById('style-editor').style.display = 'none');
            document.getElementById("close-editor-btn").addEventListener("click", () => document.getElementById('style-editor').style.display = 'none');

            // Right Click for Context Menu
            window.addEventListener('contextmenu', e => {
                e.preventDefault();
                currentTarget = e.target.closest('.p8-widget');
                const menu = document.getElementById('p8-ctx-menu');
                menu.style.display = 'block'; 
                menu.style.left = e.clientX + 'px'; 
                menu.style.top = e.clientY + 'px';
            });

            // Dragging Logic
            window.addEventListener('mousedown', e => {
                const menu = document.getElementById('p8-ctx-menu');
                
                // If clicking outside menu, hide it
                if (menu.style.display === 'block' && !menu.contains(e.target)) {
                    menu.style.display = 'none';
                }

                if (!isEditMode || e.button !== 0 || e.target.closest('input') || e.target.closest('.obs-box') || e.target.closest('.setup-container')) return;
                
                dragTarget = e.target.closest('.p8-widget');
                if (dragTarget) {
                    const r = dragTarget.getBoundingClientRect();
                    offset = { x: e.clientX - r.left, y: e.clientY - r.top };
                }
            });

            window.addEventListener('mousemove', e => {
                if (dragTarget) {
                    dragTarget.style.left = (e.clientX - offset.x) + 'px';
                    dragTarget.style.top = (e.clientY - offset.y) + 'px';
                }
            });

            window.addEventListener('mouseup', () => {
                if (dragTarget) {
                    localStorage.setItem(`p8_pos_${dragTarget.id}`, JSON.stringify({top: dragTarget.style.top, left: dragTarget.style.left}));
                    dragTarget = null;
                }
            });
        }

        function openEditor(el) {
            const container = document.getElementById('controls-container');
            container.innerHTML = '';
            styleSchema.forEach(s => {
                const source = el || document.documentElement;
                let val = getComputedStyle(source).getPropertyValue(s.var).trim();
                if(s.type === 'number') val = parseInt(val) || 0;
                
                const g = document.createElement('div');
                g.className = 'input-group';
                g.innerHTML = `<label>${s.label}</label><input type="${s.type}" value="${val}">`;
                container.appendChild(g);

                g.querySelector('input').addEventListener('input', e => {
                    const finalVal = e.target.value + (s.type === 'number' ? 'px' : '');
                    source.style.setProperty(s.var, finalVal);
                    const key = el ? `p8_elem_${el.id}` : 'p8_theme_global';
                    let settings = JSON.parse(localStorage.getItem(key)) || {};
                    settings[s.var] = finalVal;
                    localStorage.setItem(key, JSON.stringify(settings));
                });
            });
            document.getElementById('style-editor').style.display = 'block';
            document.getElementById('p8-ctx-menu').style.display = 'none';
        }

        function loadPersistedSettings() {
            const global = JSON.parse(localStorage.getItem('p8_theme_global'));
            if(global) Object.keys(global).forEach(k => document.documentElement.style.setProperty(k, global[k]));
            
            document.querySelectorAll('.p8-widget').forEach(el => {
                const pos = JSON.parse(localStorage.getItem(`p8_pos_${el.id}`));
                if(pos) { el.style.top = pos.top; el.style.left = pos.left; }
                const styles = JSON.parse(localStorage.getItem(`p8_elem_${el.id}`));
                if(styles) Object.keys(styles).forEach(k => el.style.setProperty(k, styles[k]));
            });
        }

        async function checkTwitchAuth() {
            const h = new URLSearchParams(window.location.hash.substring(1));
            const token = h.get("access_token");
            if (token) {
                const res = await fetch("https://api.twitch.tv/helix/users", {
                    headers: { "Authorization": `Bearer ${token}`, "Client-Id": CLIENT_ID }
                });
                const d = await res.json();
                const channelName = d.data[0].login;
                document.getElementById("auth-gate").style.display = "none";
                document.getElementById("obs-instructions").style.display = "block";
                document.getElementById("obs-url-output").innerText = `${FULL_REDIRECT}?channel=${channelName}&token=${token}`;
                history.replaceState(null, "", FULL_REDIRECT);
            }
        }

        function startTwitch(channel, token) {
            const formattedToken = token.startsWith("oauth:") ? token : `oauth:${token}`;
            ComfyJS.onConnected = () => {
                document.getElementById("status-indicator").innerText = "SYSTEM: ONLINE";
                document.getElementById("status-indicator").style.color = "#00ff88";
                document.getElementById("overlay-ui").innerText = `CONNECTED TO: ${channel.toUpperCase()}`;
            };

            ComfyJS.onChat = (user, message) => {
                const feed = document.getElementById("chat-feed");
                const m = document.createElement("div");
                m.className = "chat-msg";
                m.innerHTML = `<span class="chat-user">${user}:</span> ${message}`;
                feed.prepend(m);
                if (feed.childNodes.length > 15) feed.lastChild.remove();
            };
            ComfyJS.Init(channel, formattedToken);
        }

        init();
    </script>
</body>
</html>
