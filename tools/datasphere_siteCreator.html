<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datasphere Site Builder</title>

<style>
:root{
--bg:#0f1115;
--panel:#161a22;
--soft:#1e2430;
--accent:#00e676;
--text:#e4e7ec;
--muted:#8a93a6;
--border:#2a3140;
font-family:Inter,system-ui,Arial;
}

*{box-sizing:border-box;}
body{
margin:0;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
width:320px;
background:var(--panel);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
transition:0.25s ease;
}

#sidebar.collapsed{
width:0;
overflow:hidden;
}

#sidebarHeader{
padding:15px;
font-weight:600;
border-bottom:1px solid var(--border);
letter-spacing:1px;
color:var(--accent);
}

#sidebarContent{
flex:1;
overflow:auto;
padding:15px;
}

.sectionTitle{
font-size:12px;
text-transform:uppercase;
color:var(--muted);
margin:20px 0 8px;
letter-spacing:1px;
}

button,input,select,textarea{
width:100%;
margin-bottom:8px;
background:var(--soft);
border:1px solid var(--border);
color:var(--text);
padding:8px;
font-size:13px;
border-radius:6px;
}

button:hover{
border-color:var(--accent);
box-shadow:0 0 6px rgba(0,230,118,0.3);
cursor:pointer;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

#toolbar{
height:50px;
background:var(--panel);
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
padding:0 15px;
gap:10px;
}

#canvasWrap{
flex:1;
overflow:auto;
display:flex;
justify-content:center;
padding:40px;
}

#frame{
width:1100px;
min-height:900px;
background:#fff;
position:relative;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* WIDGET */
.widget{
position:absolute;
border:1px dashed transparent;
padding:10px;
cursor:move;
}

.widget.active{
border:1px solid var(--accent);
}

/* CODE VIEW */
#codeModal{
position:fixed;
inset:0;
background:#000000e0;
display:none;
flex-direction:column;
padding:30px;
z-index:999;
}

#codeTabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

#codeArea{
flex:1;
display:flex;
gap:10px;
}

.codePane{
flex:1;
background:#111;
border:1px solid #333;
color:#00ff99;
padding:15px;
overflow:auto;
font-family:monospace;
font-size:12px;
white-space:pre;
}
</style>
</head>
<body>

<div id="sidebar">
<div id="sidebarHeader">DATASPHERE</div>
<div id="sidebarContent"></div>
</div>

<div id="main">
<div id="toolbar">
<button onclick="toggleSidebar()">☰</button>
<button onclick="addComponentUI()">+ Component</button>
<button onclick="addPage()">+ Page</button>
<button onclick="openCodeView()">Code View</button>
</div>
<div id="canvasWrap">
<div id="frame"></div>
</div>
</div>

<div id="codeModal">
<div id="codeTabs">
<button onclick="closeCodeView()">Close</button>
</div>
<div id="codeArea">
<div class="codePane" id="htmlPane"></div>
<div class="codePane" id="cssPane"></div>
<div class="codePane" id="jsPane"></div>
</div>
</div>

<script>

/* =========================
   STATE
========================= */

const DS={
pages:{home:{id:"home",widgets:[]}},
currentPage:"home",
components:{},
active:null,
ui:{sidebar:true}
};

/* =========================
   COMPONENT REGISTRY
========================= */

function registerComponent(def){
DS.components[def.type]=def;
}

registerComponent({
type:"text",
label:"Text",
defaultData(){
return{
id:crypto.randomUUID(),
type:"text",
x:100,y:100,w:300,
content:"Editable text",
styles:{}
};
},
render(w,el){
el.innerHTML=`<div contenteditable>${w.content}</div>`;
},
inspector(w){
return `
<label>Content</label>
<textarea onchange="updateContent('${w.id}',this.value)">${w.content}</textarea>
`;
}
});

registerComponent({
type:"image",
label:"Image",
defaultData(){
return{
id:crypto.randomUUID(),
type:"image",
x:100,y:100,w:300,
content:"https://placehold.co/600x400",
styles:{}
};
},
render(w,el){
el.innerHTML=`<img src="${w.content}" style="width:100%">`;
},
inspector(w){
return `
<label>Image URL</label>
<input value="${w.content}" onchange="updateContent('${w.id}',this.value)">
`;
}
});

/* =========================
   UI FUNCTIONS
========================= */

function toggleSidebar(){
DS.ui.sidebar=!DS.ui.sidebar;
document.getElementById("sidebar").classList.toggle("collapsed");
}

function addComponentUI(){
const type=prompt("Component type (text,image)?");
if(!DS.components[type]) return;
const comp=DS.components[type].defaultData();
DS.pages[DS.currentPage].widgets.push(comp);
DS.active=comp.id;
render();
}

/* =========================
   RENDER
========================= */

function render(){
const frame=document.getElementById("frame");
frame.innerHTML="";
const page=DS.pages[DS.currentPage];

page.widgets.forEach(w=>{
const el=document.createElement("div");
el.className="widget";
if(w.id===DS.active) el.classList.add("active");
el.style.left=w.x+"px";
el.style.top=w.y+"px";
el.style.width=w.w+"px";
Object.assign(el.style,w.styles);

el.onmousedown=e=>startDrag(e,w.id);

DS.components[w.type].render(w,el);
frame.appendChild(el);
});

renderInspector();
}

/* =========================
   INSPECTOR
========================= */

function renderInspector(){
const side=document.getElementById("sidebarContent");
if(!DS.active){ side.innerHTML="Select a component"; return; }

const w=getWidget(DS.active);
let html=`<div class="sectionTitle">Inspector</div>`;
html+=DS.components[w.type].inspector(w);

html+=`
<div class="sectionTitle">Layout</div>
<label>Width</label>
<input value="${w.w}" onchange="updateWidth('${w.id}',this.value)">
<label>X</label>
<input value="${w.x}" onchange="updatePos('${w.id}','x',this.value)">
<label>Y</label>
<input value="${w.y}" onchange="updatePos('${w.id}','y',this.value)">
`;

side.innerHTML=html;
}

/* =========================
   UPDATE
========================= */

function getWidget(id){
return DS.pages[DS.currentPage].widgets.find(w=>w.id===id);
}

function updateContent(id,val){
getWidget(id).content=val;
render();
}

function updateWidth(id,val){
getWidget(id).w=parseInt(val);
render();
}

function updatePos(id,key,val){
getWidget(id)[key]=parseInt(val);
render();
}

/* =========================
   DRAG
========================= */

let drag=null;

function startDrag(e,id){
DS.active=id;
drag={id,startX:e.clientX,startY:e.clientY};
}

document.addEventListener("mousemove",e=>{
if(!drag)return;
const w=getWidget(drag.id);
w.x+=e.clientX-drag.startX;
w.y+=e.clientY-drag.startY;
drag.startX=e.clientX;
drag.startY=e.clientY;
render();
});

document.addEventListener("mouseup",()=>drag=null);

/* =========================
   CODE VIEW
========================= */

function openCodeView(){
document.getElementById("codeModal").style.display="flex";
generateCode();
}

function closeCodeView(){
document.getElementById("codeModal").style.display="none";
}

function generateCode(){
const page=DS.pages[DS.currentPage];
let html="",css="",js="";

page.widgets.forEach(w=>{
html+=`<div style="position:absolute;left:${w.x}px;top:${w.y}px;width:${w.w}px;">`;
if(w.type==="text") html+=`<div>${w.content}</div>`;
if(w.type==="image") html+=`<img src="${w.content}" style="width:100%">`;
html+="</div>\n";
});

document.getElementById("htmlPane").textContent=html;
document.getElementById("cssPane").textContent=css;
document.getElementById("jsPane").textContent=js;
}

/* ========================= */

function addPage(){
const name=prompt("Page name?");
if(!name)return;
DS.pages[name]={id:name,widgets:[]};
DS.currentPage=name;
render();
}

render();

</script>
</body>
</html>
