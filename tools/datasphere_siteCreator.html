<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="../assets/images/logo/pixelbotfavicon.png">
<title>Pixelb8 Omega Engine V6</title>

<link rel="stylesheet" href="css/engine.css">
</head>
<body>

<div id="sidebar">

<h3>PAGES</h3>
<div id="pageList"></div>
<button onclick="addPage()">+ Add Page</button>

<h3>COMPONENTS</h3>
<button onclick="addWidget('header')">Header</button>
<button onclick="addWidget('text')">Text</button>
<button onclick="addWidget('image')">Image</button>
<button onclick="addWidget('button')">Button</button>

<h3>THEME</h3>
<input type="color" onchange="updateTheme('--neon',this.value)">
<input type="color" onchange="updateTheme('--bg',this.value)">

<h3>ACTIONS</h3>
<button onclick="duplicateWidget()">Duplicate</button>
<button onclick="deleteWidget()">Delete</button>
<button onclick="exportHTML()">Export HTML</button>
<button onclick="wipe()">Wipe Page</button>

</div>

<div id="main">
<div id="toolbar">
<strong>Pixelb8 State Engine</strong>
</div>
<div id="canvasWrap">
<div id="frame"></div>
</div>
</div>

<script src="js/engine.js"></script>
</body>
</html>
