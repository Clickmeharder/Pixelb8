
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixelb8 Omega Engine V6</title>

<link rel="stylesheet" href="css/datasphere_creation_engine.css">
</head>
<body>

<div id="sidebar">

<div style="display:flex;justify-content:space-between;align-items:center;">
<h3>PAGES</h3>
<button onclick="UI.toggleSidebar()" style="width:auto;padding:4px 8px;">☰</button>
</div>

<div id="pageList"></div>
<button onclick="Pages.add()">+ Add Page</button>

<h3>COMPONENTS</h3>
<button onclick="Widgets.add('header')">Header</button>
<button onclick="Widgets.add('text')">Text</button>
<button onclick="Widgets.add('image')">Image</button>
<button onclick="Widgets.add('button')">Button</button>

<h3>THEME</h3>
<input type="color" onchange="Theme.update('--neon',this.value)">
<input type="color" onchange="Theme.update('--bg',this.value)">

<h3>ACTIONS</h3>
<button onclick="Widgets.duplicate()">Duplicate</button>
<button onclick="Widgets.remove()">Delete</button>
<button onclick="UI.toggleCode()">Code View</button>
<button onclick="Pages.wipe()">Wipe Page</button>

</div>

<div id="main">
<div id="toolbar">
<strong>Pixelb8 Modular Engine</strong>
</div>

<div id="canvasWrap">
<div id="frame"></div>
</div>

<!-- CODE VIEW PANEL -->
<div id="codePanel" style="display:none;position:absolute;top:0;right:0;bottom:0;width:50%;background:#111;color:#0f0;overflow:auto;padding:10px;z-index:999;">
<div style="display:flex;gap:5px;margin-bottom:5px;">
<button onclick="CodeView.switchTab('html')">HTML</button>
<button onclick="CodeView.switchTab('css')">CSS</button>
<button onclick="CodeView.switchTab('js')">JS</button>
<button onclick="UI.toggleCode()">Close</button>
</div>
<textarea id="codeArea" style="width:100%;height:90%;background:#000;color:#0f0;font-family:Courier New, monospace;"></textarea>
</div>

</div>

<script src="js/datasphere_creation_engine.js"></script>
</body>
</html>
