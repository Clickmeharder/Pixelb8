<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datasphere Site Builder</title>

<style>
:root{
--accent:#00e676;
--bg:#0d0d0d;
--panel:#151922;
--border:#2a3140;
--text:#e4e7ec;
--muted:#7d8596;
font-family:Inter,system-ui,Arial;
}

*{box-sizing:border-box;}
body{
margin:0;
display:flex;
height:100vh;
background:#0b0e13;
color:var(--text);
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
width:320px;
background:var(--panel);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
transition:.25s ease;
overflow:hidden;
}

#sidebar.collapsed{
width:0;
}

#sidebarInner{
flex:1;
overflow:auto;
padding:15px;
}

.section{
margin-bottom:25px;
}

.section h3{
margin:0 0 8px;
font-size:11px;
text-transform:uppercase;
letter-spacing:1px;
color:var(--accent);
}

button,input{
width:100%;
margin-bottom:6px;
background:#0f141d;
border:1px solid var(--border);
color:var(--text);
padding:7px;
font-size:12px;
border-radius:6px;
}

button:hover{
border-color:var(--accent);
cursor:pointer;
box-shadow:0 0 6px rgba(0,230,118,0.3);
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#toolbar{
height:50px;
background:#11151c;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
gap:10px;
padding:0 15px;
}

#canvasWrap{
flex:1;
overflow:auto;
display:flex;
justify-content:center;
padding:40px;
background-image:radial-gradient(#1a1f29 1px,transparent 1px);
background-size:25px 25px;
}

#frame{
width:1000px;
min-height:1000px;
background:var(--bg);
position:relative;
border:1px solid var(--border);
}

.widget{
position:absolute;
border:1px dashed transparent;
padding:10px;
cursor:move;
}

.widget.active{
border:1px solid var(--accent);
}

.pb-btn{
background:var(--accent);
color:#000;
padding:8px 14px;
display:inline-block;
text-decoration:none;
font-weight:bold;
}

/* CODE VIEW */
#codeModal{
position:fixed;
inset:0;
background:#000000e6;
display:none;
flex-direction:column;
padding:30px;
z-index:999;
}

.codePane{
flex:1;
background:#111;
border:1px solid #333;
color:#00ff99;
padding:15px;
overflow:auto;
font-family:monospace;
font-size:12px;
white-space:pre;
}
</style>
</head>
<body>

<div id="sidebar">
<div id="sidebarInner"></div>
</div>

<div id="main">
<div id="toolbar">
<button onclick="toggleSidebar()">☰</button>
<strong>Datasphere Site Builder</strong>
<button onclick="openCodeView()">Code View</button>
</div>
<div id="canvasWrap">
<div id="frame"></div>
</div>
</div>

<div id="codeModal">
<button onclick="closeCodeView()">Close</button>
<div style="display:flex;gap:10px;height:100%;">
<div class="codePane" id="htmlPane"></div>
<div class="codePane" id="cssPane"></div>
<div class="codePane" id="jsPane"></div>
</div>
</div>

<script>

/* ======================
   STATE
====================== */

const DS={
meta:{
accent:"#00e676",
bg:"#0d0d0d"
},
pages:{
home:{id:"home",widgets:[]}
},
currentPage:"home",
components:{}
};

let activeId=null;

/* ======================
   COMPONENT REGISTRY
====================== */

function registerComponent(def){
DS.components[def.type]=def;
}

registerComponent({
type:"header",
label:"Header",
defaultData(){
return{
id:crypto.randomUUID(),
type:"header",
x:50,y:50,w:300,z:1,
content:"New Header",
styles:{}
};
},
render(w,el){
el.innerHTML=`<h1 contenteditable>${w.content}</h1>`;
},
export(w){
return `<h1>${w.content}</h1>`;
}
});

registerComponent({
type:"text",
label:"Text",
defaultData(){
return{
id:crypto.randomUUID(),
type:"text",
x:50,y:50,w:300,z:1,
content:"Editable text block...",
styles:{}
};
},
render(w,el){
el.innerHTML=`<p contenteditable>${w.content}</p>`;
},
export(w){
return `<p>${w.content}</p>`;
}
});

registerComponent({
type:"image",
label:"Image",
defaultData(){
return{
id:crypto.randomUUID(),
type:"image",
x:50,y:50,w:300,z:1,
content:"https://placehold.co/600x400",
styles:{}
};
},
render(w,el){
el.innerHTML=`<img src="${w.content}" style="width:100%">`;
},
export(w){
return `<img src="${w.content}" style="width:100%">`;
}
});

registerComponent({
type:"button",
label:"Button",
defaultData(){
return{
id:crypto.randomUUID(),
type:"button",
x:50,y:50,w:200,z:1,
content:"Click Me",
styles:{}
};
},
render(w,el){
el.innerHTML=`<a href="#" class="pb-btn" contenteditable>${w.content}</a>`;
},
export(w){
return `<a href="#" style="background:${DS.meta.accent};color:#000;padding:10px 20px;text-decoration:none;font-weight:bold;">${w.content}</a>`;
}
});

/* ======================
   UI RENDER
====================== */

function renderSidebar(){
const side=document.getElementById("sidebarInner");

let html="";

/* PAGES */
html+=`<div class="section"><h3>Pages</h3>`;
Object.keys(DS.pages).forEach(p=>{
html+=`<button onclick="switchPage('${p}')">${p}</button>`;
});
html+=`<button onclick="addPage()">+ Add Page</button></div>`;

/* COMPONENTS */
html+=`<div class="section"><h3>Components</h3>`;
Object.values(DS.components).forEach(c=>{
html+=`<button onclick="addWidget('${c.type}')">${c.label}</button>`;
});
html+=`</div>`;

/* THEME */
html+=`<div class="section"><h3>Theme</h3>
<label>Accent</label>
<input type="color" value="${DS.meta.accent}" onchange="updateTheme('accent',this.value)">
<label>Background</label>
<input type="color" value="${DS.meta.bg}" onchange="updateTheme('bg',this.value)">
</div>`;

/* ACTIONS */
html+=`<div class="section"><h3>Actions</h3>
<button onclick="duplicateWidget()">Duplicate</button>
<button onclick="deleteWidget()">Delete</button>
<button onclick="exportHTML()">Export HTML</button>
<button onclick="wipe()">Wipe Page</button>
</div>`;

side.innerHTML=html;
}

/* ======================
   PAGE SYSTEM
====================== */

function switchPage(name){
DS.currentPage=name;
renderAll();
}

function addPage(){
const name=prompt("Page name?");
if(!name)return;
DS.pages[name]={id:name,widgets:[]};
DS.currentPage=name;
renderAll();
}

/* ======================
   WIDGET SYSTEM
====================== */

function addWidget(type){
const comp=DS.components[type];
const w=comp.defaultData();
DS.pages[DS.currentPage].widgets.push(w);
activeId=w.id;
render();
}

function duplicateWidget(){
if(!activeId)return;
const page=DS.pages[DS.currentPage];
const original=page.widgets.find(w=>w.id===activeId);
if(!original)return;
const clone=JSON.parse(JSON.stringify(original));
clone.id=crypto.randomUUID();
clone.x+=20;
clone.y+=20;
page.widgets.push(clone);
activeId=clone.id;
render();
}

function deleteWidget(){
if(!activeId)return;
const page=DS.pages[DS.currentPage];
page.widgets=page.widgets.filter(w=>w.id!==activeId);
activeId=null;
render();
}

/* ======================
   RENDER ENGINE
====================== */

function render(){
const frame=document.getElementById("frame");
frame.innerHTML="";
frame.style.background=DS.meta.bg;

const page=DS.pages[DS.currentPage];

page.widgets.forEach(w=>{
const el=document.createElement("div");
el.className="widget";
if(w.id===activeId) el.classList.add("active");

el.style.left=w.x+"px";
el.style.top=w.y+"px";
el.style.width=w.w+"px";
el.style.zIndex=w.z;

Object.assign(el.style,w.styles);

el.onmousedown=e=>startDrag(e,w.id);

DS.components[w.type].render(w,el);

frame.appendChild(el);
});
}

function renderAll(){
renderSidebar();
render();
}

/* ======================
   DRAG
====================== */

let drag=null;

function startDrag(e,id){
activeId=id;
drag={id,startX:e.clientX,startY:e.clientY};
render();
}

document.addEventListener("mousemove",e=>{
if(!drag)return;
const w=DS.pages[DS.currentPage].widgets.find(x=>x.id===drag.id);
w.x+=e.clientX-drag.startX;
w.y+=e.clientY-drag.startY;
drag.startX=e.clientX;
drag.startY=e.clientY;
render();
});

document.addEventListener("mouseup",()=>drag=null);

/* ======================
   THEME
====================== */

function updateTheme(key,val){
DS.meta[key]=val;
render();
}

/* ======================
   EXPORT
====================== */

function exportHTML(){
const page=DS.pages[DS.currentPage];
let body="";

page.widgets.forEach(w=>{
body+=`<div style="position:absolute;left:${w.x}px;top:${w.y}px;width:${w.w}px;">`;
body+=DS.components[w.type].export(w);
body+="</div>";
});

const final=`<!DOCTYPE html>
<html>
<head>
<style>
body{background:#000;margin:0;font-family:sans-serif;}
#site{width:1000px;min-height:1000px;margin:50px auto;position:relative;background:${DS.meta.bg};}
</style>
</head>
<body>
<div id="site">${body}</div>
</body>
</html>`;

const blob=new Blob([final],{type:"text/html"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="datasphere-page.html";
a.click();
}

/* ======================
   WIPE
====================== */

function wipe(){
if(confirm("Wipe page?")){
DS.pages[DS.currentPage].widgets=[];
render();
}
}

/* ======================
   CODE VIEW
====================== */

function openCodeView(){
document.getElementById("codeModal").style.display="flex";
generateCode();
}

function closeCodeView(){
document.getElementById("codeModal").style.display="none";
}

function generateCode(){
const page=DS.pages[DS.currentPage];
let html="";
page.widgets.forEach(w=>{
html+=`<div style="position:absolute;left:${w.x}px;top:${w.y}px;width:${w.w}px;">`;
html+=DS.components[w.type].export(w);
html+="</div>\n";
});
document.getElementById("htmlPane").textContent=html;
document.getElementById("cssPane").textContent="";
document.getElementById("jsPane").textContent="";
}

/* ====================== */

renderAll();

</script>
</body>
</html>
