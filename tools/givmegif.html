<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Gif Creation Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <link rel="stylesheet" href="../core/css/pixelb8-landing.css">
	<link rel="stylesheet" href="../core/css/pixelb8-tools.css">
	<link rel="icon" type="image/png" href="../assets/images/logo/pixelbotfavicon.png">
	<link href="https://fonts.googleapis.com/css2?family=Yatra+One&amp;display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.0.0/js/bootstrap.min.js"></script>
	<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7382192474927902"
     crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: url('https://source.unsplash.com/1600x900/?cyberpunk,neon') no-repeat center center/cover;
            overflow: hidden;
            color: #0b7272;
            font-family: 'Orbitron', sans-serif;
        }

    </style>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #080808; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #111; padding: 2rem; border-radius: 15px; box-shadow: 0 0 40px rgba(0,255,200,0.15); max-width: 950px; width: 100%; border: 1px solid #222; }
        
        /* Editor Layout */
        .editor-layout { display: flex; gap: 30px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .preview-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .preview-box { background: #000; border: 2px solid #00ffcc; width: 112px; height: 112px; position: relative; overflow: hidden; }
        #liveCanvas { width: 112px; height: 112px; image-rendering: pixelated; background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%); background-size: 10px 10px; }

        /* Controls */
        .controls-panel { flex: 1; min-width: 320px; }
        .slider-group { margin-bottom: 12px; background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #222; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .val-badge { color: #00ffcc; font-family: monospace; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: #00ffcc; cursor: pointer; }
        
        /* Timeline */
        #timeline { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; padding: 15px; background: #050505; border-radius: 10px; border: 1px solid #222; min-height: 80px; }
        .frame-card { background: #222; padding: 4px; border-radius: 6px; border: 1px solid #333; transition: transform 0.1s; }
        .frame-card img { width: 64px; height: 64px; object-fit: contain; display: block; }
        .mini-btns { display: flex; justify-content: space-between; margin-top: 5px; gap: 2px; }
        .mini-btns button { flex: 1; padding: 3px 0; font-size: 10px; background: #333; color: white; border: none; cursor: pointer; border-radius: 2px; }
        .mini-btns button:hover { background: #444; }

        .main-btn { background: #00ffcc; color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; text-transform: uppercase; }
        .main-btn:hover { background: #00d4aa; transform: scale(1.02); }
        #status { margin-top: 20px; text-align: center; color: #00ffcc; font-weight: bold; }
    </style>

</head>
<body>
	<div class="background-container">
	  <div class="stars"></div>
	  <div class="twinkling"></div>
	</div>
    <div class="crt-overlay">
        <div class="scanlines"></div>
    </div>
    <div class="header">PixelB8.LoL - EU</div>
    <button class="menu-button" onclick="toggleMenu()">☰</button>
    <div class="nav-menu" id="navMenu">
        <a href="https://Pixelb8.lol/home">Home</a>
		<a href="https://Pixelb8.lol/eu">Entropia</a>
        <a href="https://Pixelb8.lol/media">Media</a>
		<a href="https://Pixelb8.lol/tools">Tools</a>
		<a href="https://Pixelb8.lol/givmegif.html">EU Tools</a>
		<a href="https://Pixelb8.lol/arcade">Arcade</a>
    </div>
	
	<div class="eu-container">
		<div class="container">
			<h2 style="margin:0; text-align: center; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,200,0.3);">Quick Gif Creation</h2>
			
			<div class="editor-layout">
				<div class="preview-section">
					<div class="preview-box">
						<canvas id="liveCanvas" width="112" height="112"></canvas>
					</div>
					<span style="font-size: 10px; color: #666;">LIVE 112x112 PREVIEW</span>
				</div>

				<div class="controls-panel">
					<input type="file" id="fileInput" accept="image/png" multiple style="margin-bottom: 20px; color: #888;">
					
					<div class="slider-group">
						<div class="slider-header"><label>Scale (Zoom)</label> <span class="val-badge" id="scaleVal">1.00</span></div>
						<input type="range" id="scale" min="0.1" max="4.0" step="0.05" value="1.0">
					</div>

					<div style="display: flex; gap: 10px;">
						<div class="slider-group" style="flex: 1;">
							<div class="slider-header"><label>Horizontal (X)</label> <span class="val-badge" id="xVal">0</span></div>
							<input type="range" id="xOffset" min="-112" max="112" step="1" value="0">
						</div>

						<div class="slider-group" style="flex: 1;">
							<div class="slider-header"><label>Vertical (Y)</label> <span class="val-badge" id="yVal">0</span></div>
							<input type="range" id="yOffset" min="-112" max="112" step="1" value="0">
						</div>
					</div>

					<div class="slider-group">
						<div class="slider-header"><label>Frame Delay (ms)</label> <span class="val-badge" id="delayVal">80</span></div>
						<input type="range" id="delay" min="10" max="500" step="10" value="80">
					</div>

					<button class="main-btn" onclick="generateGif()">EXPORT FOR TWITCH</button>
				</div>
			</div>

			<div id="timeline">
				<p style="color: #333; width: 100%; text-align: center; font-size: 0.9rem;">Drop your PNG frames here to begin...</p>
			</div>

			<div id="status"></div>
			<div id="result" style="text-align: center; margin-top: 20px;"></div>
		</div>
	</div>
<script>
    let frameList = [];
    const canvas = document.getElementById('liveCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    // UI Elements
    const scaleIn = document.getElementById('scale');
    const xIn = document.getElementById('xOffset');
    const yIn = document.getElementById('yOffset');
    const delayIn = document.getElementById('delay');

    const updateUI = () => {
        document.getElementById('scaleVal').innerText = parseFloat(scaleIn.value).toFixed(2);
        document.getElementById('xVal').innerText = xIn.value;
        document.getElementById('yVal').innerText = yIn.value;
        document.getElementById('delayVal').innerText = delayIn.value;
        drawPreview();
    };

    [scaleIn, xIn, yIn, delayIn].forEach(input => input.addEventListener('input', updateUI));

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        for (let file of e.target.files) {
            const img = await loadImage(file);
            frameList.push(img);
        }
        renderTimeline();
        updateUI();
    });

    function drawPreview() {
        if (frameList.length === 0) return;
        ctx.clearRect(0, 0, 112, 112);
        
        const scale = parseFloat(scaleIn.value);
        const xOff = parseInt(xIn.value);
        const yOff = parseInt(yIn.value);
        
        const img = frameList[0]; // Preview using frame 1
        const w = 112 * scale;
        const h = 112 * scale;
        const x = ((112 - w) / 2) + xOff;
        const y = ((112 - h) / 2) + yOff;

        ctx.drawImage(img, x, y, w, h);
    }

    function renderTimeline() {
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = '';
        frameList.forEach((img, i) => {
            const div = document.createElement('div');
            div.className = 'frame-card';
            div.innerHTML = `
                <img src="${img.src}">
                <div class="mini-btns">
                    <button onclick="move(${i}, -1)">◀</button>
                    <button onclick="dup(${i})">＋</button>
                    <button onclick="rem(${i})" style="color:#ff4444">X</button>
                    <button onclick="move(${i}, 1)">▶</button>
                </div>
            `;
            timeline.appendChild(div);
        });
    }

    function dup(i) { 
        const c = new Image(); c.src = frameList[i].src; 
        frameList.splice(i+1, 0, c); renderTimeline(); 
    }
    function rem(i) { frameList.splice(i, 1); renderTimeline(); updateUI(); }
    function move(i, d) {
        if(i+d < 0 || i+d >= frameList.length) return;
        [frameList[i], frameList[i+d]] = [frameList[i+d], frameList[i]];
        renderTimeline();
    }

    async function generateGif() {
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        if (frameList.length === 0) return alert("Upload frames first!");

        status.innerText = "🚧 GENERATING MASTERPIECE...";
        result.innerHTML = "";

        const scale = parseFloat(scaleIn.value);
        const xOff = parseInt(xIn.value);
        const yOff = parseInt(yIn.value);
        const delay = parseInt(delayIn.value);

        try {
            const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
            const workerBlob = new Blob([await response.text()], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(workerBlob);

            const gif = new GIF({
                workers: 4, quality: 1, width: 112, height: 112,
                transparent: 'rgba(0,0,0,0)', workerScript: workerUrl
            });

            const w = 112 * scale;
            const h = 112 * scale;
            const x = ((112 - w) / 2) + xOff;
            const y = ((112 - h) / 2) + yOff;

            frameList.forEach(img => {
                ctx.clearRect(0, 0, 112, 112);
                ctx.drawImage(img, x, y, w, h);
                gif.addFrame(ctx, {copy: true, delay: delay});
            });

            gif.on('finished', blob => {
                status.innerText = "✨ EMOTE RENDERED ✨";
                const url = URL.createObjectURL(blob);
                result.innerHTML = `
                    <div style="background:#000; padding:20px; border-radius:10px; display:inline-block; border:1px solid #333;">
                        <img src="${url}" style="width:112px; height:112px; border:2px solid #00ffcc;">
                        <br>
                        <a href="${url}" download="twitch_emote.gif" style="display:block; margin-top:15px; color:#00ffcc; text-decoration:none; font-weight:800; font-size:12px;">CLICK HERE TO DOWNLOAD</a>
                    </div>`;
                URL.revokeObjectURL(workerUrl);
            });

            gif.render();
        } catch (e) { status.innerText = "Error: " + e.message; }
    }

    function loadImage(file) {
        return new Promise(r => {
            const rd = new FileReader();
            rd.onload = e => { const i = new Image(); i.onload = () => r(i); i.src = e.target.result; };
            rd.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
