<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELB8 - Matrix City Core v2</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff66;
            --neon-purple: #bf00ff;
            --dark-bg: #020204;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 960px;
            height: 540px;
            border: 3px solid #1a1a24;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #boot-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: var(--neon-green);
            font-size: 14px;
        }

        .boot-log {
            width: 600px;
            height: 220px;
            border: 1px solid #222;
            background: #050505;
            padding: 15px;
            overflow-y: auto;
            margin-top: 15px;
            color: #888;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.4;
        }

        .hud {
            position: absolute;
            pointer-events: none;
            font-size: 12px;
            text-shadow: 1px 1px 2px #000;
            background: rgba(4, 4, 6, 0.9);
            padding: 10px 14px;
            border: 1px solid #222;
            backdrop-filter: blur(4px);
        }

        #location-hud { top: 20px; left: 20px; border-left: 3px solid var(--neon-blue); }
        #directory-hud { top: 20px; right: 20px; text-align: right; border-right: 3px solid var(--neon-purple); }
        #controls-hud { bottom: 20px; left: 20px; color: #aaa; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="boot-screen">
            <div style="letter-spacing: 2px; font-weight: bold;">PIXELB8 V2: COMPILING DOORS, SIGNS & HIGHWAYS...</div>
            <div class="boot-log" id="log-target"></div>
        </div>

        <canvas id="renderCanvas"></canvas>
        
        <div id="location-hud" class="hud">
            DISTRICT MATRIX NODE:<br>
            <strong id="zone-txt" style="font-size: 14px; color: var(--neon-blue); text-transform: uppercase;">INITIALIZING INTERFACES...</strong>
            <div id="coords-txt" style="color: #888; font-size: 10px; margin-top: 2px;">X: 0.0, Y: 0.0</div>
        </div>

        <div id="directory-hud" class="hud">
            RESOLVED INTERIOR INSTANCE:<br>
            <span id="url-txt" style="color: var(--neon-purple); font-weight: bold;">/</span>
        </div>

        <div id="controls-hud" class="hud">
            W,A,S,D / Arrows : Walk | Drag Mouse : Turn | Approach neon doorways to enter internal sub-pages
        </div>
    </div>

    <script>
        // =========================================================================
        // REPOSITORY LOCATOR TARGET BLOCK
        // =========================================================================
        const repoOwner = "clicmeharder"; 
        const repoName = "pixelb8";       

        const canvas = document.getElementById("renderCanvas");
        const ctx = canvas.getContext("2d");

        const R_WIDTH = 480;
        const R_HEIGHT = 270;
        canvas.width = R_WIDTH;
        canvas.height = R_HEIGHT;

        function logConsole(msg, color = "#888") {
            const tgt = document.getElementById("log-target");
            tgt.innerHTML += `<span style="color: ${color}">${msg}</span><br>`;
            tgt.scrollTop = tgt.scrollHeight;
        }

        // --- MAP STATE VECTORS ---
        const MAP_SIZE = 64; 
        let map = new Array(MAP_SIZE * MAP_SIZE).fill(1); // 1 = High-visibility matrix ground
        let routeDirectoryMap = {};
        let sectorNames = {}; // Store raw text tags keyed to building IDs for signboards

        // Render Layer ID Assignments
        const T_ROAD = 0;
        const T_GRASS = 1;
        const T_DOOR = 99; // Universal target value for portal doorways

        const player = { x: 32.5, y: 38.5, angle: -Math.PI / 2, fov: Math.PI / 3, speed: 0.10, rotSpeed: 0.045 };
        const keys = { w:false, a:false, s:false, d:false, arrowleft:false, arrowright:false };
        let globalPulse = 0;

        // --- DYNAMIC GITHUB ENDPOINT DISCOVERY CRAWLER ---
        async function buildAdvancedCircuitCity() {
            logConsole("Scanning GitHub repositories for absolute asset directories...", "var(--neon-blue)");
            let discoveredRoutes = [];

            try {
                let response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`);
                if (!response.ok) throw new Error(`HTTP status ${response.status}`);
                let data = await response.json();

                data.forEach(item => {
                    if (item.type === "dir") {
                        discoveredRoutes.push("/" + item.name);
                    } else if (item.type === "file" && item.name.endsWith(".html") && item.name !== "index.html") {
                        discoveredRoutes.push("/" + item.name.replace(".html", ""));
                    }
                });
            } catch (err) {
                logConsole("Fallback architecture deployed safely.", "var(--neon-purple)");
                discoveredRoutes = ["/shop", "/games", "/tools", "/stream", "/about"];
            }

            // --- CARVE INFRASTRUCTURE ROADS ---
            for (let x = 0; x < MAP_SIZE; x++) {
                for (let y = 32; y <= 35; y++) {
                    map[y * MAP_SIZE + x] = T_ROAD; 
                }
            }

            // --- ALLOCATE SECTORS, DOORS, AND SIGNPOST CARRIERS ---
            let plotX = 2;
            let onNorthSide = true;

            discoveredRoutes.forEach((path, index) => {
                if (plotX + 6 >= MAP_SIZE) return;

                let buildingUID = 2 + index; 
                let startY = onNorthSide ? 26 : 38; 
                sectorNames[buildingUID] = path.replace("/", "").toUpperCase();

                for (let bx = 0; bx < 5; bx++) {
                    for (let by = 0; by < 5; by++) {
                        let cx = plotX + bx;
                        let cy = startY + by;

                        // Default Hollow Box Core Walls Configuration
                        if (bx === 0 || bx === 4 || by === 0 || by === 4) {
                            map[cy * MAP_SIZE + cx] = buildingUID;
                        } else {
                            map[cy * MAP_SIZE + cx] = T_ROAD; // Interior floor is clean walkable path
                        }

                        routeDirectoryMap[`${cx},${cy}`] = path;
                    }
                }

                // --- INJECT PHYSICAL ENTRANCE GATEWAYS (DOORS) ---
                // Open holes in front-facing wall groups and flag them with our universal portal identifier
                if (onNorthSide) {
                    map[(startY + 4) * MAP_SIZE + (plotX + 2)] = T_DOOR; // Center of south-facing wall
                    routeDirectoryMap[`${plotX + 2},${startY + 4}`] = path;
                } else {
                    map[startY * MAP_SIZE + (plotX + 2)] = T_DOOR; // Center of north-facing wall
                    routeDirectoryMap[`${plotX + 2},${startY}`] = path;
                }

                logConsole(`[STRUCT SYNCED]: Compiled Sector ${buildingUID} for path alignment [${path}]`, "#aaa");

                if (!onNorthSide) plotX += 8;
                onNorthSide = !onNorthSide;
            });

            setTimeout(() => { document.getElementById("boot-screen").style.display = "none"; }, 1000);
        }

        // --- MOVEMENT ENGINE INTERFACES ---
        window.addEventListener('keydown', e => { let k = e.key.toLowerCase(); if(k in keys) keys[k] = true; if(k === 'arrowleft' || k === 'arrowright') keys[k] = true; });
        window.addEventListener('keyup', e => { let k = e.key.toLowerCase(); if(k in keys) keys[k] = false; if(k === 'arrowleft' || k === 'arrowright') keys[k] = false; });
        
        let dragActive = false;
        window.addEventListener('mousedown', () => dragActive = true);
        window.addEventListener('mouseup', () => dragActive = false);
        window.addEventListener('mousemove', e => { if (dragActive) player.angle += e.movementX * 0.0045; });

        function attemptGridStep(dx, dy) {
            let nx = player.x + dx; let ny = player.y + dy;
            if (nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE) {
                let cell = map[Math.floor(ny) * MAP_SIZE + Math.floor(nx)];
                // Walkable parameters: Roadways, Grass open plots, and Active Neon Portals
                if (cell === T_ROAD || cell === T_GRASS || cell === T_DOOR) {
                    player.x = nx; player.y = ny;
                }
            }
        }

        function updateSimulationLoop() {
            globalPulse += 0.08;

            if (keys.w || keys.arrowup) attemptGridStep(Math.cos(player.angle) * player.speed, Math.sin(player.angle) * player.speed);
            if (keys.s || keys.arrowdown) attemptGridStep(-Math.cos(player.angle) * player.speed, -Math.sin(player.angle) * player.speed);
            if (keys.a) attemptGridStep(Math.cos(player.angle - Math.PI/2) * player.speed, Math.sin(player.angle - Math.PI/2) * player.speed);
            if (keys.d) attemptGridStep(Math.cos(player.angle + Math.PI/2) * player.speed, Math.sin(player.angle + Math.PI/2) * player.speed);

            if (keys.arrowleft) player.angle -= player.rotSpeed;
            if (keys.arrowright) player.angle += player.rotSpeed;

            const px = Math.floor(player.x); const py = Math.floor(player.y);
            const zoneTxt = document.getElementById("zone-txt");
            const urlTxt = document.getElementById("url-txt");

            let currentPath = routeDirectoryMap[`${px},${py}`] || routeDirectoryMap[`${px},${py-1}`] || routeDirectoryMap[`${px},${py+1}`] || routeDirectoryMap[`${px-1},${py}`] || routeDirectoryMap[`${px+1},${py}`];

            if (currentPath) {
                let cell = map[py * MAP_SIZE + px];
                if (cell === T_DOOR) {
                    zoneTxt.innerText = `PORTAL INTERFACE: ENTERING...`;
                    zoneTxt.style.color = "var(--neon-green)";
                } else {
                    zoneTxt.innerText = `INTERNAL NODE: ${currentPath.toUpperCase().replace(/\//g, '')}`;
                    zoneTxt.style.color = "var(--neon-purple)";
                }
                urlTxt.innerText = `${repoOwner}.github.io/${repoName}${currentPath}`;
            } else {
                let tile = map[py * MAP_SIZE + px];
                zoneTxt.innerText = tile === T_GRASS ? "EXTERNAL COMMONS MATRIX" : "MAIN INDUSTRIAL SYSTEM BOULEVARD";
                zoneTxt.style.color = tile === T_GRASS ? "#55ff55" : "var(--neon-blue)";
                urlTxt.innerText = `${repoOwner}.github.io/${repoName}/`;
            }

            document.getElementById("coords-txt").innerText = `X: ${player.x.toFixed(1)}, Y: ${player.y.toFixed(1)}`;
        }

        // --- ADVANCED DOUBLE-PASS RENDER FILTER ---
        function renderPerspectiveMatrix() {
            // High-luminance backdrop sky and bright terrain maps
            ctx.fillStyle = "#06060c"; ctx.fillRect(0, 0, R_WIDTH, R_HEIGHT / 2); 
            ctx.fillStyle = "#121b12"; ctx.fillRect(0, R_HEIGHT / 2, R_WIDTH, R_HEIGHT / 2); 

            // Render high-visibility lane arrays directly onto the ground plane projection
            let cosP = Math.cos(player.angle); let sinP = Math.sin(player.angle);
            
            for (let x = 0; x < R_WIDTH; x++) {
                let rayAngle = (player.angle - player.fov / 2) + (x / R_WIDTH) * player.fov;
                let distance = 0; let hit = false; let wallType = 0;
                let vx = Math.cos(rayAngle); let vy = Math.sin(rayAngle);

                // Extended view distance tracking loop
                while (!hit && distance < 32) {
                    distance += 0.05;
                    let tx = Math.floor(player.x + vx * distance);
                    let ty = Math.floor(player.y + vy * distance);

                    if (tx < 0 || tx >= MAP_SIZE || ty < 0 || ty >= MAP_SIZE) {
                        hit = true; distance = 32;
                    } else {
                        let tile = map[ty * MAP_SIZE + tx];
                        if (tile > 1 || tile === T_DOOR) {
                            hit = true; wallType = tile;
                        }
                    }
                }

                // Apply fish-eye projection corrective multipliers
                let correctedD = distance * Math.cos(rayAngle - player.angle);
                let wallHeight = Math.min(R_HEIGHT, Math.floor(R_HEIGHT / correctedD));
                let lineStart = (R_HEIGHT / 2) - (wallHeight / 2);
                let lineEnd = (R_HEIGHT / 2) + (wallHeight / 2);

                // Upgraded Light Engine: Base illumination + high-intensity headlight cone calculation
                let baseLight = Math.min(1, 1 - (correctedD / 26));
                let angleDiff = Math.abs(rayAngle - player.angle);
                let headlightCone = angleDiff < 0.25 ? Math.max(0, 1 - (correctedD / 16)) * 0.45 : 0;
                let lightingFactor = Math.min(1, baseLight + headlightCone + 0.15); // Added baseline global ambient glow

                if (wallType === T_DOOR) {
                    // Pulse portal doorways dynamically using standard sine functions
                    let pulseGlow = Math.floor(130 + Math.sin(globalPulse * 2) * 125);
                    ctx.strokeStyle = `rgba(0, ${pulseGlow}, 255, ${lightingFactor})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart); ctx.lineTo(x, lineEnd); ctx.stroke();
                } 
                else if (wallType > 1) {
                    // Isolate building color signatures using integer indexing vectors
                    let r = Math.floor((65 * wallType) % 150 + 20);
                    let g = Math.floor((45 * wallType) % 120 + 20);
                    let b = Math.floor((85 * wallType) % 160 + 50);

                    // Vertical Column Segment
                    ctx.strokeStyle = `rgb(${Math.floor(r * lightingFactor)},${Math.floor(g * lightingFactor)},${Math.floor(b * lightingFactor)})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart); ctx.lineTo(x, lineEnd); ctx.stroke();

                    // High-Pitch Roof Structural Caps
                    ctx.strokeStyle = `rgb(${Math.floor(r * 0.4 * lightingFactor)},${Math.floor(g * 0.4 * lightingFactor)},${Math.floor(b * 0.4 * lightingFactor)})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart); ctx.lineTo(x, lineStart - (wallHeight * 0.4)); ctx.stroke();

                    // --- STREET SIGN SYSTEM INJECTION ---
                    // Render interactive, floating signage panels above columns on center indexes
                    if (x % 30 === 0 && wallHeight > 35) {
                        ctx.fillStyle = `rgba(191, 0, 255, ${lightingFactor})`;
                        ctx.fillRect(x - 25, lineStart - (wallHeight * 0.7), 50, 12);
                        
                        ctx.fillStyle = `rgba(255, 255, 255, ${lightingFactor})`;
                        ctx.font = "6px monospace";
                        let txt = sectorNames[wallType] || "NODE";
                        ctx.fillText(txt, x - 20, lineStart - (wallHeight * 0.7) + 8);
                    }
                }
            }

            // Draw clean highway textures down the center split path overlay
            ctx.fillStyle = "rgba(0, 240, 255, 0.08)";
            ctx.fillRect(0, R_HEIGHT / 2 + 10, R_WIDTH, 4); // Distant neon horizon guidelines
        }

        function engineTickLoop() {
            updateSimulationLoop();
            renderPerspectiveMatrix();
            requestAnimationFrame(engineTickLoop);
        }

        buildAdvancedCircuitCity().then(() => {
            engineTickLoop();
        });
    </script>
</body>
</html>
