<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELB8 - Industrial City Core v3.3</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff66;
            --neon-purple: #bf00ff;
            --dark-bg: #010103;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 960px;
            height: 540px;
            border: 4px solid #0a0a0f;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #boot-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: #666;
            font-size: 14px;
        }

        .boot-log {
            width: 600px;
            height: 220px;
            border: 1px solid #111;
            background: #030305;
            padding: 15px;
            overflow-y: auto;
            margin-top: 15px;
            color: #444;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.4;
        }

        .hud {
            position: absolute;
            pointer-events: none;
            font-size: 12px;
            text-shadow: 1px 1px 1px #000;
            background: rgba(2, 2, 4, 0.95);
            padding: 12px 16px;
            border: 1px solid #15151f;
        }

        #location-hud { top: 20px; left: 20px; border-left: 3px solid #444; }
        #directory-hud { top: 20px; right: 20px; text-align: right; border-right: 3px solid #444; }
        #controls-hud { bottom: 20px; left: 20px; color: #666; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="boot-screen">
            <div style="letter-spacing: 2px; font-weight: bold; color: #888;">PIXELB8 ENGINE: MATTE ARCHITECTURE REBUILD...</div>
            <div class="boot-log" id="log-target"></div>
        </div>

        <canvas id="renderCanvas"></canvas>
        
        <div id="location-hud" class="hud">
            LOCATION NODE:<br>
            <strong id="zone-txt" style="font-size: 14px; color: #aaa; text-transform: uppercase;">LOADING...</strong>
            <div id="coords-txt" style="color: #444; font-size: 10px; margin-top: 2px;">X: 0.0, Y: 0.0</div>
        </div>

        <div id="directory-hud" class="hud">
            ROUTING DESTINATION:<br>
            <span id="url-txt" style="color: #888; font-weight: bold;">/</span>
        </div>

        <div id="controls-hud" class="hud">
            W,A,S,D / Arrows: Navigate | Mouse Drag: Look | Cross doorways to enter pages
        </div>
    </div>

    <script>
        const repoOwner = "Clickmeharder"; 
        const repoName = "Pixelb8";       

        const canvas = document.getElementById("renderCanvas");
        const ctx = canvas.getContext("2d");

        const R_WIDTH = 480;
        const R_HEIGHT = 270;
        canvas.width = R_WIDTH;
        canvas.height = R_HEIGHT;

        function logConsole(msg, color = "#444") {
            const tgt = document.getElementById("log-target");
            if(tgt) {
                tgt.innerHTML += `<span style="color: ${color}">${msg}</span><br>`;
                tgt.scrollTop = tgt.scrollHeight;
            }
        }

        // --- WORLD MATRIX ---
        const MAP_SIZE = 64; 
        let map = new Array(MAP_SIZE * MAP_SIZE).fill(1); // 1 = Dark Ground Outside
        let routeDirectoryMap = {};
        let sectorNames = {}; 

        const T_ROAD = 0;
        const T_GROUND = 1;
        const T_DOOR = 99;

        const player = { x: 4.5, y: 33.5, angle: 0, fov: Math.PI / 3, speed: 0.12, rotSpeed: 0.045 };
        const keys = { w:false, a:false, s:false, d:false, arrowleft:false, arrowright:false, arrowup:false, arrowdown:false };

        // --- COMPILER PIPELINE ---
        async function buildAsphaltIndustrialCity() {
            logConsole(`Fetching repository nodes from GitHub REST tree...`, "#666");
            let discoveredRoutes = [];

            try {
                let response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`);
                if (!response.ok) throw new Error(`HTTP Status ${response.status}`);
                let data = await response.json();
                
                if(Array.isArray(data)) {
                    data.forEach(item => {
                        if (item.name === "city.html" || item.name === "city" || item.name.startsWith(".")) return;
                        if (item.type === "dir") {
                            discoveredRoutes.push("/" + item.name);
                        } else if (item.type === "file" && item.name.endsWith(".html") && item.name !== "index.html") {
                            discoveredRoutes.push("/" + item.name.replace(".html", ""));
                        }
                    });
                }
            } catch (err) {
                logConsole(`Fallback architecture safely routing.`, "#884488");
                discoveredRoutes = ["/shop", "/games", "/tools", "/stream", "/about"];
            }

            // --- INJECT CUSTOM ENTROPIA JUNKSHOP BLOCK ---
            // Force this layout route even if it doesn't exist on server file structures yet
            if (!discoveredRoutes.includes("/entropia-junkshop")) {
                discoveredRoutes.push("/entropia-junkshop");
            }

            // Carve straight industrial thoroughfare highway down middle rows
            for (let x = 0; x < MAP_SIZE; x++) {
                for (let y = 31; y <= 35; y++) {
                    map[y * MAP_SIZE + x] = T_ROAD; 
                }
            }

            let plotX = 8; 
            let onNorthSide = true;

            discoveredRoutes.forEach((path, index) => {
                if (plotX + 7 >= MAP_SIZE) return;

                let buildingUID = 2 + index; 
                let startY = onNorthSide ? 25 : 36; 

                // Custom override label text formatting for our injected route block
                if (path === "/entropia-junkshop") {
                    sectorNames[buildingUID] = "ENTROPIA JUNKSHOP";
                } else {
                    sectorNames[buildingUID] = path.replace("/", "").toUpperCase();
                }

                // Carve building block matrices
                for (let bx = 0; bx < 6; bx++) {
                    for (let by = 0; by < 5; by++) {
                        let cx = plotX + bx;
                        let cy = startY + by;
                        if (cx >= 0 && cx < MAP_SIZE && cy >= 0 && cy < MAP_SIZE) {
                            if (bx === 0 || bx === 5 || by === 0 || by === 4) {
                                map[cy * MAP_SIZE + cx] = buildingUID; 
                            } else {
                                map[cy * MAP_SIZE + cx] = T_ROAD; 
                            }
                            routeDirectoryMap[`${cx},${cy}`] = path;
                        }
                    }
                }

                // Carve dedicated physical threshold entries (Doors) facing the main street lines
                if (onNorthSide) {
                    let doorY = startY + 4;
                    let doorX = plotX + 3;
                    map[doorY * MAP_SIZE + doorX] = T_DOOR; 
                    routeDirectoryMap[`${doorX},${doorY}`] = path;
                } else {
                    let doorY = startY;
                    let doorX = plotX + 3;
                    map[doorY * MAP_SIZE + doorX] = T_DOOR; 
                    routeDirectoryMap[`${doorX},${doorY}`] = path;
                }

                if (!onNorthSide) plotX += 9;
                onNorthSide = !onNorthSide;
            });

            setTimeout(() => { 
                let boot = document.getElementById("boot-screen");
                if(boot) boot.style.display = "none"; 
            }, 600);
        }

        // --- CONTROL ENGINE CAPTURES ---
        window.addEventListener('keydown', e => { let k = e.key.toLowerCase(); if(k in keys) keys[k] = true; });
        window.addEventListener('keyup', e => { let k = e.key.toLowerCase(); if(k in keys) keys[k] = false; });
        
        let dragActive = false;
        window.addEventListener('mousedown', () => dragActive = true);
        window.addEventListener('mouseup', () => dragActive = false);
        window.addEventListener('mousemove', e => { if (dragActive) player.angle += e.movementX * 0.005; });

        function attemptGridStep(dx, dy) {
            let nx = player.x + dx; let ny = player.y + dy;
            if (nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE) {
                let cell = map[Math.floor(ny) * MAP_SIZE + Math.floor(nx)];
                
                if (cell === T_DOOR) {
                    let targetRedirectPath = routeDirectoryMap[`${Math.floor(nx)},${Math.floor(ny)}`];
                    if (targetRedirectPath) {
                        let cleanSubPath = targetRedirectPath.startsWith('/') ? targetRedirectPath : '/' + targetRedirectPath;
                        window.location.href = cleanSubPath;
                    }
                    return;
                }

                if (cell === T_ROAD || cell === T_GROUND) {
                    player.x = nx; player.y = ny;
                }
            }
        }

        function updateSimulationLoop() {
            if (keys.w || keys.arrowup) attemptGridStep(Math.cos(player.angle) * player.speed, Math.sin(player.angle) * player.speed);
            if (keys.s || keys.arrowdown) attemptGridStep(-Math.cos(player.angle) * player.speed, -Math.sin(player.angle) * player.speed);
            if (keys.a) attemptGridStep(Math.cos(player.angle - Math.PI/2) * player.speed, Math.sin(player.angle - Math.PI/2) * player.speed);
            if (keys.d) attemptGridStep(Math.cos(player.angle + Math.PI/2) * player.speed, Math.sin(player.angle + Math.PI/2) * player.speed);

            if (keys.arrowleft) player.angle -= player.rotSpeed;
            if (keys.arrowright) player.angle += player.rotSpeed;

            const px = Math.floor(player.x); const py = Math.floor(player.y);
            const zoneTxt = document.getElementById("zone-txt");
            const urlTxt = document.getElementById("url-txt");

            if(zoneTxt && urlTxt) {
                let currentPath = routeDirectoryMap[`${px},${py}`] || routeDirectoryMap[`${px},${py-1}`] || routeDirectoryMap[`${px},${py+1}`];
                if (currentPath) {
                    zoneTxt.innerText = currentPath === "/entropia-junkshop" ? "ENTROPIA JUNKSHOP" : `SECTOR: ${currentPath.toUpperCase().replace(/\//g, '')}`;
                    zoneTxt.style.color = "#fff";
                    urlTxt.innerText = window.location.host + currentPath;
                } else {
                    zoneTxt.innerText = "MAIN SYSTEM ROAD";
                    zoneTxt.style.color = "#888";
                    urlTxt.innerText = window.location.host + "/";
                }
            }

            let coords = document.getElementById("coords-txt");
            if(coords) coords.innerText = `X: ${player.x.toFixed(1)}, Y: ${player.y.toFixed(1)}`;
        }

        // --- RENDER TIMELINE PERSPECTIVE PIPELINE ---
        function renderPerspectiveMatrix() {
            // Smooth Sky Gradient
            let skyGrad = ctx.createLinearGradient(0, 0, 0, R_HEIGHT / 2);
            skyGrad.addColorStop(0, "#020204");
            skyGrad.addColorStop(1, "#0d0d14");
            ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, R_WIDTH, R_HEIGHT / 2); 

            // Dark Concrete Floor Surface (No flashy gridlines)
            ctx.fillStyle = "#060608"; ctx.fillRect(0, R_HEIGHT / 2, R_WIDTH, R_HEIGHT / 2);

            for (let x = 0; x < R_WIDTH; x++) {
                let rayAngle = (player.angle - player.fov / 2) + (x / R_WIDTH) * player.fov;
                let distance = 0; let hit = false; let wallType = 0;
                let vx = Math.cos(rayAngle); let vy = Math.sin(rayAngle);

                while (!hit && distance < 24) {
                    distance += 0.05;
                    let tx = Math.floor(player.x + vx * distance);
                    let ty = Math.floor(player.y + vy * distance);

                    if (tx < 0 || tx >= MAP_SIZE || ty < 0 || ty >= MAP_SIZE) {
                        hit = true; distance = 24;
                    } else {
                        let tile = map[ty * MAP_SIZE + tx];
                        if (tile > 1 || tile === T_DOOR) {
                            hit = true; wallType = tile;
                        }
                    }
                }

                let correctedD = distance * Math.cos(rayAngle - player.angle);
                let wallHeight = Math.min(R_HEIGHT, Math.floor(R_HEIGHT / (correctedD || 0.1)));
                let lineStart = (R_HEIGHT / 2) - (wallHeight / 2);
                let lineEnd = (R_HEIGHT / 2) + (wallHeight / 2);

                let lightShadingFactor = Math.min(1, 1 - (correctedD / 18)) + 0.15;

                if (wallType === T_DOOR) {
                    // Physical Recessed Doorway Rendering Layer
                    // Draws a dark threshold slit into the wall geometry instead of a glowing energy panel
                    ctx.strokeStyle = `rgb(${Math.floor(12 * lightShadingFactor)}, ${Math.floor(12 * lightShadingFactor)}, ${Math.floor(16 * lightShadingFactor)})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart + (wallHeight * 0.25)); ctx.lineTo(x, lineEnd); ctx.stroke();
                    
                    // Solid dark matte threshold door header beams
                    ctx.strokeStyle = `rgb(${Math.floor(40 * lightShadingFactor)}, ${Math.floor(40 * lightShadingFactor)}, ${Math.floor(45 * lightShadingFactor)})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart); ctx.lineTo(x, lineStart + (wallHeight * 0.25)); ctx.stroke();
                } 
                else if (wallType > 1) {
                    // Muted Industrial Building Bricks Colors
                    let r = 50, g = 52, b = 60;
                    
                    // Give the forced Entropia Junkshop a unique rusted iron hull color signature
                    if (sectorNames[wallType] === "ENTROPIA JUNKSHOP") {
                        r = 75; g = 50; b = 40;
                    }

                    // Render main structural wall panels split columns
                    ctx.strokeStyle = `rgb(${Math.floor(r * lightShadingFactor)},${Math.floor(g * lightShadingFactor)},${Math.floor(b * lightShadingFactor)})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart); ctx.lineTo(x, lineEnd); ctx.stroke();

                    // Flat horizontal structural window trim indicators
                    let blockYPosition = Math.floor(correctedD * 10) % 24;
                    if (blockYPosition > 21) {
                        ctx.strokeStyle = `rgb(${Math.floor(r * 0.5 * lightShadingFactor)},${Math.floor(g * 0.5 * lightShadingFactor)},${Math.floor(b * 0.5 * lightShadingFactor)})`;
                        ctx.beginPath(); ctx.moveTo(x, lineStart + (wallHeight * 0.4)); ctx.lineTo(x, lineStart + (wallHeight * 0.43)); ctx.stroke();
                    }

                    // --- COMPACT TEXT STREET SIGNS ---
                    if (x % 45 === 0 && wallHeight > 35) {
                        ctx.fillStyle = "rgba(10, 10, 12, 0.85)";
                        ctx.fillRect(x - 40, lineStart - 18, 80, 13);
                        ctx.strokeStyle = "#444";
                        ctx.strokeRect(x - 40, lineStart - 18, 80, 13);
                        
                        ctx.fillStyle = "#aaa";
                        ctx.font = "8px monospace";
                        let tag = sectorNames[wallType] || "NODE";
                        ctx.fillText(tag, x - 35, lineStart - 9);
                    }
                }
            }
        }

        function engineTickLoop() {
            updateSimulationLoop();
            renderPerspectiveMatrix();
            requestAnimationFrame(engineTickLoop);
        }

        buildAsphaltIndustrialCity().then(() => {
            engineTickLoop();
        });
    </script>
</body>
</html>
