<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELB8 - Asphalt Core v3.4</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --dark-bg: #010103;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 960px;
            height: 540px;
            border: 4px solid #0a0a0f;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #boot-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: #666;
            font-size: 14px;
        }

        .hud {
            position: absolute;
            pointer-events: none;
            font-size: 12px;
            text-shadow: 1px 1px 1px #000;
            background: rgba(2, 2, 4, 0.95);
            padding: 12px 16px;
            border: 1px solid #15151f;
        }

        #location-hud { top: 20px; left: 20px; border-left: 3px solid #666; }
        #directory-hud { top: 20px; right: 20px; text-align: right; border-right: 3px solid #666; }
        #controls-hud { bottom: 20px; left: 20px; color: #666; }
        
        #map-toggle-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #111;
            border: 1px solid #444;
            color: #aaa;
            padding: 8px 12px;
            cursor: pointer;
            font-family: monospace;
            font-size: 11px;
            z-index: 5;
        }
        #map-toggle-btn:hover {
            background: #222;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="boot-screen">
            <div style="letter-spacing: 2px; font-weight: bold; color: #888;">PIXELB8 ENGINE: ROADS, LAMPS & RADAR CONFIG...</div>
        </div>

        <canvas id="renderCanvas"></canvas>
        <button id="map-toggle-btn" onclick="toggleMinimap()">TOGGLE TOP-DOWN VIEW (M)</button>
        
        <div id="location-hud" class="hud">
            LOCATION NODE:<br>
            <strong id="zone-txt" style="font-size: 14px; color: #aaa; text-transform: uppercase;">LOADING...</strong>
            <div id="coords-txt" style="color: #444; font-size: 10px; margin-top: 2px;">X: 0.0, Y: 0.0</div>
        </div>

        <div id="directory-hud" class="hud">
            ROUTING DESTINATION:<br>
            <span id="url-txt" style="color: #888; font-weight: bold;">/</span>
        </div>

        <div id="controls-hud" class="hud">
            W,A,S,D / Arrows: Drive | Mouse Drag: Look | Cross doors to enter pages | Press M for Map
        </div>
    </div>

    <script>
        const repoOwner = "Clickmeharder"; 
        const repoName = "Pixelb8";       

        const canvas = document.getElementById("renderCanvas");
        const ctx = canvas.getContext("2d");

        const R_WIDTH = 480;
        const R_HEIGHT = 270;
        canvas.width = R_WIDTH;
        canvas.height = R_HEIGHT;

        // --- WORLD MATRIX ---
        const MAP_SIZE = 64; 
        let map = new Array(MAP_SIZE * MAP_SIZE).fill(1); // 1 = Ground Outside
        let routeDirectoryMap = {};
        let sectorNames = {}; 
        let buildingCenters = {}; // Tracks exact center rays for mounting single signs per block

        const T_ROAD = 0;
        const T_GROUND = 1;
        const T_DOOR = 99;

        const player = { x: 4.5, y: 33.5, angle: 0, fov: Math.PI / 3, speed: 0.12, rotSpeed: 0.045 };
        const keys = { w:false, a:false, s:false, d:false, arrowleft:false, arrowright:false, arrowup:false, arrowdown:false };
        let showMinimap = false;

        function toggleMinimap() { showMinimap = !showMinimap; }
        window.addEventListener('keydown', e => { if(e.key.toLowerCase() === 'm') toggleMinimap(); });

        // --- COMPILER PIPELINE ---
        async function buildAsphaltIndustrialCity() {
            let discoveredRoutes = [];

            try {
                let response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`);
                if (!response.ok) throw new Error(`HTTP Status ${response.status}`);
                let data = await response.json();
                
                if(Array.isArray(data)) {
                    data.forEach(item => {
                        if (item.name === "city.html" || item.name === "city" || item.name.startsWith(".")) return;
                        if (item.type === "dir") {
                            discoveredRoutes.push("/" + item.name);
                        } else if (item.type === "file" && item.name.endsWith(".html") && item.name !== "index.html") {
                            discoveredRoutes.push("/" + item.name.replace(".html", ""));
                        }
                    });
                }
            } catch (err) {
                discoveredRoutes = ["/shop", "/games", "/tools", "/stream", "/about"];
            }

            if (!discoveredRoutes.includes("/entropia-junkshop")) {
                discoveredRoutes.push("/entropia-junkshop");
            }

            // Highway Carve Configuration
            for (let x = 0; x < MAP_SIZE; x++) {
                for (let y = 31; y <= 35; y++) {
                    map[y * MAP_SIZE + x] = T_ROAD; 
                }
            }

            let plotX = 8; 
            let onNorthSide = true;

            discoveredRoutes.forEach((path, index) => {
                if (plotX + 7 >= MAP_SIZE) return;

                let buildingUID = 2 + index; 
                let startY = onNorthSide ? 25 : 36; 

                if (path === "/entropia-junkshop") {
                    sectorNames[buildingUID] = "ENTROPIA JUNKSHOP";
                } else {
                    sectorNames[buildingUID] = path.replace("/", "").toUpperCase();
                }

                // Register exact X coordinate center ray for single street signboard mounts
                buildingCenters[buildingUID] = plotX + 3;

                for (let bx = 0; bx < 6; bx++) {
                    for (let by = 0; by < 5; by++) {
                        let cx = plotX + bx;
                        let cy = startY + by;
                        if (cx >= 0 && cx < MAP_SIZE && cy >= 0 && cy < MAP_SIZE) {
                            if (bx === 0 || bx === 5 || by === 0 || by === 4) {
                                map[cy * MAP_SIZE + cx] = buildingUID; 
                            } else {
                                map[cy * MAP_SIZE + cx] = T_ROAD; 
                            }
                            routeDirectoryMap[`${cx},${cy}`] = path;
                        }
                    }
                }

                if (onNorthSide) {
                    map[(startY + 4) * MAP_SIZE + (plotX + 3)] = T_DOOR; 
                    routeDirectoryMap[`${plotX + 3},${startY + 4}`] = path;
                } else {
                    map[startY * MAP_SIZE + (plotX + 3)] = T_DOOR; 
                    routeDirectoryMap[`${plotX + 3},${startY}`] = path;
                }

                if (!onNorthSide) plotX += 9;
                onNorthSide = !onNorthSide;
            });

            setTimeout(() => { 
                let boot = document.getElementById("boot-screen");
                if(boot) boot.style.display = "none"; 
            }, 400);
        }

        // --- INPUT CAPTURES ---
        window.addEventListener('keydown', e => { let k = e.key.toLowerCase(); if(k in keys) keys[k] = true; });
        window.addEventListener('keyup', e => { let k = e.key.toLowerCase(); if(k in keys) keys[k] = false; });
        
        let dragActive = false;
        window.addEventListener('mousedown', () => dragActive = true);
        window.addEventListener('mouseup', () => dragActive = false);
        window.addEventListener('mousemove', e => { if (dragActive) player.angle += e.movementX * 0.005; });

        function attemptGridStep(dx, dy) {
            let nx = player.x + dx; let ny = player.y + dy;
            if (nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE) {
                let cell = map[Math.floor(ny) * MAP_SIZE + Math.floor(nx)];
                
                if (cell === T_DOOR) {
                    let targetRedirectPath = routeDirectoryMap[`${Math.floor(nx)},${Math.floor(ny)}`];
                    if (targetRedirectPath) {
                        window.location.href = targetRedirectPath.startsWith('/') ? targetRedirectPath : '/' + targetRedirectPath;
                    }
                    return;
                }

                if (cell === T_ROAD || cell === T_GROUND) {
                    player.x = nx; player.y = ny;
                }
            }
        }

        function updateSimulationLoop() {
            if (keys.w || keys.arrowup) attemptGridStep(Math.cos(player.angle) * player.speed, Math.sin(player.angle) * player.speed);
            if (keys.s || keys.arrowdown) attemptGridStep(-Math.cos(player.angle) * player.speed, -Math.sin(player.angle) * player.speed);
            if (keys.a) attemptGridStep(Math.cos(player.angle - Math.PI/2) * player.speed, Math.sin(player.angle - Math.PI/2) * player.speed);
            if (keys.d) attemptGridStep(Math.cos(player.angle + Math.PI/2) * player.speed, Math.sin(player.angle + Math.PI/2) * player.speed);

            if (keys.arrowleft) player.angle -= player.rotSpeed;
            if (keys.arrowright) player.angle += player.rotSpeed;

            const px = Math.floor(player.x); const py = Math.floor(player.y);
            const zoneTxt = document.getElementById("zone-txt");
            const urlTxt = document.getElementById("url-txt");

            if(zoneTxt && urlTxt) {
                let currentPath = routeDirectoryMap[`${px},${py}`] || routeDirectoryMap[`${px},${py-1}`] || routeDirectoryMap[`${px},${py+1}`];
                if (currentPath) {
                    zoneTxt.innerText = currentPath === "/entropia-junkshop" ? "ENTROPIA JUNKSHOP" : `SECTOR: ${currentPath.toUpperCase().replace(/\//g, '')}`;
                    zoneTxt.style.color = "#fff";
                    urlTxt.innerText = window.location.host + currentPath;
                } else {
                    zoneTxt.innerText = "MAIN SYSTEM ROAD";
                    zoneTxt.style.color = "#888";
                    urlTxt.innerText = window.location.host + "/";
                }
            }
            if(document.getElementById("coords-txt")) document.getElementById("coords-txt").innerText = `X: ${player.x.toFixed(1)}, Y: ${player.y.toFixed(1)}`;
        }

        // --- MAP ENGINE RENDERING CORE ---
        function renderPerspectiveMatrix() {
            // Sky Element
            let skyGrad = ctx.createLinearGradient(0, 0, 0, R_HEIGHT / 2);
            skyGrad.addColorStop(0, "#010103");
            skyGrad.addColorStop(1, "#0a0a0f");
            ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, R_WIDTH, R_HEIGHT / 2); 

            // Dark Concrete Foundation Ground Matrix
            ctx.fillStyle = "#050507"; ctx.fillRect(0, R_HEIGHT / 2, R_WIDTH, R_HEIGHT / 2);

            // 3D HIGHWAY PROJECTION TEXTURING
            let cosA = Math.cos(player.angle), sinA = Math.sin(player.angle);
            for (let screenY = R_HEIGHT / 2 + 1; screenY < R_HEIGHT; screenY++) {
                let ratio = (R_HEIGHT / 2) / (screenY - R_HEIGHT / 2);
                let straightDist = ratio * 0.45; 
                
                // Track row markers along camera view vectors
                let worldX = player.x + cosA * straightDist;
                let worldY = player.y + sinA * straightDist;

                let tx = Math.floor(worldX);
                let ty = Math.floor(worldY);

                if (tx >= 0 && tx < MAP_SIZE && ty >= 31 && ty <= 35) {
                    // Base road asphalt
                    ctx.fillStyle = "#0d0d12";
                    ctx.fillRect(0, screenY, R_WIDTH, 1);

                    // Map screen columns projections for road elements
                    for (let screenX = 0; screenX < R_WIDTH; screenX++) {
                        let raySkew = (screenX - R_WIDTH / 2) / (R_WIDTH / 2) * (player.fov / 2);
                        let actualDist = straightDist / Math.cos(raySkew);
                        let wx = player.x + Math.cos(player.angle + raySkew) * actualDist;
                        let wy = player.y + Math.sin(player.angle + raySkew) * actualDist;

                        // Yellow side shoulder safety curbs
                        if ((wy >= 31.0 && wy <= 31.15) || (wy >= 35.85 && wy <= 36.0)) {
                            ctx.fillStyle = "#cca300";
                            ctx.fillRect(screenX, screenY, 1, 1);
                        }
                        // Dashed white center line lane markers
                        else if (wy >= 33.45 && wy <= 33.55) {
                            if (Math.floor(wx * 1.5) % 2 === 0) {
                                ctx.fillStyle = "#aaaaac";
                                ctx.fillRect(screenX, screenY, 1, 1);
                            }
                        }
                    }
                }
            }

            // WALLS AND SIGNPOST CARVING LOOPS
            for (let x = 0; x < R_WIDTH; x++) {
                let rayAngle = (player.angle - player.fov / 2) + (x / R_WIDTH) * player.fov;
                let distance = 0; let hit = false; let wallType = 0;
                let vx = Math.cos(rayAngle), vy = Math.sin(rayAngle);
                let exactWallX = 0, exactWallY = 0;

                while (!hit && distance < 24) {
                    distance += 0.05;
                    exactWallX = player.x + vx * distance;
                    exactWallY = player.y + vy * distance;
                    let tx = Math.floor(exactWallX);
                    let ty = Math.floor(exactWallY);

                    if (tx < 0 || tx >= MAP_SIZE || ty < 0 || ty >= MAP_SIZE) {
                        hit = true; distance = 24;
                    } else {
                        let tile = map[ty * MAP_SIZE + tx];
                        if (tile > 1 || tile === T_DOOR) { hit = true; wallType = tile; }
                    }
                }

                let correctedD = distance * Math.cos(rayAngle - player.angle);
                let wallHeight = Math.min(R_HEIGHT, Math.floor(R_HEIGHT / (correctedD || 0.1)));
                let lineStart = (R_HEIGHT / 2) - (wallHeight / 2);
                let lineEnd = (R_HEIGHT / 2) + (wallHeight / 2);

                let lightShadingFactor = Math.min(1, 1 - (correctedD / 18)) + 0.2;

                if (wallType === T_DOOR) {
                    // Clean Matte physical door opening threshold
                    ctx.strokeStyle = `rgb(${Math.floor(10 * lightShadingFactor)}, ${Math.floor(10 * lightShadingFactor)}, ${Math.floor(14 * lightShadingFactor)})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart + (wallHeight * 0.3)); ctx.lineTo(x, lineEnd); ctx.stroke();
                    
                    ctx.strokeStyle = `rgb(${Math.floor(35 * lightShadingFactor)}, ${Math.floor(35 * lightShadingFactor)}, ${Math.floor(40 * lightShadingFactor)})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart); ctx.lineTo(x, lineStart + (wallHeight * 0.3)); ctx.stroke();
                } 
                else if (wallType > 1) {
                    let r = 45, g = 47, b = 55;
                    if (sectorNames[wallType] === "ENTROPIA JUNKSHOP") { r = 70; g = 48; b = 38; }

                    ctx.strokeStyle = `rgb(${Math.floor(r * lightShadingFactor)},${Math.floor(g * lightShadingFactor)},${Math.floor(b * lightShadingFactor)})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart); ctx.lineTo(x, lineEnd); ctx.stroke();

                    // --- ONE SINGLE STREET SIGN SYSTEM OVERRIDE ---
                    // Only mount the signboard on the column column index closest to the center block x coordinate
                    let targetX = buildingCenters[wallType];
                    if (Math.floor(exactWallX) === targetX && Math.abs((exactWallX % 1) - 0.5) < 0.08) {
                        if (wallHeight > 40 && x > 20 && x < R_WIDTH - 20) {
                            ctx.fillStyle = "rgba(12, 12, 15, 0.95)";
                            ctx.fillRect(x - 35, lineStart - 16, 70, 12);
                            ctx.strokeStyle = "#3a3a45";
                            ctx.strokeRect(x - 35, lineStart - 16, 70, 12);
                            
                            ctx.fillStyle = "#999";
                            ctx.font = "7px monospace";
                            let tag = sectorNames[wallType] || "NODE";
                            ctx.fillText(tag, x - 30, lineStart - 8);
                        }
                    }
                }

                // --- PROCEDURAL HIGHWAY STREET LIGHT LAMPS ---
                // Render sharp lamppost poles on set grid intervals down the street line edge
                let lightGridCheck = Math.floor(exactWallX);
                if (lightGridCheck % 14 === 0 && Math.abs((exactWallX % 1) - 0.1) < 0.05) {
                    if (Math.floor(exactWallY) === 31 || Math.floor(exactWallY) === 36) {
                        if (correctedD > 1 && correctedD < 16) {
                            // Draw thin vertical post pole
                            ctx.strokeStyle = `rgba(80, 80, 90, ${lightShadingFactor})`;
                            ctx.lineWidth = 1;
                            ctx.beginPath(); ctx.moveTo(x, lineStart - 10); ctx.lineTo(x, lineEnd); ctx.stroke();

                            // Small luminous single filament lamp head glow cap
                            ctx.fillStyle = `rgba(255, 230, 150, ${lightShadingFactor})`;
                            ctx.fillRect(x - 1, lineStart - 12, 3, 3);
                        }
                    }
                }
            }

            // --- RADAR 2D TOP-DOWN VIEW OVERLAY GENERATOR ---
            if (showMinimap) {
                renderTopDownRadar();
            }
        }

        function renderTopDownRadar() {
            let mSize = 140;
            let pad = 20;
            ctx.fillStyle = "rgba(4, 4, 6, 0.95)";
            ctx.fillRect(pad, pad, mSize, mSize);
            ctx.strokeStyle = "#222";
            ctx.strokeRect(pad, pad, mSize, mSize);

            let sFactor = mSize / MAP_SIZE;

            // Render world blocks indicators map onto the miniature display panel
            for (let y = 0; y < MAP_SIZE; y++) {
                for (let x = 0; x < MAP_SIZE; x++) {
                    let tile = map[y * MAP_SIZE + x];
                    if (tile > 1) {
                        ctx.fillStyle = sectorNames[tile] === "ENTROPIA JUNKSHOP" ? "#5e3929" : "#333";
                        ctx.fillRect(pad + x * sFactor, pad + y * sFactor, sFactor + 0.5, sFactor + 0.5);
                    } else if (tile === T_DOOR) {
                        ctx.fillStyle = "#888";
                        ctx.fillRect(pad + x * sFactor, pad + y * sFactor, sFactor, sFactor);
                    } else if (y >= 31 && y <= 35) {
                        ctx.fillStyle = "#16161c";
                        ctx.fillRect(pad + x * sFactor, pad + y * sFactor, sFactor, sFactor);
                    }
                }
            }

            // Draw player position blip dot indicator vector onto target coordinate map
            let pX = pad + player.x * sFactor;
            let pY = pad + player.y * sFactor;
            ctx.fillStyle = "var(--neon-blue)";
            ctx.beginPath(); ctx.arc(pX, pY, 2.5, 0, Math.PI * 2); ctx.fill();

            // Draw clean simple camera view indicator direction ray
            ctx.strokeStyle = "rgba(0, 240, 255, 0.6)";
            ctx.beginPath(); ctx.moveTo(pX, pY);
            ctx.lineTo(pX + Math.cos(player.angle) * 8, pY + Math.sin(player.angle) * 8);
            ctx.stroke();
        }

        function engineTickLoop() {
            updateSimulationLoop();
            renderPerspectiveMatrix();
            requestAnimationFrame(engineTickLoop);
        }

        buildAsphaltIndustrialCity().then(() => {
            engineTickLoop();
        });
    </script>
</body>
</html>
