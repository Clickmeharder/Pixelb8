<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELB8 - Terminal City Core v3</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff66;
            --neon-purple: #bf00ff;
            --dark-bg: #020204;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 960px;
            height: 540px;
            border: 4px solid #0d0d14;
            background: #000;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #boot-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: var(--neon-blue);
            font-size: 14px;
        }

        .boot-log {
            width: 600px;
            height: 220px;
            border: 1px solid #111;
            background: #030305;
            padding: 15px;
            overflow-y: auto;
            margin-top: 15px;
            color: #555;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.4;
        }

        .hud {
            position: absolute;
            pointer-events: none;
            font-size: 12px;
            text-shadow: 2px 2px 2px #000;
            background: rgba(2, 2, 3, 0.93);
            padding: 12px 16px;
            border: 1px solid #1a1a26;
            backdrop-filter: blur(6px);
        }

        #location-hud { top: 20px; left: 20px; border-left: 4px solid var(--neon-blue); }
        #directory-hud { top: 20px; right: 20px; text-align: right; border-right: 4px solid var(--neon-purple); }
        #controls-hud { bottom: 20px; left: 20px; color: #888; border-bottom: 2px solid #222; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="boot-screen">
            <div style="letter-spacing: 3px; font-weight: bold; color: var(--neon-blue);">PIXELB8 V3: GENERATING HIGH-FI CYBER GRID...</div>
            <div class="boot-log" id="log-target"></div>
        </div>

        <canvas id="renderCanvas"></canvas>
        
        <div id="location-hud" class="hud">
            SYSTEM NODE:<br>
            <strong id="zone-txt" style="font-size: 14px; color: var(--neon-blue); text-transform: uppercase;">INITIALIZING ENGINE...</strong>
            <div id="coords-txt" style="color: #666; font-size: 10px; margin-top: 2px;">X: 0.0, Y: 0.0</div>
        </div>

        <div id="directory-hud" class="hud">
            RESOLVED INSTANCE TARGET:<br>
            <span id="url-txt" style="color: var(--neon-purple); font-weight: bold;">/</span>
        </div>

        <div id="controls-hud" class="hud">
            W, A, S, D / Arrows: Drive Platform | Drag Mouse: Look Around | Cross Neon Doors to Launch Sub-Pages
        </div>
    </div>

    <script>
        // =========================================================================
        // CASE-CORRECTED GITHUB REPOSITORY CONFIGURATION
        // =========================================================================
        const repoOwner = "Clickmeharder"; 
        const repoName = "Pixelb8";       

        const canvas = document.getElementById("renderCanvas");
        const ctx = canvas.getContext("2d");

        const R_WIDTH = 480;
        const R_HEIGHT = 270;
        canvas.width = R_WIDTH;
        canvas.height = R_HEIGHT;

        function logConsole(msg, color = "#555") {
            const tgt = document.getElementById("log-target");
            tgt.innerHTML += `<span style="color: ${color}">${msg}</span><br>`;
            tgt.scrollTop = tgt.scrollHeight;
        }

        // --- CORE MATRICES ARCHITECTURE ---
        const MAP_SIZE = 64; 
        let map = new Array(MAP_SIZE * MAP_SIZE).fill(1); // 1 = Tech Commons Grid
        let routeDirectoryMap = {};
        let sectorNames = {}; 

        // Block IDs Configuration
        const T_ROAD = 0;
        const T_COMMONS = 1;
        const T_DOOR = 99;

        const player = { x: 32.5, y: 38.5, angle: -Math.PI / 2, fov: Math.PI / 3, speed: 0.11, rotSpeed: 0.045 };
        const keys = { w:false, a:false, s:false, d:false, arrowleft:false, arrowright:false };
        let globalPulse = 0;

        // --- GITHUB REPOSITORY STRUCTURE GRAPH MATCH CRAWLER ---
        async function buildAdvancedCircuitCity() {
            logConsole(`Connecting to API tree: api.github.com/repos/${repoOwner}/${repoName}/contents`, "var(--neon-blue)");
            let discoveredRoutes = [];

            try {
                let response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`);
                if (!response.ok) throw new Error(`HTTP Matrix status ${response.status}`);
                let data = await response.json();
                
                logConsole("Root data stream decrypted. Isolating active sub-folders...", "var(--neon-green)");

                data.forEach(item => {
                    if (item.type === "dir" && !item.name.startsWith(".")) {
                        discoveredRoutes.push("/" + item.name);
                        logConsole(`[NODE VERIFIED]: Added directory /${item.name}`, "#aaa");
                    } else if (item.type === "file" && item.name.endsWith(".html") && item.name !== "index.html") {
                        let routeName = "/" + item.name.replace(".html", "");
                        discoveredRoutes.push(routeName);
                        logConsole(`[NODE VERIFIED]: Added page file /${item.name}`, "#aaa");
                    }
                });
            } catch (err) {
                logConsole(`Fallback array activated due to: ${err.message}`, "var(--neon-purple)");
                discoveredRoutes = ["/shop", "/games", "/tools", "/stream", "/about"];
            }

            // --- CARVE GRIDDED ASYMMETRIC THOROUGHFARES ---
            for (let x = 0; x < MAP_SIZE; x++) {
                for (let y = 32; y <= 35; y++) {
                    map[y * MAP_SIZE + x] = T_ROAD; 
                }
            }

            // --- ALLOCATE EXPANSIVE ARCHITECTURAL PLOTS ---
            let plotX = 3;
            let onNorthSide = true;

            discoveredRoutes.forEach((path, index) => {
                if (plotX + 7 >= MAP_SIZE) return;

                let buildingUID = 2 + index; 
                let startY = onNorthSide ? 25 : 38; 
                sectorNames[buildingUID] = path.replace("/", "").toUpperCase();

                // Structural blocks are mapped as large 6x5 blocks
                for (let bx = 0; bx < 6; bx++) {
                    for (let by = 0; by < 5; by++) {
                        let cx = plotX + bx;
                        let cy = startY + by;

                        if (bx === 0 || bx === 5 || by === 0 || by === 4) {
                            map[cy * MAP_SIZE + cx] = buildingUID;
                        } else {
                            map[cy * MAP_SIZE + cx] = T_ROAD; 
                        }
                        routeDirectoryMap[`${cx},${cy}`] = path;
                    }
                }

                // --- INJECT REDIRECT-ENABLED INTEGRATION PORTALS ---
                if (onNorthSide) {
                    map[(startY + 4) * MAP_SIZE + (plotX + 3)] = T_DOOR; 
                    routeDirectoryMap[`${plotX + 3},${startY + 4}`] = path;
                } else {
                    map[startY * MAP_SIZE + (plotX + 3)] = T_DOOR; 
                    routeDirectoryMap[`${plotX + 3},${startY}`] = path;
                }

                if (!onNorthSide) plotX += 9;
                onNorthSide = !onNorthSide;
            });

            setTimeout(() => { document.getElementById("boot-screen").style.display = "none"; }, 1200);
        }

        // --- RUNTIME MOTION CAPTURES ---
        window.addEventListener('keydown', e => { let k = e.key.toLowerCase(); if(k in keys) keys[k] = true; if(k === 'arrowleft' || k === 'arrowright') keys[k] = true; });
        window.addEventListener('keyup', e => { let k = e.key.toLowerCase(); if(k in keys) keys[k] = false; if(k === 'arrowleft' || k === 'arrowright') keys[k] = false; });
        
        let dragActive = false;
        window.addEventListener('mousedown', () => dragActive = true);
        window.addEventListener('mouseup', () => dragActive = false);
        window.addEventListener('mousemove', e => { if (dragActive) player.angle += e.movementX * 0.005; });

        function attemptGridStep(dx, dy) {
            let nx = player.x + dx; let ny = player.y + dy;
            if (nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE) {
                let cell = map[Math.floor(ny) * MAP_SIZE + Math.floor(nx)];
                
                if (cell === T_DOOR) {
                    let targetRedirectPath = routeDirectoryMap[`${Math.floor(nx)},${Math.floor(ny)}`];
                    if (targetRedirectPath) {
                        // Direct, zero-dependency browser path relocation payload
                        window.location.href = window.location.origin + window.location.pathname.replace("index.html", "") + targetRedirectPath.substring(1);
                    }
                    return;
                }

                if (cell === T_ROAD || cell === T_COMMONS) {
                    player.x = nx; player.y = ny;
                }
            }
        }

        function updateSimulationLoop() {
            globalPulse += 0.07;

            if (keys.w || keys.arrowup) attemptGridStep(Math.cos(player.angle) * player.speed, Math.sin(player.angle) * player.speed);
            if (keys.s || keys.arrowdown) attemptGridStep(-Math.cos(player.angle) * player.speed, -Math.sin(player.angle) * player.speed);
            if (keys.a) attemptGridStep(Math.cos(player.angle - Math.PI/2) * player.speed, Math.sin(player.angle - Math.PI/2) * player.speed);
            if (keys.d) attemptGridStep(Math.cos(player.angle + Math.PI/2) * player.speed, Math.sin(player.angle + Math.PI/2) * player.speed);

            if (keys.arrowleft) player.angle -= player.rotSpeed;
            if (keys.arrowright) player.angle += player.rotSpeed;

            const px = Math.floor(player.x); const py = Math.floor(player.y);
            const zoneTxt = document.getElementById("zone-txt");
            const urlTxt = document.getElementById("url-txt");

            let currentPath = routeDirectoryMap[`${px},${py}`] || routeDirectoryMap[`${px},${py-1}`] || routeDirectoryMap[`${px},${py+1}`] || routeDirectoryMap[`${px-1},${py}`] || routeDirectoryMap[`${px+1},${py}`];

            if (currentPath) {
                zoneTxt.innerText = `DISTRICT: ${currentPath.toUpperCase().replace(/\//g, '')}`;
                zoneTxt.style.color = "var(--neon-green)";
                urlTxt.innerText = `pixelb8.lol${currentPath}`;
            } else {
                let tile = map[py * MAP_SIZE + px];
                zoneTxt.innerText = tile === T_COMMONS ? "DATA COMMONS CORES" : "MAIN SYSTEMS BOULEVARD";
                zoneTxt.style.color = tile === T_COMMONS ? "#33aa55" : "var(--neon-blue)";
                urlTxt.innerText = "pixelb8.lol/";
            }

            document.getElementById("coords-txt").innerText = `X: ${player.x.toFixed(1)}, Y: ${player.y.toFixed(1)}`;
        }

        // --- HIGH-FI 3D RAYCAST PERSPECTIVE MATRIX PIPELINE ---
        function renderPerspectiveMatrix() {
            // Gradient Sky Generation
            let skyGrad = ctx.createLinearGradient(0, 0, 0, R_HEIGHT / 2);
            skyGrad.addColorStop(0, "#010103");
            skyGrad.addColorStop(0.7, "#050512");
            skyGrad.addColorStop(1, "#12081c");
            ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, R_WIDTH, R_HEIGHT / 2); 

            // High-Contrast Textured Floor Grid Plane Layout
            ctx.fillStyle = "#06060a"; ctx.fillRect(0, R_HEIGHT / 2, R_WIDTH, R_HEIGHT / 2);

            // Floor Grid-line projection math routines
            ctx.strokeStyle = "rgba(0, 240, 255, 0.05)";
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                let lineY = R_HEIGHT / 2 + (i * i * 2);
                ctx.beginPath(); ctx.moveTo(0, lineY); ctx.lineTo(R_WIDTH, lineY); ctx.stroke();
            }

            for (let x = 0; x < R_WIDTH; x++) {
                let rayAngle = (player.angle - player.fov / 2) + (x / R_WIDTH) * player.fov;
                let distance = 0; let hit = false; let wallType = 0;
                let vx = Math.cos(rayAngle); let vy = Math.sin(rayAngle);

                while (!hit && distance < 32) {
                    distance += 0.04;
                    let tx = Math.floor(player.x + vx * distance);
                    let ty = Math.floor(player.y + vy * distance);

                    if (tx < 0 || tx >= MAP_SIZE || ty < 0 || ty >= MAP_SIZE) {
                        hit = true; distance = 32;
                    } else {
                        let tile = map[ty * MAP_SIZE + tx];
                        if (tile > 1 || tile === T_DOOR) {
                            hit = true; wallType = tile;
                        }
                    }
                }

                let correctedD = distance * Math.cos(rayAngle - player.angle);
                let wallHeight = Math.min(R_HEIGHT, Math.floor(R_HEIGHT / correctedD));
                let lineStart = (R_HEIGHT / 2) - (wallHeight / 2);
                let lineEnd = (R_HEIGHT / 2) + (wallHeight / 2);

                // Lighting Calculations: High ambient + directional headlight throw multipliers
                let baseLight = Math.min(1, 1 - (correctedD / 24));
                let angleDiff = Math.abs(rayAngle - player.angle);
                let headlight = angleDiff < 0.28 ? Math.max(0, 1 - (correctedD / 14)) * 0.6 : 0;
                let finalLighting = Math.min(1, baseLight + headlight + 0.25); // Amplified global light channels

                if (wallType === T_DOOR) {
                    // Pulsing door color parameters
                    let pulse = Math.floor(140 + Math.sin(globalPulse * 2.5) * 115);
                    ctx.strokeStyle = `rgba(0, ${pulse}, 255, ${finalLighting})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart + (wallHeight * 0.2)); ctx.lineTo(x, lineEnd); ctx.stroke();
                    
                    // Neon Header arch accents across door boundaries
                    ctx.strokeStyle = `rgba(191, 0, 255, ${finalLighting})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart + (wallHeight * 0.2)); ctx.lineTo(x, lineStart + (wallHeight * 0.15)); ctx.stroke();
                } 
                else if (wallType > 1) {
                    // Unique procedural color seeds mapped from core asset tags strings calculations
                    let r = Math.floor((75 * wallType) % 130 + 30);
                    let g = Math.floor((55 * wallType) % 110 + 20);
                    let b = Math.floor((95 * wallType) % 150 + 60);

                    // Add high-visibility horizontal glowing accent stripes across the facades
                    let blockYPosition = Math.floor(correctedD * 10) % 20;
                    if (blockYPosition > 16) {
                        r = Math.min(255, r + 100); g = Math.min(255, g + 100); b = Math.min(255, b + 140);
                    }

                    // Render Building Facade columns pipelines
                    ctx.strokeStyle = `rgb(${Math.floor(r * finalLighting)},${Math.floor(g * finalLighting)},${Math.floor(b * finalLighting)})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart); ctx.lineTo(x, lineEnd); ctx.stroke();

                    // Structural angled framing caps (sloped upper trims)
                    ctx.strokeStyle = `rgb(${Math.floor(r * 0.5 * finalLighting)},${Math.floor(g * 0.5 * finalLighting)},${Math.floor(b * 0.5 * finalLighting)})`;
                    ctx.beginPath(); ctx.moveTo(x, lineStart); ctx.lineTo(x, lineStart - (wallHeight * 0.35)); ctx.stroke();

                    // --- HIGH-FI STREET SIGN MECHANICS ---
                    if (x % 36 === 0 && wallHeight > 25) {
                        ctx.fillStyle = `rgba(0, 240, 255, ${finalLighting * 0.95})`;
                        ctx.fillRect(x - 30, lineStart - (wallHeight * 0.65), 60, 14);
                        
                        ctx.fillStyle = `#000`;
                        ctx.font = "bold 7px monospace";
                        let tag = sectorNames[wallType] || "NODE";
                        ctx.fillText(tag, x - 25, lineStart - (wallHeight * 0.65) + 10);
                    }
                }
            }

            // Draw crisp horizontal transit lane lines and perspective horizon guidelines
            ctx.fillStyle = "rgba(0, 240, 255, 0.2)";
            ctx.fillRect(0, R_HEIGHT / 2, R_WIDTH, 2); // Main neon grid separator horizon
        }

        function engineTickLoop() {
            updateSimulationLoop();
            renderPerspectiveMatrix();
            requestAnimationFrame(engineTickLoop);
        }

        buildAdvancedCircuitCity().then(() => {
            engineTickLoop();
        });
    </script>
</body>
</html>
