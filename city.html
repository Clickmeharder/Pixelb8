<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELB8 - GitHub Matrix City</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff66;
            --neon-purple: #bf00ff;
            --dark-bg: #030305;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 960px;
            height: 540px;
            border: 3px solid #111116;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #boot-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: var(--neon-green);
            font-size: 14px;
        }

        .boot-log {
            width: 600px;
            height: 220px;
            border: 1px solid #222;
            background: #050505;
            padding: 15px;
            overflow-y: auto;
            margin-top: 15px;
            color: #888;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.4;
        }

        .hud {
            position: absolute;
            pointer-events: none;
            font-size: 12px;
            text-shadow: 1px 1px 2px #000;
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 14px;
            border: 1px solid #222;
        }

        #location-hud { top: 20px; left: 20px; border-left: 3px solid var(--neon-blue); }
        #directory-hud { top: 20px; right: 20px; text-align: right; border-right: 3px solid var(--neon-purple); }
        #controls-hud { bottom: 20px; left: 20px; color: #aaa; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="boot-screen">
            <div style="letter-spacing: 2px; font-weight: bold;">PIXELB8 ENGINE: QUERYING GITHUB API TREE...</div>
            <div class="boot-log" id="log-target"></div>
        </div>

        <canvas id="renderCanvas"></canvas>
        
        <div id="location-hud" class="hud">
            DISTRICT NODE:<br>
            <strong id="zone-txt" style="font-size: 14px; color: var(--neon-blue); text-transform: uppercase;">CONNECTING...</strong>
            <div id="coords-txt" style="color: #888; font-size: 10px; margin-top: 2px;">X: 0.0, Y: 0.0</div>
        </div>

        <div id="directory-hud" class="hud">
            RESOLVED REPO PATH:<br>
            <span id="url-txt" style="color: var(--neon-purple); font-weight: bold;">/</span>
        </div>

        <div id="controls-hud" class="hud">
            W,A,S,D / Arrows : Navigate Grid | Drag Mouse to look around
        </div>
    </div>

    <script>
        // =========================================================================
        // GITHUB CONFIGURATION - UPDATE THESE FOR YOUR REPO!
        // =========================================================================
        const repoOwner = "clickmeharder"; // e.g., "pixelb8"
        const repoName = "pixelb8";       // e.g., "pixelb8.github.io"

        const canvas = document.getElementById("renderCanvas");
        const ctx = canvas.getContext("2d");

        const R_WIDTH = 480;
        const R_HEIGHT = 270;
        canvas.width = R_WIDTH;
        canvas.height = R_HEIGHT;

        function logConsole(msg, color = "#888") {
            const tgt = document.getElementById("log-target");
            tgt.innerHTML += `<span style="color: ${color}">${msg}</span><br>`;
            tgt.scrollTop = tgt.scrollHeight;
        }

        // --- WORLD MATRIX STATES ---
        const MAP_SIZE = 64; 
        let map = new Array(MAP_SIZE * MAP_SIZE).fill(1); // 1 = Grass Matrix Plot
        let routeDirectoryMap = {};

        const player = { x: 32.5, y: 38.5, angle: -Math.PI / 2, fov: Math.PI / 3, speed: 0.12, rotSpeed: 0.045 };
        const keys = { w:false, a:false, s:false, d:false, arrowleft:false, arrowright:false };

        // --- GITHUB REPOSITORY DIRECTORY CRAWLER ---
        async function fetchGithubDirectoryTree() {
            logConsole(`Targeting API: api.github.com/repos/${repoOwner}/${repoName}/contents`, "var(--neon-blue)");
            
            let discoveredRoutes = [];

            try {
                // Fetch the root contents directly from GitHub's Public REST API
                let response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`);
                
                if (!response.ok) throw new Error(`HTTP status ${response.status}`);
                
                let data = await response.json();
                logConsole("Tree payload decrypted. Parsing architectural items...");

                data.forEach(item => {
                    // We only want folders, or standalone HTML files that aren't the main index
                    if (item.type === "dir") {
                        let route = "/" + item.name;
                        discoveredRoutes.push(route);
                        logConsole(`[DIR MATCHED]: Found folder node -> ${route}`, "var(--neon-green)");
                    } else if (item.type === "file" && item.name.endsWith(".html") && item.name !== "index.html") {
                        let route = "/" + item.name.replace(".html", "");
                        discoveredRoutes.push(route);
                        logConsole(`[FILE MATCHED]: Found HTML page node -> ${route}`, "var(--neon-green)");
                    }
                });

            } catch (err) {
                logConsole("GitHub API Error or missing config: " + err.message, "#ff3333");
                logConsole("Deploying offline backup sector grid uniform channels.", "var(--neon-purple)");
                // Fallback architecture array if API is throttled or settings aren't filled out yet
                discoveredRoutes = ["/shop", "/games", "/tools", "/stream", "/about"];
            }

            // --- CARVE ASPHALT TRANSIT BOULEVARDS ---
            for (let x = 0; x < MAP_SIZE; x++) {
                for (let y = 32; y <= 35; y++) {
                    map[y * MAP_SIZE + x] = 0; // 0 = Walkable Main Street Highway
                }
            }

            // --- BUILD THE CIRCUIT MATRIX CITY ---
            logConsole(`Synthesizing layout blocks for ${discoveredRoutes.length} active zones...`);

            let plotX = 2;
            let onNorthSide = true;

            discoveredRoutes.forEach((path, index) => {
                if (plotX + 6 >= MAP_SIZE) return; // Boundary wall safeguard

                let buildingUID = 2 + index; 
                let startY = onNorthSide ? 26 : 38; // Grid switching logic alternating sides of Main St

                // Generate a hollow 5x5 structural room block facing the avenue
                for (let bx = 0; bx < 5; bx++) {
                    for (let by = 0; by < 5; by++) {
                        let currentGridX = plotX + bx;
                        let currentGridY = startY + by;

                        if (bx === 0 || bx === 4 || by === 0 || by === 4) {
                            map[currentGridY * MAP_SIZE + currentGridX] = buildingUID; // Perimeter Solid Wall
                        } else {
                            map[currentGridY * MAP_SIZE + currentGridX] = 0; // Walkable Interior Data Room Floor
                        }

                        // Attach the directory path tag directly to this physical coordinate string key
                        routeDirectoryMap[`${currentGridX},${currentGridY}`] = path;
                    }
                }

                logConsole(`Sector [${index}] -> Path mapped to coordinates frontage plot row.`, "#aaa");
                
                if (!onNorthSide) {
                    plotX += 8; 
                }
                onNorthSide = !onNorthSide;
            });

            logConsole("City engine matrix initialization cycle complete.", "var(--neon-blue)");
            
            setTimeout(() => {
                document.getElementById("boot-screen").style.display = "none";
            }, 1200);
        }

        // --- LOGIC ENGINE RUNTIME INPUTS ---
        window.addEventListener('keydown', e => {
            let k = e.key.toLowerCase(); if(k in keys) keys[k] = true;
            if(k === 'arrowleft' || k === 'arrowright') keys[k] = true;
        });
        window.addEventListener('keyup', e => {
            let k = e.key.toLowerCase(); if(k in keys) keys[k] = false;
            if(k === 'arrowleft' || k === 'arrowright') keys[k] = false;
        });

        let dragMouseActive = false;
        window.addEventListener('mousedown', () => dragMouseActive = true);
        window.addEventListener('mouseup', () => dragMouseActive = false);
        window.addEventListener('mousemove', e => { if (dragMouseActive) player.angle += e.movementX * 0.0045; });

        function moveHandling(dx, dy) {
            let nextProjX = player.x + dx; let nextProjY = player.y + dy;
            if (nextProjX >= 0 && nextProjX < MAP_SIZE && nextProjY >= 0 && nextProjY < MAP_SIZE) {
                let checkBlock = map[Math.floor(nextProjY) * MAP_SIZE + Math.floor(nextProjX)];
                if (checkBlock === 0 || checkBlock === 1) {
                    player.x = nextProjX; player.y = nextProjY;
                }
            }
        }

        function updateSimulation() {
            if (keys.w || keys.arrowup) moveHandling(Math.cos(player.angle) * player.speed, Math.sin(player.angle) * player.speed);
            if (keys.s || keys.arrowdown) moveHandling(-Math.cos(player.angle) * player.speed, -Math.sin(player.angle) * player.speed);
            if (keys.a) moveHandling(Math.cos(player.angle - Math.PI/2) * player.speed, Math.sin(player.angle - Math.PI/2) * player.speed);
            if (keys.d) moveHandling(Math.cos(player.angle + Math.PI/2) * player.speed, Math.sin(player.angle + Math.PI/2) * player.speed);

            if (keys.arrowleft) player.angle -= player.rotSpeed;
            if (keys.arrowright) player.angle += player.rotSpeed;

            // Direct Coordinate UI Sector Position Lookup
            const px = Math.floor(player.x); const py = Math.floor(player.y);
            const zoneTxt = document.getElementById("zone-txt");
            const urlTxt = document.getElementById("url-txt");

            let mappedPathTag = routeDirectoryMap[`${px},${py}`] || routeDirectoryMap[`${px},${py-1}`] || routeDirectoryMap[`${px},${py+1}`] || routeDirectoryMap[`${px-1},${py}`] || routeDirectoryMap[`${px+1},${py}`];

            if (mappedPathTag) {
                zoneTxt.innerText = `DISTRICT ${mappedPathTag.toUpperCase().replace(/\//g, '')}`;
                zoneTxt.style.color = "var(--neon-green)";
                urlTxt.innerText = `${repoOwner}.github.io${repoName !== (repoOwner + '.github.io') ? '/' + repoName : ''}${mappedPathTag}`;
            } else {
                let baseTile = map[py * MAP_SIZE + px];
                if (baseTile === 1) {
                    zoneTxt.innerText = "OUTLYING GRASS MATRICES"; zoneTxt.style.color = "#55ff55";
                } else {
                    zoneTxt.innerText = "MAIN SYSTEM ROUTE"; zoneTxt.style.color = "var(--neon-blue)";
                }
                urlTxt.innerText = `${repoOwner}.github.io/`;
            }

            document.getElementById("coords-txt").innerText = `X: ${player.x.toFixed(1)}, Y: ${player.y.toFixed(1)}`;
        }

        // --- 3D RAYCAST VIEWER ---
        function renderScene() {
            ctx.fillStyle = "#030306"; ctx.fillRect(0, 0, R_WIDTH, R_HEIGHT / 2); // Horizon Sky 
            ctx.fillStyle = "#0b100b"; ctx.fillRect(0, R_HEIGHT / 2, R_WIDTH, R_HEIGHT / 2); // Ground

            for (let x = 0; x < R_WIDTH; x++) {
                let rayAngle = (player.angle - player.fov / 2) + (x / R_WIDTH) * player.fov;
                let distance = 0; let hitSolidWall = false; let wallTypeTag = 0;
                let vectorX = Math.cos(rayAngle); let vectorY = Math.sin(rayAngle);

                while (!hitSolidWall && distance < 32) {
                    distance += 0.06;
                    let checkGridX = Math.floor(player.x + vectorX * distance);
                    let checkGridY = Math.floor(player.y + vectorY * distance);

                    if (checkGridX < 0 || checkGridX >= MAP_SIZE || checkGridY < 0 || checkGridY >= MAP_SIZE) {
                        hitSolidWall = true; distance = 32;
                    } else {
                        let foundBlockValue = map[checkGridY * MAP_SIZE + checkGridX];
                        if (foundBlockValue > 1) {
                            hitSolidWall = true; wallTypeTag = foundBlockValue;
                        }
                    }
                }

                let correctedDistance = distance * Math.cos(rayAngle - player.angle);
                let structureHeight = Math.min(R_HEIGHT, Math.floor(R_HEIGHT / correctedDistance));
                let drawLineStart = (R_HEIGHT / 2) - (structureHeight / 2);
                let drawLineEnd = (R_HEIGHT / 2) + (structureHeight / 2);

                let lightShadingFactor = Math.min(1, 1 - (correctedDistance / 28));

                if (wallTypeTag > 1) {
                    let rValue = Math.floor((55 * wallTypeTag) % 160);
                    let gValue = Math.floor((85 * wallTypeTag) % 130 + 40);
                    let bValue = Math.floor((65 * wallTypeTag) % 200 + 45);

                    // Wall Column Vertical Segment
                    ctx.strokeStyle = `rgb(${Math.floor(rValue*lightShadingFactor)},${Math.floor(gValue*lightShadingFactor)},${Math.floor(bValue*lightShadingFactor)})`;
                    ctx.beginPath(); ctx.moveTo(x, drawLineStart); ctx.lineTo(x, drawLineEnd); ctx.stroke();

                    // Roof Cap Upper Angle Line Overlay
                    ctx.strokeStyle = `rgb(${Math.floor(rValue*0.45*lightShadingFactor)},${Math.floor(gValue*0.45*lightShadingFactor)},${Math.floor(bValue*0.45*lightShadingFactor)})`;
                    ctx.beginPath(); ctx.moveTo(x, drawLineStart); ctx.lineTo(x, drawLineStart - (structureHeight * 0.45)); ctx.stroke();
                }
            }
        }

        function mainAnimationLoopThread() {
            updateSimulation();
            renderScene();
            requestAnimationFrame(mainAnimationLoopThread);
        }

        // Trigger dynamic repository discovery hook before starting engine tick rates
        fetchGithubDirectoryTree().then(() => {
            mainAnimationLoopThread();
        });
    </script>
</body>
</html>
