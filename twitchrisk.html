<!DOCTYPE html>
<html>
<head>
    <title>Jaedraze Twitch Risk</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <style>
        body { background: #0c0f12; color: #d1d5db; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        /* Container holds the SVG and lets it expand */
        #game-container { 
            width: 100%; 
            max-width: 1000px; /* Limits max width for better readability */
            height: 70vh;      /* Gives it a substantial portion of the screen */
            background: #000; 
            border: 2px solid #555; 
            margin-top: 10px;
            display: flex;
        }

        /* Forces the SVG to fill the container perfectly */
        #map { width: 100%; height: 100%; }

        .country { fill: #2d3436; stroke: #fff; stroke-width: 0.3; cursor: pointer; }
        #log { width: 100%; max-width: 1000px; height: 150px; background: #1a1f26; overflow-y: auto; padding: 10px; font-size: 14px; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

    <h3>Jaedraze Strategy Engine</h3>
    <div id="ui">!startrisk | !claim [CODE] | !build [mine/base] [CODE] | !attack [FROM] [TO]</div>
    <div id="game-container">
        <!-- Removed fixed width/height attributes from SVG -->
        <svg id="map" viewBox="0 0 360 180" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div id="log">Waiting for !startrisk...</div>

<script>
let gameState = JSON.parse(localStorage.getItem('riskState')) || { active: false, data: {} };

async function initMap() {
    const res = await fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson');
    const geo = await res.json();
    const svg = document.getElementById('map');
    
    geo.features.forEach(f => {
        let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "country");
        path.setAttribute("id", f.properties.ISO_A3);
        
        const project = (c) => [c[0] + 180, 90 - c[1]];
        
        let d = "";
        let coords = f.geometry.type === "Polygon" ? [f.geometry.coordinates] : f.geometry.coordinates;
        coords.forEach(poly => {
            poly[0].forEach((c, i) => {
                const [x, y] = project(c);
                d += (i === 0 ? "M" : "L") + `${x},${y} `;
            });
            d += "Z ";
        });
        
        path.setAttribute("d", d);
        svg.appendChild(path);
        
        if(gameState.data[f.properties.ISO_A3]?.owner) 
            path.style.fill = "#27ae60";
    });
}

// Command logic remains the same...
ComfyJS.onCommand = (user, command, message, flags, extra) => {
    const cmd = command.toLowerCase();
    const args = message.split(' ');
    log(`<strong>${user}:</strong> !${cmd} ${message}`);

    if (cmd === "resetrisk" && flags.broadcaster) {
        localStorage.removeItem('riskState');
        location.reload();
    }
    if (cmd === "startrisk") { gameState.active = true; log("Game Started!"); }
    if (!gameState.active) return;
    
    // ... (rest of your logic)
};

ComfyJS.Init("Jaedraze");
function log(msg) { 
    const logBox = document.getElementById("log");
    logBox.innerHTML += `<div>> ${msg}</div>`; 
    logBox.scrollTop = logBox.scrollHeight;
}

initMap();
</script>
</body>
</html>
