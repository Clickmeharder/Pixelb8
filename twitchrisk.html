<!DOCTYPE html>
<html>
<head>
    <title>Jaedraze Twitch Strategy</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <style>
        body { background: #0c0f12; color: #d1d5db; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        #game-container { width: 100%; max-width: 1000px; height: 60vh; background: #000; border: 2px solid #555; position: relative; }
        .country { stroke: #fff; stroke-width: 0.2; cursor: pointer; }
        .owner-label { pointer-events: none; font-size: 2px; fill: white; text-anchor: middle; font-weight: bold; }
        #log { width: 100%; max-width: 1000px; height: 150px; background: #1a1f26; overflow-y: auto; padding: 10px; margin-top: 10px; border: 1px solid #333; }
        button { background: #e74c3c; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Jaedraze Global Conquest</h3>
    <button onclick="resetGame()">RESET WORLD</button>
    <div id="game-container"><svg id="map" viewBox="0 0 360 180"></svg></div>
    <div id="log">System Initializing...</div>

<script>
const SAVE_KEY = "jaedraze_v2_data";
let gameState = JSON.parse(localStorage.getItem(SAVE_KEY)) || { players: {}, data: {} };
const COSTS = { mine: 100, school: 200, city: 300, base: 500 };

function log(msg) { 
    const l = document.getElementById("log"); 
    l.innerHTML += `<div>> ${msg}</div>`; 
    l.scrollTop = l.scrollHeight; 
}

// Income Tick: Every 60 seconds
setInterval(() => {
    Object.keys(gameState.players).forEach(p => {
        let income = 10; // Base income
        Object.values(gameState.data).forEach(c => {
            if(c.owner === p) income += (c.buildings.mine * 5);
        });
        gameState.players[p].gold += income;
    });
    saveGame();
}, 60000);

function saveGame() { localStorage.setItem(SAVE_KEY, JSON.stringify(gameState)); }
function resetGame() { localStorage.removeItem(SAVE_KEY); location.reload(); }

function processCommand(user, cmd, args) {
    if (cmd === "join" && !gameState.players[user]) {
        gameState.players[user] = { gold: 500 };
        log(`${user} joined the world.`);
    }
    if (!gameState.players[user]) return;

    const p = gameState.players[user];
    const code = args[0]?.toUpperCase();

    if (cmd === "claim") {
        if (gameState.data[code] && !gameState.data[code].owner) {
            gameState.data[code].owner = user;
            log(`${user} claimed ${code}!`);
        }
    } else if (cmd === "build") {
        const type = args[0];
        const country = args[1]?.toUpperCase();
        if (gameState.data[country]?.owner === user && p.gold >= COSTS[type]) {
            p.gold -= COSTS[type];
            gameState.data[country].buildings[type]++;
            log(`${user} built ${type} in ${country}.`);
        }
    } else if (cmd === "train") {
        const country = args[0]?.toUpperCase();
        const amt = parseInt(args[1]) || 1;
        const c = gameState.data[country];
        if (c?.owner === user && p.gold >= (amt * 10)) {
            // Capacity limit: cities allow more troops
            const cap = 10 + (c.buildings.city * 20);
            if (c.troops + amt <= cap) {
                p.gold -= (amt * 10);
                c.troops += amt;
                log(`${user} trained ${amt} troops in ${country}.`);
            } else log("Capacity full! Build cities.");
        }
    } else if (cmd === "attack") {
        const [from, to] = [args[0]?.toUpperCase(), args[1]?.toUpperCase()];
        if (gameState.data[from]?.owner === user && gameState.data[to]) {
            const att = gameState.data[from].troops;
            const def = gameState.data[to].troops + (gameState.data[to].buildings.base * 10);
            if (att > def) {
                gameState.data[to].owner = user;
                gameState.data[to].troops = Math.floor(att / 2);
                gameState.data[from].troops = Math.floor(att / 2);
                log(`⚔️ ${user} conquered ${to}!`);
            } else {
                gameState.data[from].troops = Math.floor(att * 0.5);
                log(`❌ Attack on ${to} failed.`);
            }
        }
    }
    saveGame();
}

async function initMap() {
    const res = await fetch("https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson");
    const geo = await res.json();
    const svg = document.getElementById("map");
    geo.features.forEach(f => {
        const code = f.properties.ISO_A3;
        if(!gameState.data[code]) gameState.data[code] = { owner: null, troops: 5, buildings: {mine:0, school:0, city:0, base:0} };
        
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("id", code);
        path.setAttribute("class", "country");
        // Simple map rendering logic
        let d = ""; 
        // ... (Path rendering logic remains same as your original snippet)
        svg.appendChild(path);
    });
}

ComfyJS.onCommand = (u, c, m) => processCommand(u, c.toLowerCase(), m.split(" "));
ComfyJS.Init("Jaedraze");
initMap();
</script>
</body>
</html>
