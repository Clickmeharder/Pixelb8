<!DOCTYPE html>
<html>
<head>
    <title>Jaedraze Twitch Strategy - Grand Tactical Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <style>
        body { background: #0c0f12; color: #d1d5db; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; overflow-x: hidden; }
        h3 { margin: 5px 0 15px 0; color: #e74c3c; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(231,76,60,0.3); }
        
        /* Layout Structure: Map & Leaderboard Side-by-Side */
        #stage-wrapper { width: 100%; max-width: 1100px; display: flex; gap: 15px; height: 62vh; align-items: stretch; position: relative; }
        
        #game-container { flex: 1; background: #090d13; border: 2px solid #2c3e50; position: relative; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        #map { width: 100%; height: 100%; display: block; transition: viewBox 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .country { fill: #1f242c; stroke: #0d1117; stroke-width: 0.4; cursor: pointer; transition: fill 0.2s ease, stroke 0.2s ease; }
        .country:hover { stroke: #ffffff; stroke-width: 0.8; fill: #2c3541; }
        
        /* Layer separation guarantees text paints over top of all shapes */
        .owner-label { pointer-events: none; fill: #ffffff; text-anchor: middle; font-weight: 800; font-family: sans-serif; text-shadow: 1px 1px 1px #000, -1px -1px 1px #000; overflow: visible !important; }
        .asset-label { pointer-events: none; fill: #51e1ed; text-anchor: middle; font-family: monospace; font-weight: bold; text-shadow: 1px 1px 2px #000; line-height: 1.2; overflow: visible !important; }
        
        /* Collapsible Sidebar Mechanics */
        #leaderboard-wrapper { position: relative; display: flex; transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1), margin-left 0.4s; width: 172px; z-index: 10; }
        #leaderboard-wrapper.collapsed { width: 0px; margin-left: -15px; }
        
        #leaderboard { width: 100%; background: #11161d; border: 2px solid #2c3e50; padding: 12px; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow-y: auto; box-sizing: border-box; }
        #leaderboard-wrapper.collapsed #leaderboard { display: none; }
        
        #leaderboard h4 { margin: 0 0 12px 0; color: #fff; font-size: 14px; text-transform: uppercase; border-bottom: 2px solid #e74c3c; padding-bottom: 6px; letter-spacing: 1px; }
        
        /* Structured Leaderboard Row styling */
        .lb-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 5px; padding: 6px 8px; background: rgba(255,255,255,0.02); border-radius: 3px; border-left: 3px solid #3498db; }
        .lb-player-meta { display: flex; flex-direction: column; gap: 2px; }
        .lb-player-name { font-weight: bold; color: #fff; }
        .lb-player-count { font-size: 10px; color: #7f8c8d; }
        .lb-player-stats { font-family: monospace; text-align: right; white-space: nowrap; }

        /* Tactical Floating Stats Box */
        #country-stats-box { position: absolute; bottom: 10px; right: 10px; background: rgba(17,22,29,0.92); width: 220px; padding: 10px; border-radius: 4px; border: 1px solid #e74c3c; font-family: monospace; font-size: 11px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); pointer-events: none; display: flex; flex-direction: column; gap: 4px; z-index: 15; }
        .stats-title { color: #e74c3c; font-weight: bold; border-bottom: 1px dashed #2c3e50; padding-bottom: 3px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stats-row { display: flex; justify-content: space-between; color: #d1d5db; }
        .stats-highlight { color: #51e1ed; font-weight: bold; }

        /* Collapse Tab Trigger Button */
        #collapse-btn { position: absolute; left: -26px; top: 12px; width: 24px; height: 35px; background: #11161d; border: 2px solid #2c3e50; border-right: none; color: #3498db; font-family: monospace; font-weight: bold; font-size: 12px; text-align: center; line-height: 31px; cursor: pointer; border-radius: 4px 0 0 4px; user-select: none; transition: color 0.2s; z-index: 11; }
        #collapse-btn:hover { color: #e74c3c; background: #161c24; }
        
        /* Bottom Control Deck */
        #control-panel { width: 100%; max-width: 1100px; display: flex; gap: 10px; margin-top: 15px; }
        #log { flex: 1; height: 150px; background: #11161d; overflow-y: auto; padding: 12px; border: 1px solid #2c3e50; font-family: 'Courier New', Courier, monospace; font-size: 12px; border-radius: 4px; color: #3498db; }
        #log div.err { color: #e74c3c; }
        #log div.succ { color: #2ecc71; }
        #log div.war { color: #f1c40f; font-weight: bold; }
        
        button.admin-btn { background: #e74c3c; color: white; border: none; padding: 4px 4px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.2s; margin-bottom: 5px; }
        button.admin-btn:hover { background: #c0392b; box-shadow: 0 0 10px rgba(231,76,60,0.5); }
        #view-indicator { position: absolute; top: 10px; left: 10px; background: rgba(17,22,29,0.85); padding: 6px 12px; border-radius: 4px; border: 1px solid #3498db; font-family: monospace; font-size: 11px; color: #3498db; font-weight: bold; pointer-events: none; text-transform: uppercase; z-index: 12; }
        
        /* Scrollbar aesthetics */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0c0f12; }
        ::-webkit-scrollbar-thumb { background: #2c3e50; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3498db; }
    </style>
</head>
<body>

    <div style="position: fixed; top: 8px; left: 45%; z-index: 100; text-align: center;">
        <button class="admin-btn" onclick="resetGame()">RESET</button>
    </div>
    
    <div id="stage-wrapper">
        <div id="game-container">
            <div id="view-indicator">Theater View: World</div>
            <svg id="map" viewBox="0 0 360 180"></svg>
            
            <div id="country-stats-box">
                <div class="stats-title" id="box-country-title">Sector: UNKNOWN</div>
                <div class="stats-row"><span>Ruler:</span><span id="box-ruler" class="stats-highlight">Neutral</span></div>
                <div class="stats-row"><span>Garrison:</span><span id="box-troops">0</span></div>
                <div class="stats-row"><span>Mines / Schools:</span><span id="box-infra-basic">🏭x0 🏫x0</span></div>
                <div class="stats-row"><span>Cities / Bases:</span><span id="box-infra-adv">🌆x0 🛡️x0</span></div>
                <div class="stats-row"><span>Troop Limit:</span><span id="box-cap" style="color: #2ecc71;">15</span></div>
            </div>
        </div>

        <div id="leaderboard-wrapper">
            <div id="collapse-btn" onclick="toggleLeaderboard()">[-]</div>
            <div id="leaderboard">
                <h4>Global Standings</h4>
                <div id="lb-content"></div>
            </div>
        </div>
    </div>

    <div id="control-panel">
        <div id="log">🤖 System Initializing Master Engine...</div>
    </div>

<script>
const SAVE_KEY = "jaedraze_grand_strategy_geojson_v7";
let gameState = JSON.parse(localStorage.getItem(SAVE_KEY)) || { 
    players: {}, 
    data: {},
    truces: {}
};

const COSTS = { mine: 150, school: 250, city: 400, base: 500 };

const CONTINENT_VIEWBOXES = {
    world: "0 0 360 180",
    na: "10 10 110 80",
    sa: "70 80 70 90",
    eu: "160 15 65 50",
    af: "155 35 80 105", 
    as: "200 10 130 90",
    oc: "290 95 65 65"
};

let currentViewMode = "world"; 
let currentZoomTarget = "world"; 
let currentViewBoxDims = { w: 360, h: 180 }; 

function toggleLeaderboard() {
    const wrapper = document.getElementById("leaderboard-wrapper");
    const btn = document.getElementById("collapse-btn");
    if (wrapper.classList.contains("collapsed")) {
        wrapper.classList.remove("collapsed");
        btn.textContent = "[-]";
    } else {
        wrapper.classList.add("collapsed");
        btn.textContent = "[+]";
    }
}

function log(msg, type = '') { 
    const l = document.getElementById("log"); 
    let cls = '';
    if (type === 'err') cls = ' class="err"';
    if (type === 'succ') cls = ' class="succ"';
    if (type === 'war') cls = ' class="war"';
    l.innerHTML += `<div${cls}>> ${msg}</div>`; 
    l.scrollTop = l.scrollHeight; 
}

// Global Core Cycle System
setInterval(() => {
    let globalRecruitCount = 0;

    Object.keys(gameState.players).forEach(p => {
        let income = 15; let controlledCountries = 0;
        Object.values(gameState.data).forEach(c => {
            if(c.owner === p) { controlledCountries++; income += (c.buildings.mine * 12); }
        });
        if(controlledCountries > 0) gameState.players[p].gold += income;
    });

    Object.keys(gameState.data).forEach(code => {
        const c = gameState.data[code];
        if (c.owner && c.buildings.school > 0) {
            const unitCap = 15 + (c.buildings.city * 35);
            if (c.troops < unitCap) {
                let prospectiveGeneration = c.buildings.school * 2;
                if (c.troops + prospectiveGeneration > unitCap) prospectiveGeneration = unitCap - c.troops;
                c.troops += prospectiveGeneration;
                globalRecruitCount += prospectiveGeneration;
            }
        }
    });

    saveGame();
    updateMapColors();
    updateLeaderboard();
    
    log("💰 Economic Tick: Revenues distributed and accounting balances finalized.", "succ");
    if (globalRecruitCount > 0) log(`🎖️ Mobilization: ${globalRecruitCount} automated reserves generated via Schools.`, "succ");
}, 45000);

function saveGame() { localStorage.setItem(SAVE_KEY, JSON.stringify(gameState)); }
function resetGame() { localStorage.removeItem(SAVE_KEY); location.reload(); }

function getUserColor(name) {
    let hash = 0; for(let i=0; i<name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    let color = '#'; for(let i=0; i<3; i++) color += ('00'+((hash>>(i*8))&255).toString(16)).slice(-2);
    return color;
}

function updateMapColors() {
    Object.keys(gameState.data).forEach(code => {
        const country = document.getElementById(code);
        const label = document.getElementById(`lbl-${code}`);
        const assets = document.getElementById(`assets-${code}`);
        const cData = gameState.data[code];
        
        let pathWidth = 20; 
        if (country) {
            cData.owner ? country.style.fill = getUserColor(cData.owner) : country.style.fill = "#1f242c";
            try { pathWidth = country.getBBox().width; } catch(e) {}
            
            const title = country.querySelector("title");
            if(title) {
                title.textContent = `${code} | Ruler: ${cData.owner || 'Neutral'}\nTroops: ${cData.troops}\nMines: ${cData.buildings.mine} | Schools: ${cData.buildings.school}\nCities: ${cData.buildings.city} | Bases: ${cData.buildings.base}`;
            }
        }

        if(label && cData) {
            if(currentViewMode === "world") {
                label.style.display = "none";
            } else if(currentViewMode === "continent") {
                label.style.display = cData.owner ? "block" : "none";
                
                let baseSize = currentViewBoxDims.w * 0.03; 
                let calculatedSize = Math.max(1.0, Math.min(baseSize, pathWidth * 0.25));
                label.setAttribute("font-size", `${calculatedSize}px`);
                label.textContent = `${code}:${cData.troops}`;
            } else if(currentViewMode === "country") {
                label.style.display = "block";
                
                let calculatedSize = currentViewBoxDims.w * 0.042;
                if(pathWidth < 12) {
                    calculatedSize = currentViewBoxDims.w * 0.035;
                }
                
                calculatedSize = Math.max(0.12, Math.min(2.5, calculatedSize));
                label.setAttribute("font-size", `${calculatedSize}px`);
                label.textContent = `${code} | Garrison: ${cData.troops}`;
            }
        }

        // Contextually push properties to HTML Panel if focused inside target state view
        if (currentViewMode === "country" && currentZoomTarget === code && cData) {
            updateFloatingStatsPanel(code, cData);
        }
        
        // Retain original inner-SVG node masking properties
        if(assets) assets.style.display = "none";
    });
}

function updateFloatingStatsPanel(code, cData) {
    document.getElementById("box-country-title").textContent = `Sector: ${code}`;
    document.getElementById("box-ruler").textContent = cData.owner || "Neutral";
    document.getElementById("box-ruler").style.color = cData.owner ? getUserColor(cData.owner) : "#51e1ed";
    document.getElementById("box-troops").textContent = cData.troops;
    document.getElementById("box-infra-basic").textContent = `🏭x${cData.buildings.mine} 🏫x${cData.buildings.school}`;
    document.getElementById("box-infra-adv").textContent = `🌆x${cData.buildings.city} 🛡️x${cData.buildings.base}`;
    document.getElementById("box-cap").textContent = 15 + (cData.buildings.city * 35);
}

function changeMapProjection(target) {
    const map = document.getElementById("map");
    const indicator = document.getElementById("view-indicator");
    
    if (CONTINENT_VIEWBOXES[target.toLowerCase()]) {
        currentViewMode = target.toLowerCase() === "world" ? "world" : "continent";
        currentZoomTarget = target.toLowerCase();
        
        const tokens = CONTINENT_VIEWBOXES[target.toLowerCase()].split(" ");
        currentViewBoxDims.w = parseFloat(tokens[2]);
        currentViewBoxDims.h = parseFloat(tokens[3]);
        
        map.setAttribute("viewBox", CONTINENT_VIEWBOXES[target.toLowerCase()]);
        indicator.textContent = `Theater View: ${target}`;
        log(`🔭 Camera adjustment: Tracking target region [${target.toUpperCase()}].`);
        
        // Reset floating panels back to generic unselected state on broader maps
        document.getElementById("box-country-title").textContent = "Sector: Global View";
        document.getElementById("box-ruler").textContent = "N/A";
        document.getElementById("box-ruler").style.color = "#51e1ed";
    } else {
        const path = document.getElementById(target.toUpperCase());
        if (path) {
            try {
                const box = path.getBBox();
                let pad;
                if(box.width < 3 || box.height < 3) {
                    pad = 16; 
                } else if(box.width < 10 || box.height < 10) {
                    pad = Math.max(box.width, box.height) * 2.5;
                } else {
                    pad = Math.max(box.width, box.height) * 0.6;
                }
                
                const vx = box.x - pad/2;
                const vy = box.y - pad/2;
                const vw = box.width + pad;
                const vh = box.height + pad;
                
                currentViewMode = "country";
                currentZoomTarget = target.toUpperCase();
                
                currentViewBoxDims.w = vw;
                currentViewBoxDims.h = vh;
                
                map.setAttribute("viewBox", `${vx} ${vy} ${vw} ${vh}`);
                indicator.textContent = `Country Zoom: ${target.toUpperCase()}`;
                log(`🔍 Tactical Overlay Focused on [${target.toUpperCase()}]. Space margins adjusted.`);
            } catch(e) {
                log("Target profile found but hardware rendering layout rejected bounding canvas calculation.", "err");
            }
        } else {
            log(`Invalid show vector target context: "${target}". Use: world, na, sa, eu, as, af, oc or valid ISO Code.`, "err");
            return;
        }
    }
    updateMapColors();
}

function updateLeaderboard() {
    const lbc = document.getElementById("lb-content");
    if(!lbc) return;
    let sorted = Object.keys(gameState.players).map(name => {
        let lands = 0; let troops = 0;
        Object.values(gameState.data).forEach(c => { if(c.owner === name) { lands++; troops += c.troops; } });
        return { name, gold: gameState.players[name].gold, lands, troops };
    }).sort((a,b) => (b.lands * 10 + b.troops) - (a.lands * 10 + a.troops));

    lbc.innerHTML = sorted.map(p => `
        <div class="lb-row">
            <div class="lb-player-meta">
                <span class="lb-player-name">${p.name}</span>
                <span class="lb-player-count">(${p.lands} Territories Owned)</span>
            </div>
            <div class="lb-player-stats">
                💰${p.gold} &nbsp;⚔️${p.troops}
            </div>
        </div>
    `).join('');
}

function checkTruce(p1, p2) { return gameState.truces[`${p1}:${p2}`] || gameState.truces[`${p2}:${p1}`] || false; }

function processCommand(user, cmd, args) {
    cmd = cmd.toLowerCase();
    
    if (cmd === "show") {
        if (!args[0]) { log("Provide visibility arguments. E.g., !show world, !show na, !show USA", "err"); return; }
        changeMapProjection(args[0]);
        return;
    }

    if (cmd === "join") {
        if (!gameState.players[user]) {
            gameState.players[user] = { gold: 600, pendingTruce: null };
            log(`👑 Player ${user} has raised their flag and entered the theater of war!`, "succ");
            updateLeaderboard();
        } else { log(`${user}, you are already inside the war servers.`, "err"); }
        return;
    }

    if (!gameState.players[user]) return;
    const p = gameState.players[user];

    if (cmd === "claim") {
        const targetCode = args[0]?.toUpperCase();
        if (!gameState.data[targetCode]) { log(`Country ISO code ${targetCode || 'Empty'} does not exist.`, "err"); return; }
        if (!gameState.data[targetCode].owner) {
            gameState.data[targetCode].owner = user;
            gameState.data[targetCode].troops = 10; 
            log(`🗺️ ${user} successfully established sovereign rule over ${targetCode}.`, "succ");
        } else { log(`Country ${targetCode} is already ruled by ${gameState.data[targetCode].owner}!`, "err"); }
    }

    else if (cmd === "build") {
        const type = args[0]?.toLowerCase();
        const targetCode = args[1]?.toUpperCase();
        if (!COSTS[type]) { log(`Invalid building! Use: mine, school, city, base.`, "err"); return; }
        if (!gameState.data[targetCode] || gameState.data[targetCode].owner !== user) { log(`You do not govern ${targetCode || 'this territory'}.`, "err"); return; }
        if (p.gold < COSTS[type]) { log(`Insufficient gold! ${type.toUpperCase()} costs 💰${COSTS[type]} gold.`, "err"); return; }

        p.gold -= COSTS[type];
        gameState.data[targetCode].buildings[type]++;
        log(`🏗️ ${user} built a ${type.toUpperCase()} in ${targetCode}.`, "succ");
    }

    else if (cmd === "status") {
        const targetCode = args[0]?.toUpperCase();
        const c = gameState.data[targetCode];
        if (!c || c.owner !== user) { log(`You do not own or have visibility over ${targetCode || 'this territory'}.`, "err"); return; }
        const unitCap = 15 + (c.buildings.city * 35);
        log(`📊 Sector Profile [${targetCode}]: Troops: ${c.troops}/${unitCap} | Active Autogen: +${c.buildings.school * 2} per tick.`, "succ");
    }

    else if (cmd === "truce") {
        const targetPlayer = args[0];
        if (!targetPlayer || !gameState.players[targetPlayer]) { log(`Target streamer/player context not found.`, "err"); return; }
        if (targetPlayer === user) return;
        if (gameState.players[targetPlayer].pendingTruce === user) {
            gameState.truces[`${user}:${targetPlayer}`] = true;
            gameState.players[targetPlayer].pendingTruce = null;
            log(`🕊️ PEACE ACCORD: ${user} and ${targetPlayer} have formed an active Truce alliance!`, "succ");
        } else {
            p.pendingTruce = targetPlayer;
            log(`📜 ${user} sent a diplomatic treaty proposal to ${targetPlayer}. (!truce ${user} to accept)`);
        }
    }

    else if (cmd === "breaktruce") {
        const targetPlayer = args[0];
        if(gameState.truces[`${user}:${targetPlayer}`] || gameState.truces[`${targetPlayer}:${user}`]) {
            delete gameState.truces[`${user}:${targetPlayer}`]; delete gameState.truces[`${targetPlayer}:${user}`];
            log(`💔 WAR DECLARATION: ${user} shattered the peace treaty with ${targetPlayer}!`, "war");
        }
    }

    else if (cmd === "attack") {
        const [fromCode, toCode] = [args[0]?.toUpperCase(), args[1]?.toUpperCase()];
        const attTerritory = gameState.data[fromCode]; const defTerritory = gameState.data[toCode];

        if (!attTerritory || attTerritory.owner !== user) { log(`Attack source country owned incorrectly or missing.`, "err"); return; }
        if (!defTerritory) { log(`Destination target country code invalid.`, "err"); return; }
        if (defTerritory.owner === user) { log(`Cannot strike your own territories!`, "err"); return; }
        if (attTerritory.troops <= 2) { log(`Armies in ${fromCode} are too low (Must leave 2 garrison troops behind).`, "err"); return; }
        if (defTerritory.owner && checkTruce(user, defTerritory.owner)) {
            log(`⛔ Order Blocked: You maintain a Truce alliance with ${defTerritory.owner}! Use '!breaktruce ${defTerritory.owner}' first.`, "err");
            return;
        }

        const attackingArmies = attTerritory.troops - 2; 
        const defenseBuff = 1.0 + (defTerritory.buildings.base * 0.4); const defensiveArmies = defTerritory.troops;
        log(`⚔️ OFFENSIVE CAMPAIGN: ${user} deploys ${attackingArmies} troops from ${fromCode} to invade ${toCode}!`, "war");

        let attPower = 0; let defPower = 0;
        for(let i=0; i<attackingArmies; i++) { attPower += Math.floor(Math.random() * 6) + 1; }
        for(let i=0; i<defensiveArmies; i++) { defPower += Math.floor(Math.random() * 6) + 1; }
        defPower = Math.floor(defPower * defenseBuff);

        if (attPower > defPower) {
            const survivors = Math.max(1, Math.floor(attackingArmies * ((attPower - defPower) / attPower)));
            const formerOwner = defTerritory.owner;
            defTerritory.owner = user; defTerritory.troops = survivors; attTerritory.troops = 2; 
            log(`💥 CRITICAL VICTORY! ${user} conquered ${toCode}! (${survivors} units remaining).`, "succ");
            if(formerOwner) log(`📉 Player ${formerOwner} lost operational domain over ${toCode}.`, "war");
        } else {
            const lostRatio = attPower / defPower;
            const remainingDefenders = Math.max(1, Math.floor(defensiveArmies * (1 - (lostRatio * 0.5))));
            defTerritory.troops = remainingDefenders; attTerritory.troops = 2; 
            log(`❌ DEFENSE HELD: Assault on ${toCode} was entirely repelled. Survivors guarding: ${remainingDefenders}.`);
        }
    }

    updateMapColors();
    updateLeaderboard();
    saveGame();
}

function parseGeoJSONCoords(geometry) {
    let paths = [];
    const convertRing = (ring) => {
        let d = "";
        ring.forEach((c, i) => {
            const x = (c[0] + 180); const y = (90 - c[1]);
            if (!isNaN(x) && !isNaN(y)) d += (i === 0 ? "M " : "L ") + `${x.toFixed(2)},${y.toFixed(2)} `;
        });
        d += "Z"; return d;
    };
    if (geometry.type === "Polygon") {
        geometry.coordinates.forEach(ring => { paths.push(convertRing(ring)); });
    } else if (geometry.type === "MultiPolygon") {
        geometry.coordinates.forEach(polygon => { polygon.forEach(ring => { paths.push(convertRing(ring)); }); });
    }
    return paths.join(" ");
}

async function initMap() {
    try {
        const res = await fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json");
        const geo = await res.json();
        const svg = document.getElementById("map");
        svg.innerHTML = ""; 

        const countriesLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
        countriesLayer.setAttribute("id", "countries-layer");
        svg.appendChild(countriesLayer);

        const uiLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
        uiLayer.setAttribute("id", "ui-layer");
        svg.appendChild(uiLayer);

        geo.features.forEach(f => {
            const code = f.id || f.properties.ISO_A3;
            if(!code) return;

            if(!gameState.data[code]) {
                gameState.data[code] = { 
                    owner: null, troops: 0, 
                    buildings: { mine: 0, school: 0, city: 0, base: 0 } 
                };
            }
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("id", code);
            path.setAttribute("class", "country");
            
            // Mouse listener hooks to make the UI interactive when hovering regions
            path.addEventListener("mouseenter", () => {
                if(gameState.data[code]) {
                    updateFloatingStatsPanel(code, gameState.data[code]);
                }
            });
            
            const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
            path.appendChild(title);
            
            let pathData = parseGeoJSONCoords(f.geometry);
            if(!pathData || pathData.trim() === "") return;

            path.setAttribute("d", pathData);
            countriesLayer.appendChild(path); 

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("class", "owner-label");
            text.setAttribute("id", `lbl-${code}`);
            text.style.display = "none";
            uiLayer.appendChild(text);

            setTimeout(() => {
                try {
                    const box = path.getBBox();
                    if(box.width > 0.05 && box.height > 0.05) {
                        text.setAttribute("x", box.x + box.width / 2);
                        text.setAttribute("y", box.y + box.height / 2);
                    }
                } catch(e) {}
            }, 600);
        });

        updateMapColors();
        updateLeaderboard();
        log("🗺️ Adaptive Scale GeoJSON Map Mesh Online. Absolute Stacking Order Fixed!");
    } catch(err) { log("Critical Map Initialization Failure: " + err.message, "err"); }
}

ComfyJS.onCommand = (user, command, message) => {
    processCommand(user, command, message.split(" ").filter(x => x.trim() !== ""));
};

ComfyJS.Init("Jaedraze");
initMap();
</script>
</body>
</html>
