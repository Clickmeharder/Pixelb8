// --- CENTRALIZED THREE.JS GLOBE STATE ---
let globeContext = {

function toggleLeaderboard() {
    const wrapper = document.getElementById("leaderboard-wrapper");
    const btn = document.getElementById("collapse-btn");
    if (wrapper.classList.contains("collapsed")) {
        wrapper.classList.remove("collapsed");
        btn.textContent = "[-]";
    } else {
        wrapper.classList.add("collapsed");
        btn.textContent = "[+]";
    }
}

function toggleLog() {
    const wrapper = document.getElementById("log-wrapper");
    const btn = document.getElementById("log-collapse-btn");
    if (wrapper.classList.contains("collapsed")) {
        wrapper.classList.remove("collapsed");
        btn.textContent = "[-]";
    } else {
        wrapper.classList.add("collapsed");
        btn.textContent = "[+]";
    }
}

function log(msg, type = '') { 
    const l = document.getElementById("log"); 
    if (!l) return;
    let cls = '';
    if (type === 'err') cls = ' class="err"';
    if (type === 'succ') cls = ' class="succ"';
    if (type === 'war') cls = ' class="war"';
    l.innerHTML += `<div${cls}>> ${msg}</div>`; 
    l.scrollTop = l.scrollHeight; 
}

// Global Core Cycle System
setInterval(() => {
    let globalRecruitCount = 0;

    Object.keys(gameState.players).forEach(p => {
        let income = 15; let controlledCountries = 0;
        Object.values(gameState.data).forEach(c => {
            if(c.owner === p) { controlledCountries++; income += (c.buildings.mine * 12); }
        });
        if(controlledCountries > 0) gameState.players[p].gold += income;
    });

    Object.keys(gameState.data).forEach(code => {
        const c = gameState.data[code];
        if (c.owner && c.buildings.school > 0) {
            const unitCap = 15 + (c.buildings.city * 35);
            if (c.troops < unitCap) {
                let prospectiveGeneration = c.buildings.school * 2;
                if (c.troops + prospectiveGeneration > unitCap) prospectiveGeneration = unitCap - c.troops;
                c.troops += prospectiveGeneration;
                globalRecruitCount += prospectiveGeneration;
            }
        }
    });

    saveGame();
    updateMapColors();
    updateLeaderboard();
    
    log("💰 Economic Tick: Revenues distributed and accounting balances finalized.", "succ");
    if (globalRecruitCount > 0) log(`🎖️ Mobilization: ${globalRecruitCount} automated reserves generated via Schools.`, "succ");
}, 45000);

function saveGame() { localStorage.setItem(SAVE_KEY, JSON.stringify(gameState)); }
function resetGame() { localStorage.removeItem(SAVE_KEY); location.reload(); }

function getUserColor(name) {
    let hash = 0; for(let i=0; i<name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    let color = '#'; for(let i=0; i<3; i++) color += ('00'+((hash>>(i*8))&255).toString(16)).slice(-2);
    return color;
}

// Determines if country B is a spatial neighbor of country A by seeing if their bounding boxes overlap/intersect
function isImmediateNeighbor(targetCode, fallbackCode) {
    if (!targetCode || !fallbackCode || targetCode === fallbackCode) return false;
    const boxA = countryBoundsCache[targetCode];
    const boxB = countryBoundsCache[fallbackCode];
    if (!boxA || !boxB) return false;

    // Expand bounding box slightly to capture adjacent borders
    const tolerance = 6.0; 
    return (boxA.x - tolerance <= boxB.x + boxB.width &&
            boxA.x + boxA.width + tolerance >= boxB.x &&
            boxA.y - tolerance <= boxB.y + boxB.height &&
            boxA.y + boxA.height + tolerance >= boxB.y);
}

function updateMapColors() {
    Object.keys(gameState.data).forEach(code => {
        const country = document.getElementById(code);
        const label = document.getElementById(`lbl-${code}`);
        const assets = document.getElementById(`assets-${code}`);
        const cData = gameState.data[code];
        
        let pathWidth = 20; 
        if (country) {
            cData.owner ? country.style.fill = getUserColor(cData.owner) : country.style.fill = "#1f242c";
            try { pathWidth = country.getBBox().width; } catch(e) {}
            
            const title = country.querySelector("title");
            if(title) {
                title.textContent = `${code} | Ruler: ${cData.owner || 'Neutral'}\nTroops: ${cData.troops}\nMines: ${cData.buildings.mine} | Schools: ${cData.buildings.school}\nCities: ${cData.buildings.city} | Bases: ${cData.buildings.base}`;
            }
        }

        if(label && cData) {
            if(currentViewMode === "world") {
                label.style.display = "none";
            } else if(currentViewMode === "continent") {
                label.style.display = cData.owner ? "block" : "none";
                
                let baseSize = currentViewBoxDims.w * 0.03; 
                let calculatedSize = Math.max(1.0, Math.min(baseSize, pathWidth * 0.25));
                label.setAttribute("font-size", `${calculatedSize}px`);
                label.textContent = `${code}:${cData.troops}`;
            } else if(currentViewMode === "country") {
                // CLUTTER FIX: Only show text if it's the target country OR an immediate visual neighbor
                if (code === currentZoomTarget || isImmediateNeighbor(currentZoomTarget, code)) {
                    label.style.display = "block";
                    
                    let calculatedSize = currentViewBoxDims.w * 0.045;
                    if(pathWidth < 12) {
                        calculatedSize = currentViewBoxDims.w * 0.035;
                    }
                    
                    calculatedSize = Math.max(0.10, Math.min(2.0, calculatedSize));
                    label.setAttribute("font-size", `${calculatedSize}px`);
                    label.textContent = `${code} | ${cData.troops}`;
                } else {
                    label.style.display = "none";
                }
            }
        }

        // Contextually push properties to HTML Panel if focused inside target state view
        if (currentViewMode === "country" && currentZoomTarget === code && cData) {
            updateFloatingStatsPanel(code, cData);
        }
        
        if(assets) assets.style.display = "none";
    });
}

function updateFloatingStatsPanel(code, cData) {
    document.getElementById("box-country-title").textContent = `Sector: ${code}`;
    document.getElementById("box-ruler").textContent = cData.owner || "Neutral";
    document.getElementById("box-ruler").style.color = cData.owner ? getUserColor(cData.owner) : "#51e1ed";
    document.getElementById("box-troops").textContent = cData.troops;
    document.getElementById("box-infra-basic").textContent = `🏭x${cData.buildings.mine} 🏫x${cData.buildings.school}`;
    document.getElementById("box-infra-adv").textContent = `🌆x${cData.buildings.city} 🛡️x${cData.buildings.base}`;
    document.getElementById("box-cap").textContent = 15 + (cData.buildings.city * 35);
}



function updateLeaderboard() {
    const lbc = document.getElementById("lb-content");
    if(!lbc) return;
    let sorted = Object.keys(gameState.players).map(name => {
        let lands = 0; let troops = 0;
        Object.values(gameState.data).forEach(c => { if(c.owner === name) { lands++; troops += c.troops; } });
        return { name, gold: gameState.players[name].gold, lands, troops };
    }).sort((a,b) => (b.lands * 10 + b.troops) - (a.lands * 10 + a.troops));

    lbc.innerHTML = sorted.map(p => `
        <div class="lb-row">
            <div class="lb-player-meta">
                <span class="lb-player-name">${p.name}</span>
                <span class="lb-player-count">(${p.lands} Territories Owned)</span>
            </div>
            <div class="lb-player-stats">
                💰${p.gold} &nbsp;⚔️${p.troops}
            </div>
        </div>
    `).join('');
}

function checkTruce(p1, p2) { return gameState.truces[`${p1}:${p2}`] || gameState.truces[`${p2}:${p1}`] || false; }

/* ========================================================================

function triggerSovereigntyRipple(countryCode, colorHex) {
    const box = countryBoundsCache[countryCode];
    if (!box) return;
    const uiLayer = document.getElementById("ui-layer");
    const cx = box.x + box.width / 2;
    const cy = box.y + box.height / 2;

    const ring = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    ring.setAttribute("cx", cx);
    ring.setAttribute("cy", cy);
    ring.setAttribute("r", "1");
    ring.setAttribute("fill", "none");
    ring.setAttribute("stroke", colorHex);
    ring.setAttribute("stroke-width", "1.5");
    ring.setAttribute("opacity", "1");
    ring.style.transition = "all 1.2s cubic-bezier(0.1, 0.8, 0.3, 1)";
    uiLayer.appendChild(ring);

    requestAnimationFrame(() => {
        ring.setAttribute("r", Math.max(box.width, box.height) * 2.5);
        ring.setAttribute("opacity", "0");
    });
    setTimeout(() => ring.remove(), 1200);
}

function triggerMultiBuildingStampAnimation(countryCode, type, amount) {
    const box = countryBoundsCache[countryCode];
    if (!box) return;
    const uiLayer = document.getElementById("ui-layer");
    
    const cx = box.x + box.width / 2;
    const cy = box.y + box.height / 2;

    const iconMap = { mine: "🏭", school: "🏫", city: "🌆", base: "🛡️" };
    const emoji = iconMap[type] || "🏗️";

    const animGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
    animGroup.style.transformOrigin = `${cx}px ${cy}px`;
    
    // 1. The Large Structural Stamp

function executeBuild(user, p, type, targetCode, quantity = 1) {
    if (!COSTS[type]) { 
        log(`Invalid building! Use: mine, school, city, base.`, "err"); 
        return; 
    }
    if (!gameState.data[targetCode] || gameState.data[targetCode].owner !== user) { 
        log(`You do not govern ${targetCode || 'this territory'}.`, "err"); 
        return; 
    }

    const unitCost = COSTS[type];

    if (quantity === "max") {
        quantity = Math.floor(p.gold / unitCost);
        if (quantity <= 0) {
            log(`❌ Treasury depleted! You cannot afford a single ${type.toUpperCase()} (Costs 💰${unitCost} gold).`, "err");
            return;
        }
    } else {
        quantity = parseInt(quantity, 10);
        if (isNaN(quantity) || quantity <= 0) quantity = 1;
    }

    const totalCost = unitCost * quantity;
    if (p.gold < totalCost) { 
        log(`Insufficient gold! Building ${quantity}x ${type.toUpperCase()} costs 💰${totalCost} gold.`, "err"); 
        return; 
    }

    changeMapProjection(targetCode);

    setTimeout(() => {
        p.gold -= totalCost;
        
        triggerMultiBuildingStampAnimation(targetCode, type, quantity);
        log(`🏗️ ${user} commissioned ${quantity}x ${type.toUpperCase()} in ${targetCode} for 💰${totalCost} gold.`, "succ");
        flagGlobeTextureUpdate(); // Capture structural stamp spawn

        const animationLeeway = 4000 + (Math.min(quantity, 10) * 150);

        setTimeout(() => {
            gameState.data[targetCode].buildings[type] += quantity;
            
            updateMapColors();
            updateLeaderboard();
            saveGame();
            flagGlobeTextureUpdate();

            changeMapProjection("world");
        }, animationLeeway);

    }, 600);
}
function parseDeploymentTroops(amountInput, totalAvailable) {
    const input = String(amountInput).trim().toLowerCase();
    
    if (input === 'max') {
        return totalAvailable;
    }
    
    if (input.endsWith('%')) {
        const percent = Math.min(100, Math.max(0, parseFloat(input)));
        if (isNaN(percent)) return 0;
        return Math.floor(totalAvailable * (percent / 100));
    }
    
    const absoluteValue = parseInt(input, 10);
    if (isNaN(absoluteValue) || absoluteValue <= 0) return 0;
    
    // If the user inputs a raw number <= 100, evaluate if it was an implied percentage
    // otherwise fallback directly to standard troop integer bounds
    if (absoluteValue <= 100 && absoluteValue > totalAvailable) {
        return Math.floor(totalAvailable * (absoluteValue / 100));
    }
    
    return Math.min(absoluteValue, totalAvailable);
}

// --- MAIN INTERACTION BRIDGE ---
function executeDeployCommand(user, amountInput, fromCode, toCode) {
    const attTerritory = gameState.data[fromCode]; 
    const defTerritory = gameState.data[toCode];

    if (!attTerritory || attTerritory.owner !== user) { log(`Deployment origin territory owned incorrectly or missing.`, "err"); return; }
    if (!defTerritory) { log(`Destination target country code invalid.`, "err"); return; }
    if (defTerritory.owner === user) { log(`Cannot strike your own territories!`, "err"); return; }
    
    // Rules enforcement: Must retain a minimum of 2 garrisoned units at the base of operations
    const totalAvailablePool = attTerritory.troops - 2;
    if (totalAvailablePool <= 0) { log(`Armies in ${fromCode} are too low (Must leave 2 troops behind).`, "err"); return; }

    const attackingArmies = parseDeploymentTroops(amountInput, totalAvailablePool);
    if (attackingArmies <= 0) { log(`Invalid deployment troop payload target size specified.`, "err"); return; }
    
    if (defTerritory.owner && checkTruce(user, defTerritory.owner)) {
        log(`⛔ Order Blocked: You maintain a Truce alliance with ${defTerritory.owner}! Use '!breaktruce ${defTerritory.owner}' first.`, "err");
        return;
    }

    const defenseBuff = 1.0 + (defTerritory.buildings.base * 0.4); 
    const defensiveArmies = defTerritory.troops;
    log(`💂 MOBILIZATION CAMPAIGN: ${user} deploys ${attackingArmies} battalions from ${fromCode} to target ${toCode}!`, "war");

    let attPower = 0; let defPower = 0;
    for(let i=0; i<attackingArmies; i++) { attPower += Math.floor(Math.random() * 6) + 1; }
    for(let i=0; i<defensiveArmies; i++) { defPower += Math.floor(Math.random() * 6) + 1; }
    defPower = Math.floor(defPower * defenseBuff);

    const isSuccess = attPower > defPower;
    
    let attFinalSurviving = 2;
    let defFinalSurviving = defensiveArmies;
    let formerOwner = defTerritory.owner;

    let calculatedAttackerLosses = 0;
    let calculatedDefenderLosses = 0;

    if (isSuccess) {
        defFinalSurviving = Math.max(1, Math.floor(attackingArmies * ((attPower - defPower) / attPower)));
        calculatedAttackerLosses = attackingArmies; 
        calculatedDefenderLosses = defensiveArmies; 
    } else {
        const lostRatio = attPower / defPower;
        defFinalSurviving = Math.max(1, Math.floor(defensiveArmies * (1 - (lostRatio * 0.5))));
        calculatedAttackerLosses = attackingArmies; 
        calculatedDefenderLosses = defensiveArmies - defFinalSurviving;
    }

    const commitStateResolution = () => {
        if (isSuccess) {
            defTerritory.owner = user; 
            defTerritory.troops = defFinalSurviving; 
            attTerritory.troops = 2; 
            log(`💥 CRITICAL VICTORY! ${user} conquered ${toCode}! (${defFinalSurviving} units remaining).`, "succ");
            if(formerOwner) log(`📉 Player ${formerOwner} lost operational domain over ${toCode}.`, "war");
        } else {
            defTerritory.troops = defFinalSurviving; 
            attTerritory.troops = attTerritory.troops - attackingArmies; 
            log(`❌ DEFENSE HELD: Assault on ${toCode} was entirely repelled. Survivors guarding: ${defFinalSurviving}.`);
        }
        updateMapColors();
        updateLeaderboard();
        saveGame();
    };

    triggerCinematicCombat(fromCode, toCode, {
        attDeploying: attackingArmies,
        defInitial: defensiveArmies,
        attLosses: calculatedAttackerLosses,
        defLosses: calculatedDefenderLosses,
        isSuccess: isSuccess,
        commitStateResolution: commitStateResolution
    });
}

// --- PERFORMANCE GRAPHICS RENDERING PIPELINE ---
function triggerCinematicCombat(fromCode, toCode, combatDetails) {
    const boxA = countryBoundsCache[fromCode];
    const boxB = countryBoundsCache[toCode];
    if (!boxA || !boxB) { combatDetails.commitStateResolution(); return; }

    // IMMUTABLE SCOPE CAPTURE
    const attDeployingVal = combatDetails.attDeploying || 0;
    const defInitialVal   = combatDetails.defInitial || 0;
    const attLossesVal    = combatDetails.attLosses || 0;
    const defLossesVal    = combatDetails.defLosses || 0;
    const stateResolver   = combatDetails.commitStateResolution;

    const uiLayer = document.getElementById("ui-layer");
    
    const x1 = boxA.x + boxA.width / 2;
    const y1 = boxA.y + boxA.height / 2;
    const x2 = boxB.x + boxB.width / 2;
    const y2 = boxB.y + boxB.height / 2;

    // --- DYNAMIC VIEWPORT SCALING REFACTOR ---
    const currentViewWidth = currentViewBoxDims.w || 360;
    
    const startTextSize = Math.max(1.8, Math.min(8, currentViewWidth * 0.05));
    const endTextSize   = Math.max(1.8, Math.min(8, currentViewWidth * 0.05)); 
    const strokeWidth   = Math.max(0.15, Math.min(0.8, currentViewWidth * 0.005));

    changeMapProjection(fromCode);

    // Dotted flight vector setup
    const trajectoryLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
    trajectoryLine.setAttribute("x1", x1); trajectoryLine.setAttribute("y1", y1);
    trajectoryLine.setAttribute("x2", x1); trajectoryLine.setAttribute("y2", y1); 
    trajectoryLine.setAttribute("stroke", "#ff3d00");
    trajectoryLine.setAttribute("stroke-width", strokeWidth);
    trajectoryLine.setAttribute("stroke-dasharray", `${strokeWidth * 2}, ${strokeWidth * 2}`);
    uiLayer.appendChild(trajectoryLine);

    // Battalion stream container management
    const streamContainer = document.createElementNS("http://www.w3.org/2000/svg", "g");
    uiLayer.appendChild(streamContainer);

    const maxVisibleIcons = 8;
    const linesToSpawnCount = Math.min(maxVisibleIcons, attDeployingVal);
    const troopElementsArray = [];

    for (let i = 0; i < linesToSpawnCount; i++) {
        const soldierTextNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
        soldierTextNode.textContent = (i === 0) ? `💂x${attDeployingVal}` : `💂`;
        soldierTextNode.setAttribute("class", "combat-vfx-text");
        soldierTextNode.setAttribute("fill", "#fff");
        soldierTextNode.setAttribute("font-size", `${startTextSize}px`);
        soldierTextNode.setAttribute("text-anchor", "middle");
        soldierTextNode.setAttribute("dominant-baseline", "central");
        
        streamContainer.appendChild(soldierTextNode);
        
        troopElementsArray.push({
            node: soldierTextNode,
            trailOffsetOffset: i * 0.045
        });
    }

    const duration = 5000; 
    let startTime = null;

    function animateTravel(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;
        const baseProgress = Math.min(elapsed / duration, 1);

        const leadX = x1 + (x2 - x1) * baseProgress;
        const leadY = y1 + (y2 - y1) * baseProgress;
        trajectoryLine.setAttribute("x2", leadX);
        trajectoryLine.setAttribute("y2", leadY);

        troopElementsArray.forEach((soldier) => {
            let elementProgress = baseProgress - soldier.trailOffsetOffset;
            if (elementProgress < 0) elementProgress = 0;
            if (elementProgress > 1) elementProgress = 1;

            const curX = x1 + (x2 - x1) * elementProgress;
            const curY = y1 + (y2 - y1) * elementProgress;

            soldier.node.setAttribute("x", curX);
            soldier.node.setAttribute("y", curY);

            const curScale = startTextSize + (endTextSize - startTextSize) * elementProgress;
            soldier.node.setAttribute("font-size", `${curScale}px`);
        });

        if (typeof interpolateMapFocus === "function") {
            interpolateMapFocus(leadX, leadY);
        }

        if (baseProgress < 1) {
            requestAnimationFrame(animateTravel);
        } else {
            handleTargetImpact();
        }
    }

    setTimeout(() => {
        requestAnimationFrame(animateTravel);
    }, 1000);

    function handleTargetImpact() {
        if (streamContainer && streamContainer.parentNode) {
            streamContainer.remove();
        }
        changeMapProjection(toCode);

        // Safe State Execution right at point of impact
        if (typeof stateResolver === "function") {
            stateResolver();
        }

        const battleGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
        battleGroup.style.transformOrigin = `${x2}px ${y2}px`;

        const panelY = y2 - (endTextSize * 1.2); 
        const spacingX = endTextSize * 1.6; 

        const displayContainer = document.createElementNS("http://www.w3.org/2000/svg", "g");
        displayContainer.style.animation = "popInStatic 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards";

        const attDisplay = document.createElementNS("http://www.w3.org/2000/svg", "text");
        attDisplay.setAttribute("class", "combat-vfx-text");
        attDisplay.setAttribute("x", x2 - spacingX);
        attDisplay.setAttribute("y", panelY);
        attDisplay.setAttribute("fill", "#ffeb3b");
        attDisplay.setAttribute("font-size", `${endTextSize}px`);
        attDisplay.setAttribute("text-anchor", "middle");
        attDisplay.textContent = `⚔️${attDeployingVal}`;
        displayContainer.appendChild(attDisplay);

        const defDisplay = document.createElementNS("http://www.w3.org/2000/svg", "text");
        defDisplay.setAttribute("class", "combat-vfx-text");
        defDisplay.setAttribute("x", x2 + spacingX);
        defDisplay.setAttribute("y", panelY);
        defDisplay.setAttribute("fill", "#00b0ff");
        defDisplay.setAttribute("font-size", `${endTextSize}px`);
        defDisplay.setAttribute("text-anchor", "middle");
        defDisplay.textContent = `🛡️${defInitialVal}`;
        displayContainer.appendChild(defDisplay);

        battleGroup.appendChild(displayContainer);
        uiLayer.appendChild(battleGroup);

        setTimeout(() => {
            const slashWidthOffset = endTextSize * 0.8;

            if (attLossesVal > 0) {
                const slashA = document.createElementNS("http://www.w3.org/2000/svg", "line");
                slashA.setAttribute("x1", x2 - spacingX - slashWidthOffset);
                slashA.setAttribute("y1", panelY + (endTextSize * 0.3));
                slashA.setAttribute("x2", x2 - spacingX + slashWidthOffset);
                slashA.setAttribute("y2", panelY - (endTextSize * 0.5));
                slashA.setAttribute("stroke", "#ff1744");
                slashA.setAttribute("stroke-width", `${strokeWidth * 1.5}`);
                slashA.style.animation = "slashStrike 0.25s ease-out forwards";
                displayContainer.appendChild(slashA);

                const lossTextA = document.createElementNS("http://www.w3.org/2000/svg", "text");
                lossTextA.setAttribute("class", "combat-vfx-text");
                lossTextA.setAttribute("x", x2 - spacingX);
                lossTextA.setAttribute("y", panelY + endTextSize);
                lossTextA.setAttribute("fill", "#ff1744");
                lossTextA.setAttribute("font-size", `${endTextSize * 0.75}px`);
                lossTextA.setAttribute("text-anchor", "middle");
                lossTextA.textContent = `-${attLossesVal}`;
                displayContainer.appendChild(lossTextA);
            }

            if (defLossesVal > 0) {
                const slashB = document.createElementNS("http://www.w3.org/2000/svg", "line");
                slashB.setAttribute("x1", x2 + spacingX - slashWidthOffset);
                slashB.setAttribute("y1", panelY + (endTextSize * 0.3));
                slashB.setAttribute("x2", x2 + spacingX + slashWidthOffset);
                slashB.setAttribute("y2", panelY - (endTextSize * 0.5));
                slashB.setAttribute("stroke", "#ff1744");
                slashB.setAttribute("stroke-width", `${strokeWidth * 1.5}`);
                slashB.style.animation = "slashStrike 0.25s ease-out forwards";
                displayContainer.appendChild(slashB);

                const lossTextB = document.createElementNS("http://www.w3.org/2000/svg", "text");
                lossTextB.setAttribute("class", "combat-vfx-text");
                lossTextB.setAttribute("x", x2 + spacingX);
                lossTextB.setAttribute("y", panelY + endTextSize);
                lossTextB.setAttribute("fill", "#ff1744");
                lossTextB.setAttribute("font-size", `${endTextSize * 0.75}px`);
                lossTextB.setAttribute("text-anchor", "middle");
                lossTextB.textContent = `-${defLossesVal}`;
                displayContainer.appendChild(lossTextB);
            }

            // This timer manages the post-combat stats showcase window before cleaning up
            setTimeout(() => {
                battleGroup.style.transition = "opacity 0.6s ease";
                battleGroup.style.opacity = "0";
                if (trajectoryLine && trajectoryLine.parentNode) {
                    trajectoryLine.remove();
                }
                setTimeout(() => {
                    if (battleGroup && battleGroup.parentNode) {
                        battleGroup.remove();
                    }
                    
                    // 📷 The dust has settled, data is committed. Safely restore full world overview!
                    changeMapProjection("world");
                }, 600);
            }, 3500);

        }, 1200);
    }
}

function executeDeployBattleCalculation(user, attackingArmies, fromCode, toCode) {
    const attTerritory = gameState.data[fromCode]; 
    const defTerritory = gameState.data[toCode];

    // Note: Basic ownership, truce validation, and troop-pool validation are already 
    // handled inside your twitch command listener right before parsing amountInput.

    const defenseBuff = 1.0 + (defTerritory.buildings.base * 0.4); 
    const defensiveArmies = defTerritory.troops;
    
    log(`💂 MOBILIZATION: ${user} sends ${attackingArmies} troops from ${fromCode} to clash at ${toCode}!`, "war");

    // --- BATTLE ENGINE RESOLUTION ---
    let attPower = 0; let defPower = 0;
    for(let i=0; i<attackingArmies; i++) { attPower += Math.floor(Math.random() * 6) + 1; }
    for(let i=0; i<defensiveArmies; i++) { defPower += Math.floor(Math.random() * 6) + 1; }
    defPower = Math.floor(defPower * defenseBuff);

    const isSuccess = attPower > defPower;
    
    let defFinalSurviving = defensiveArmies;
    let formerOwner = defTerritory.owner;

    let calculatedAttackerLosses = 0;
    let calculatedDefenderLosses = 0;

    if (isSuccess) {
        defFinalSurviving = Math.max(1, Math.floor(attackingArmies * ((attPower - defPower) / attPower)));
        calculatedAttackerLosses = attackingArmies; // The entire invading force leaves home; survivors stay in the captured zone
        calculatedDefenderLosses = defensiveArmies; // All defenders eliminated
    } else {
        const lostRatio = attPower / defPower;
        defFinalSurviving = Math.max(1, Math.floor(defensiveArmies * (1 - (lostRatio * 0.5))));
        calculatedAttackerLosses = attackingArmies; // The entire explicit deployment force was lost at the gates
        calculatedDefenderLosses = defensiveArmies - defFinalSurviving;
    }

    // --- LAZY STATE COMMITMENT (CALLED POST-ANIMATION LANDING) ---
    const commitStateResolution = () => {
        if (isSuccess) {
            // Attacker conquers territory. Their home base loses what was sent.
            defTerritory.owner = user; 
            defTerritory.troops = defFinalSurviving; 
            attTerritory.troops -= attackingArmies; 
            
            log(`💥 CRITICAL CONQUEST! ${user} took ${toCode}! (${defFinalSurviving} troops garrisoned).`, "succ");
            if(formerOwner) log(`📉 ${formerOwner} lost control of ${toCode}.`, "war");
        } else {
            // Defense holds. Target updates survivors, Attacker base only loses the specific force sent.
            defTerritory.troops = defFinalSurviving; 
            attTerritory.troops -= attackingArmies; 
            
            log(`❌ ATTACK REPELLED: Defense held at ${toCode}. Survivors remaining: ${defFinalSurviving}.`);
        }
        
        updateMapColors();
        updateLeaderboard();
        saveGame();
    };

    // Pass the calculated results off to your 💂 visual stream renderer
    triggerCinematicCombat(fromCode, toCode, {
        attDeploying: attackingArmies,
        defInitial: defensiveArmies,
        attLosses: calculatedAttackerLosses,
        defLosses: calculatedDefenderLosses,
        isSuccess: isSuccess,
        commitStateResolution: commitStateResolution
    });
}

/**
 * Orchestrates localized bot choices with exponential spawn decay for new entries.
 */
function triggerAIBackgroundAction() {
    const allTerritories = Object.keys(gameState.data);
    const unclaimed = allTerritories.filter(code => !gameState.data[code].owner);
    
    const activeBots = [...new Set(allTerritories
        .map(code => gameState.data[code].owner)
        .filter(owner => owner && owner.startsWith("[BOT] ")))];

    // --- EXPONENTIAL DECAY CALCULATION ---
    // Calculate elapsed time in minutes
    const elapsedMinutes = (Date.now() - gameStartTime) / 60000; 
    
    // Half-life tuning: 18 minutes means spawn rates drop by half every 18 mins.
    // At 0 mins: ~35% baseline spawn chance.
    // At 30 mins: drops to ~11% chance.
    // At 60 mins: drops to ~3% chance (once in a blue moon).
    const baseSpawnChance = 0.35;
    const dynamicSpawnChance = baseSpawnChance * Math.pow(0.5, elapsedMinutes / 18);

    // 2. Decision Logic Tree
    if (unclaimed.length > 0 && Math.random() < dynamicSpawnChance) {
        // A brand new bot claims a spot on the map
        spawnNewBotCountry(unclaimed);
    } else if (activeBots.length > 0) {
        // Existing bots run their turns (attacks, upgrades) at a steady pace
        executeActiveBotTurn(activeBots, allTerritories);
    }
}

function spawnNewBotCountry(unclaimedList) {

    const randomName = botNamesPool[Math.floor(Math.random() * botNamesPool.length)];

/**

 */
function executeActiveBotTurn(activeBots, allTerritories) {
    const chosenBot = activeBots[Math.floor(Math.random() * activeBots.length)];
    
    // Gather lands owned by this exact bot profile
    const botLands = allTerritories.filter(code => gameState.data[code].owner === chosenBot);
    if (botLands.length === 0) return;

    const sourceCountry = botLands[Math.floor(Math.random() * botLands.length)];
    const sourceData = gameState.data[sourceCountry];

    // Decision Logic Tree based on internal resource calculations
    if (sourceData.troops > 15) {
        // Aggressive Action: Find neighbors or valid global targets to raid
        const possibleTargets = allTerritories.filter(code => gameState.data[code].owner !== chosenBot);
        if (possibleTargets.length > 0) {
            const randomTarget = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];
            
            // Randomly use a percentage-based approach or absolute count deployment string
            const choices = ["50%", "75%", "max"];
            const selectedPayload = choices[Math.floor(Math.random() * choices.length)];

            log(`🤖 AI Decision Context: ${chosenBot} targeting ${randomTarget} from ${sourceCountry}...`, "war");
            processCommand(chosenBot, "deploy", [selectedPayload, sourceCountry, randomTarget]);

        // Defensive Action: Spend local resources to upgrade territory structures
        const buildOptions = ["base", "city", "school"];
        const chosenBuild = buildOptions[Math.floor(Math.random() * buildOptions.length)];
        
        processCommand(chosenBot, "build", [chosenBuild, sourceCountry]);
    }

function switchTheaterMode(theater) {

    currentViewMode = "world";
    currentZoomTarget = "world";

    if(indicator) indicator.textContent = `Theater View: ${currentTheater.toUpperCase() === 'EARTH' ? 'World' : 'Lunar Surface'}`;

    initMap();
}
function changeMapProjection(target) {
    const map = document.getElementById("map"); // Target the single standard SVG frame
    const indicator = document.getElementById("view-indicator");
    if (!map) return;

    if (projectionTimeoutId) {
        clearTimeout(projectionTimeoutId);
        projectionTimeoutId = null;
    }
    
    const theaterConfig = MAP_THEATERS[currentTheater];

    if (theaterConfig.viewBoxes[target.toLowerCase()]) {
        currentViewMode = target.toLowerCase() === "world" ? "world" : "continent";
        currentZoomTarget = target.toLowerCase();
        
        const tokens = theaterConfig.viewBoxes[target.toLowerCase()].split(" ");
        currentViewBoxDims.w = parseFloat(tokens[2]);
        currentViewBoxDims.h = parseFloat(tokens[3]);
        
        map.setAttribute("viewBox", theaterConfig.viewBoxes[target.toLowerCase()]);
        if(indicator) indicator.textContent = `Theater View: ${target.toUpperCase()}`;
    } else {
        const path = document.getElementById(target.toUpperCase());
        if (path) {
            try {
                const box = path.getBBox();
                let pad = Math.max(box.width, box.height) * 0.35;
                
                const vx = box.x - pad/2;
                const vy = box.y - pad/2;
                const vw = box.width + pad;
                const vh = box.height + pad;
                
                currentViewMode = "country";
                currentZoomTarget = target.toUpperCase();
                currentViewBoxDims.w = vw;
                currentViewBoxDims.h = vh;
                
                map.setAttribute("viewBox", `${vx} ${vy} ${vw} ${vh}`);
                if(indicator) indicator.textContent = `Sector Zoom: ${target.toUpperCase()}`;
            } catch(e) {}
        }
    }
    updateMapColors();
}
function interpolateMapFocus(targetX, targetY) {
    const map = document.getElementById("map");
    if (!map) return;

    const currentW = currentViewBoxDims.w || 45;
    const currentH = currentViewBoxDims.h || 30;
    const currentViewBoxStr = map.getAttribute("viewBox");
    let currentX = targetX;
    let currentY = targetY;

    if (currentViewBoxStr) {
        const tokens = currentViewBoxStr.split(" ");
        if (tokens.length === 4) {
            const curMinX = parseFloat(tokens[0]);
            const curMinY = parseFloat(tokens[1]);
            currentX = curMinX + currentW / 2;
            currentY = curMinY + currentH / 2;
        }
    }

    const easing = 0.12;
    const nextCenterX = currentX + (targetX - currentX) * easing;
    const nextCenterY = currentY + (targetY - currentY) * easing;
    const nextMinX = nextCenterX - currentW / 2;
    const nextMinY = nextCenterY - currentH / 2;

    map.setAttribute("viewBox", `${nextMinX} ${nextMinY} ${currentW} ${currentH}`);
    
    // 🌟 If a projectile or troop is traveling across the 2D plane, 
    // force the 3D globe texture to dynamically update mid-flight!
    flagGlobeTextureUpdate();
}

// 🌟 DYNAMIC CARTOGRAPHY TRANSLATOR FOR GLOBE MODE SPINNING
function rotateGlobeToTarget(targetCode) {
    let targetX = 180;
    const lookup = targetCode.toLowerCase();
    
    if (CONTINENT_VIEWBOXES[lookup]) {
        const tokens = CONTINENT_VIEWBOXES[lookup].split(" ");
        targetX = parseFloat(tokens[0]) + (parseFloat(tokens[2]) / 2);
    } else if (countryBoundsCache[targetCode.toUpperCase()]) {
        const box = countryBoundsCache[targetCode.toUpperCase()];
        targetX = box.x + (box.width / 2);
    } else {
        const path = document.getElementById(targetCode.toUpperCase());
        if (path) {
            const box = path.getBBox();
            targetX = box.x + (box.width / 2);
        }
    }
    
    // Translate 2D SVG X (0 to 360) directly into 3D Radial Rotation Y bounds
    const lonPercent = targetX / 360;
    const targetRadY = Math.PI * 1.5 + (lonPercent * Math.PI * 2);
    
    // Smoothly ease the globe mesh rotation to look directly at the battle/claim sector
    if (globeContext.mesh) {
        gsap.to(globeContext.mesh.rotation, { y: targetRadY, duration: 1.2, ease: "power2.out" });
    }
}

/**
 * Re-rasterizes the live, running SVG map layer on request and maps it into the WebGL runtime
 */
function updateGlobeTextureFromLiveSVG() {
    const flatMap = document.getElementById("map");
    if (!flatMap || !globeContext.isActive || !globeContext.texture) return;

    // Temporarily ensure visibility to make serialization pristine
    const oldVisibility = flatMap.style.visibility;
    flatMap.style.visibility = "visible";

    const svgString = new XMLSerializer().serializeToString(flatMap);
    const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
    const URL = window.URL || window.webkitURL || window;
    const blobURL = URL.createObjectURL(svgBlob);

    flatMap.style.visibility = oldVisibility;

    const img = new Image();
    img.src = blobURL;
    img.onload = function() {
        if (globeContext.texture) {
            globeContext.texture.image = img;
            globeContext.texture.needsUpdate = true;
        }
        URL.revokeObjectURL(blobURL);
    };
}

function displayTacticalGlobeMode() {
    if (globeContext.isActive) return;
    globeContext.isActive = true;

    log(`🔭 3D ENGINE IGNITION: Projecting ${currentTheater.toUpperCase()} coordinates onto sphere...`, "succ");

    const globeContainer = document.createElement("div");
    globeContainer.id = "three-globe-viewport";
    globeContainer.style.cssText = `
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 9999; display: flex; justify-content: center; align-items: center;
        pointer-events: none;
    `;
    document.body.appendChild(globeContainer);

    // 🌟 Grab the contextually active map element
    const flatMap = document.getElementById(`map-${currentTheater}`);
    if (!flatMap) { log("Error: Base SVG map layer not found.", "err"); return; }

    const svgString = new XMLSerializer().serializeToString(flatMap);
    const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
    const URL = window.URL || window.webkitURL || window;
    const blobURL = URL.createObjectURL(svgBlob);

    flatMap.style.opacity = "0.001";

    const textureImage = new Image();
    textureImage.src = blobURL;

    textureImage.onload = function() {
        const width = window.innerWidth;
        const height = window.innerHeight;

        globeContext.scene = new THREE.Scene();
        globeContext.camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        globeContext.camera.position.z = 280;

        globeContext.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        globeContext.renderer.setSize(width, height);
        globeContext.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        globeContainer.appendChild(globeContext.renderer.domElement);

        const globeTexture = new THREE.Texture(textureImage);
        globeContext.texture = globeTexture;
        globeTexture.needsUpdate = true;

        const geometry = new THREE.SphereGeometry(90, 64, 64);
        const material = new THREE.MeshBasicMaterial({
            map: globeTexture,
            transparent: true,
            side: THREE.DoubleSide
        });

        globeContext.mesh = new THREE.Mesh(geometry, material);
        globeContext.mesh.rotation.z = (currentTheater === "earth") ? 0.41 : 0.02; // Moon axis is nearly straight up down (1.5 deg tilt)
        globeContext.mesh.rotation.y = Math.PI * 1.5; 

        globeContext.scene.add(globeContext.mesh);

        function animateGlobe() {
            if (!globeContext.isActive) return;
            globeContext.animationId = requestAnimationFrame(animateGlobe);

            if (globeContext.isTextureDirty) {
                updateGlobeTextureFromLiveSVG();
                globeContext.isTextureDirty = false;
            }

            globeContext.mesh.rotation.y += 0.0015;
            globeContext.renderer.render(globeContext.scene, globeContext.camera);
        }
        animateGlobe();

        setTimeout(() => { URL.revokeObjectURL(blobURL); }, 1000);
    };
}

function processCommand(user, cmd, args) {
    cmd = cmd.toLowerCase();
    if (cmd === "earth") {
        switchTheaterMode("earth");
        return;
    }

    if (cmd === "moon") {
        switchTheaterMode("moon");
        return;
    }
    if (cmd === "show") {
        if (!args[0]) { log("Provide visibility arguments. E.g., !show world, !show na, !show USA", "err"); return; }
        changeMapProjection(args[0]);
        return;
    }
    if (cmd === "leaderboard") {
        toggleLeaderboard();
        log(`👑 Player ${user} toggled leaderboard!`, "succ");
        return;
    }
    // --- THE APOCALYPSE TERMINAL ROUTE ---
    if (cmd === "doomsday" || cmd === "nukeall") {
        if (user.toLowerCase() !== "jaedraze") { 
            log(`⛔ Security Exception: Operational authorization code required to fire weapon payloads.`, "err"); 
            return; 
        }
        
        // Set lock state flag to secure system parameters
        doomsdayTriggered = true; 
        executeDoomsdayProtocol();
    }
    if (cmd === "globe" || cmd === "3d") {
        displayTacticalGlobeMode();
        return;
    }

    if (cmd === "flat" || cmd === "2d") {
        terminateGlobeMode();
        return;
    }
    if (cmd === "join") {
        if (!gameState.players[user]) {
            gameState.players[user] = { gold: 600, pendingTruce: null };
            log(`👑 Player ${user} has raised their flag and entered the theater of war!`, "succ");
            updateLeaderboard();
        } else { log(`${user}, you are already inside the war servers.`, "err"); }
        return;
    }

    // --- AUTOMATED BOT INITIALIZATION GATES ---
    if (!gameState.players[user]) {
        if (user.startsWith("[BOT] ")) {
            gameState.players[user] = { gold: 800, pendingTruce: null };
        } else {
            // Safe exit guard if regular non-joined streamer accounts try running things
            return; 
        }
    }
    const p = gameState.players[user];

    if (cmd === "claim") {
        executeClaim(user, args[0]?.toUpperCase());
    }

    else if (cmd === "setclaimlimit") {
        if (user.toLowerCase() !== "jaedraze") { 
            log(`⛔ Unauthorized: Only the supreme commander can modify global deployment limits.`, "err"); 
            return; 
        }
        const newLimit = parseInt(args[0], 10);
        if (isNaN(newLimit) || newLimit < 1) {
            log(`Provide a valid numeric limit of 1 or greater. (E.g., !setclaimlimit 3)`, "err");
            return;
        }
        claimLimit = newLimit;
        log(`⚙️ CONFIG UPDATE: Global expansion limit adjusted. Players can now claim up to ${claimLimit} territories.`, "war");
    }

    else if (cmd === "build") {
        let type = args[0]?.toLowerCase();
        let targetCode = args[1]?.toUpperCase();
        let quantity = 1;

        // Check if the user typed '!build max mine CA' or '!build mine max CA'
        if (type === "max") {
            type = args[1]?.toLowerCase();
            targetCode = args[2]?.toUpperCase();
            quantity = "max";
        } else if (targetCode === "MAX") {
            targetCode = args[2]?.toUpperCase();
            quantity = "max";
        }

        executeBuild(user, p, type, targetCode, quantity);
    }

    else if (cmd === "status") {
        const targetCode = args[0]?.toUpperCase();
        const c = gameState.data[targetCode];
        if (!c || c.owner !== user) { log(`You do not own or have visibility over ${targetCode || 'this territory'}.`, "err"); return; }
        const unitCap = 15 + (c.buildings.city * 35);
        log(`📊 Sector Profile [${targetCode}]: Troops: ${c.troops}/${unitCap} | Active Autogen: +${c.buildings.school * 2} per tick.`, "succ");
    }

    else if (cmd === "truce") {
        const targetPlayer = args[0];
        if (!targetPlayer || !gameState.players[targetPlayer]) { log(`Target streamer/player context not found.`, "err"); return; }
        if (targetPlayer === user) return;
        if (gameState.players[targetPlayer].pendingTruce === user) {
            gameState.truces[`${user}:${targetPlayer}`] = true;
            gameState.players[targetPlayer].pendingTruce = null;
            log(`🕊️ PEACE ACCORD: ${user} and ${targetPlayer} have formed an active Truce alliance!`, "succ");
        } else {
            p.pendingTruce = targetPlayer;
            log(`📜 ${user} sent a diplomatic treaty proposal to ${targetPlayer}. (!truce ${user} to accept)`);
        }
    }

    else if (cmd === "breaktruce") {
        const targetPlayer = args[0];
        if(gameState.truces[`${user}:${targetPlayer}`] || gameState.truces[`${targetPlayer}:${user}`]) {
            delete gameState.truces[`${user}:${targetPlayer}`]; delete gameState.truces[`${targetPlayer}:${user}`];
            log(`💔 WAR DECLARATION: ${user} shattered the peace treaty with ${targetPlayer}!`, "war");
        }
    }

    else if (cmd === "attack") {
        executeAttack(user, args[0]?.toUpperCase(), args[1]?.toUpperCase());
    }
    else if (cmd === "deploy") {
        const amountInput = args[0];
        const fromCode = args[1]?.toUpperCase();
        const toCode = args[2]?.toUpperCase();

        // 1. Syntax Guard
        if (!amountInput || !fromCode || !toCode) {
            log(`Invalid Syntax. Use: !${cmd} [amount/percent/max] [from] [to] (E.g. !${cmd} 50% CA RU)`, "err");
            return;
        }

        const attTerritory = gameState.data[fromCode];
        const defTerritory = gameState.data[toCode];

        // 2. Comprehensive Domain Guards
        if (!attTerritory || attTerritory.owner !== user) {
            log(`Action origin territory [${fromCode}] owned incorrectly or missing.`, "err");
            return;
        }
        if (!defTerritory) {
            log(`Destination target country code [${toCode}] is invalid.`, "err");
            return;
        }
        if (defTerritory.owner === user) {
            log(`Operation aborted: You cannot launch military campaigns against your own sovereignty!`, "err");
            return;
        }

        // 3. Diplomatic Alliance Guards
        if (defTerritory.owner && typeof checkTruce === "function" && checkTruce(user, defTerritory.owner)) {
            log(`⛔ Order Blocked: You maintain a Truce alliance with ${defTerritory.owner}! Use '!breaktruce ${defTerritory.owner}' first.`, "err");
            return;
        }

        // 4. Base Garrison Troop Validation
        const totalAvailablePool = attTerritory.troops - 2;
        if (totalAvailablePool <= 0) {
            log(`Armies in ${fromCode} are too low (Must leave a minimum of 2 troops behind to anchor the garrison).`, "err");
            return;
        }

        // 5. Run Custom Input Engine Parser
        const attackingArmies = parseDeploymentTroops(amountInput, totalAvailablePool);
        if (attackingArmies <= 0) {
            log(`Invalid force allocation size specified. Check your pool constraints.`, "err");
            return;
        }

        executeDeployBattleCalculation(user, attackingArmies, fromCode, toCode);
    }
}

function parseGeoJSONCoords(geometry) {
    let paths = [];
    const convertRing = (ring) => {
        let d = "";
        ring.forEach((c, i) => {
            const x = (c[0] + 180); const y = (90 - c[1]);
            if (!isNaN(x) && !isNaN(y)) d += (i === 0 ? "M " : "L ") + `${x.toFixed(2)},${y.toFixed(2)} `;
        });
        d += "Z"; return d;
    };
    if (geometry.type === "Polygon") {
        geometry.coordinates.forEach(ring => { paths.push(convertRing(ring)); });
    } else if (geometry.type === "MultiPolygon") {
        geometry.coordinates.forEach(polygon => { polygon.forEach(ring => { paths.push(convertRing(ring)); }); });
    }
    return paths.join(" ");
}

async function initMap() {
    try {
        const svg = document.getElementById("map");
        if (!svg) return;
        svg.innerHTML = ""; 

        const countriesLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
        countriesLayer.setAttribute("id", "countries-layer");
        svg.appendChild(countriesLayer);

        const uiLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
        uiLayer.setAttribute("id", "ui-layer");
        svg.appendChild(uiLayer);

        // Clear local bounding cache before loading paths
        countryBoundsCache = {};

        if (currentTheater === "earth") {
            // --- EARTH SPHERE GENERATION ENGINE ---
            const res = await fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json");
            const geo = await res.json();

            geo.features.forEach(f => {
                const code = f.id || f.properties.ISO_A3;
                if(!code) return;
                buildMapTerritoryPath(code, parseGeoJSONCoords(f.geometry), countriesLayer, uiLayer);
            });
        } else {
            // --- MOON SPHERE GENERATION ENGINE ---
            LUNAR_TERRITORIES.forEach(t => {
                const code = t.id;
                
                // Helper mapping logic to format the flat array into coordinates matching the Earth projection style
                let dString = "";
                t.coords.forEach((pair, idx) => {
                    dString += (idx === 0 ? "M " : "L ") + `${pair[0].toFixed(2)},${pair[1].toFixed(2)} `;
                });
                dString += "Z";

                buildMapTerritoryPath(code, dString, countriesLayer, uiLayer);
            });
        }
        
        // Secondary safety execution loops to refresh visualization states
        setTimeout(() => { 
            updateMapColors(); 
            updateLeaderboard(); 
            if(typeof launchAISimulatorLoop === "function") launchAISimulatorLoop();
        }, 400);

        log(`🗺️ Tactical Map Reset: ${currentTheater.toUpperCase()} grid completely operational.`);
    } catch(err) { 
        log("Critical Map Initialization Failure: " + err.message, "err"); 
    }
}

/**
 * Shared Builder Engine to map individual path assets onto the primary interactive SVG layer
 */
function buildMapTerritoryPath(code, pathData, parentLayer, uiLayerRef) {
    if(!gameState.data[code]) {
        gameState.data[code] = { 
            owner: null, troops: 0, 
            buildings: { mine: 0, school: 0, city: 0, base: 0 } 
        };
    }
    
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("id", code);
    path.setAttribute("class", "country");
    path.setAttribute("d", pathData);
    
    path.addEventListener("mouseenter", () => {
        if(gameState.data[code]) {
            updateFloatingStatsPanel(code, gameState.data[code]);
        }
    });
    
    const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
    path.appendChild(title);
    parentLayer.appendChild(path); 

    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("class", "owner-label");
    text.setAttribute("id", `lbl-${code}`);
    text.style.display = "none";
    uiLayerRef.appendChild(text);

    // Read vector layout calculations and cache dimensions
    try {
        const box = path.getBBox();
        if(box.width > 0.01 && box.height > 0.01) {
            text.setAttribute("x", box.x + box.width / 2);
            text.setAttribute("y", box.y + box.height / 2);
            countryBoundsCache[code] = { x: box.x, y: box.y, width: box.width, height: box.height };
        }
    } catch(e) {}
}
ComfyJS.onCommand = (user, command, message) => {
    processCommand(user, command, message.split(" ").filter(x => x.trim() !== ""));
};
ComfyJS.Init("Jaedraze");
initMap();
