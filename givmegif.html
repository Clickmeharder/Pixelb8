<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparent Emote GIF Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        input, button { margin-top: 10px; cursor: pointer; }
        #status { margin-top: 10px; color: #00ffcc; }
        #result { margin-top: 20px; border: 2px dashed #444; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Twitch Emote GIF Creator</h2>
    <p>Upload PNGs -> Get 112x112 Transparent GIF</p>
    
    <label>Select Frames (Hold Ctrl/Cmd to select multiple):</label><br>
    <input type="file" id="fileInput" accept="image/png" multiple><br><br>
    
    <label>Frame Delay (ms):</label>
    <input type="number" id="delay" value="100" style="width: 60px;">
    
    <button onclick="generateGif()">Generate GIF</button>
    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
async function generateGif() {
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const delay = parseInt(document.getElementById('delay').value);

    if (fileInput.files.length === 0) {
        alert("Please select some PNG files first!");
        return;
    }

    status.innerText = "Downloading worker & processing...";
    resultDiv.innerHTML = "";

    try {
        // 1. Fetch the worker script and turn it into a local Blob URL 
        // This bypasses the SecurityError/CORS issue
        const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
        const workerScriptText = await response.text();
        const workerBlob = new Blob([workerScriptText], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(workerBlob);

        // 2. Initialize GIF.js with the local blob URL
        const gif = new GIF({
            workers: 2,
            quality: 10,
            width: 112,
            height: 112,
            transparent: 'rgba(0,0,0,0)',
            workerScript: workerUrl
        });

        // 3. Setup Canvas with the 'willReadFrequently' optimization
        const canvas = document.createElement('canvas');
        canvas.width = 112;
        canvas.height = 112;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        for (let file of fileInput.files) {
            const img = await loadImage(file);
            ctx.clearRect(0, 0, 112, 112);
            ctx.drawImage(img, 0, 0, 112, 112);
            gif.addFrame(ctx, {copy: true, delay: delay});
        }

        gif.on('finished', function(blob) {
            status.innerText = "Done!";
            const url = URL.createObjectURL(blob);
            const img = document.createElement('img');
            img.src = url;
            img.style.border = "1px solid #555";
            
            const link = document.createElement('a');
            link.href = url;
            link.download = "emote_112x112.gif";
            link.innerText = "Download Emote";
            link.style.display = "block";
            link.style.marginTop = "10px";
            link.style.color = "#00ffcc";

            resultDiv.appendChild(img);
            resultDiv.appendChild(link);
            
            // Clean up the temporary worker URL
            URL.revokeObjectURL(workerUrl);
        });

        gif.render();

    } catch (err) {
        console.error(err);
        status.innerText = "Error: " + err.message;
    }
}
//uhh
function loadImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}
</script>

</body>
</html>
