<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Emote GIF Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #181818; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-width: 800px; width: 100%; border: 1px solid #333; }
        h2 { color: #00ffcc; margin-top: 0; }
        
        /* Timeline Styles */
        #timeline { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; min-height: 120px; padding: 15px; background: #111; border-radius: 8px; border: 1px inset #222; }
        .frame-card { background: #252525; padding: 5px; border-radius: 4px; display: flex; flex-direction: column; align-items: center; border: 1px solid #444; }
        .frame-card img { width: 80px; height: 80px; object-fit: contain; background-image: linear-gradient(45deg, #222 25%, transparent 25%), linear-gradient(-45deg, #222 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #222 75%), linear-gradient(-45deg, transparent 75%, #222 75%); background-size: 10px 10px; background-position: 0 0, 0 5px, 5px -5px, -5px 0px; }
        .controls { display: flex; gap: 2px; margin-top: 5px; }
        .controls button { padding: 2px 5px; font-size: 10px; background: #333; color: white; border: 1px solid #555; border-radius: 2px; }
        .controls button:hover { background: #444; }
        .btn-del { color: #ff4444 !important; }

        input, button { margin-top: 10px; cursor: pointer; }
        .main-btn { background: #00ffcc; color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; font-size: 1rem; }
        .main-btn:hover { background: #00ccaa; transform: translateY(-1px); }
        #status { margin-top: 15px; font-weight: bold; }
        #result { margin-top: 20px; text-align: center; }
        #result img { border: 3px solid #00ffcc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Twitch Emote Lab</h2>
    <p>1. Upload Frames -> 2. Arrange/Duplicate -> 3. Export</p>
    
    <input type="file" id="fileInput" accept="image/png" multiple>
    
    <div id="timeline">
        <p style="color: #666; width: 100%; text-align: center;">Frames will appear here...</p>
    </div>

    <div style="display: flex; gap: 20px; align-items: center;">
        <div>
            <label>Speed (ms):</label>
            <input type="number" id="delay" value="80" style="width: 60px; background: #222; color: #fff; border: 1px solid #444; padding: 5px;">
        </div>
        <button class="main-btn" onclick="generateGif()">GENERATE 112x112 GIF</button>
    </div>

    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
    let frameList = []; // Array to store our image objects

    const fileInput = document.getElementById('fileInput');
    const timeline = document.getElementById('timeline');

    fileInput.addEventListener('change', async (e) => {
        for (let file of e.target.files) {
            const img = await loadImage(file);
            frameList.push(img);
        }
        renderTimeline();
    });

    function renderTimeline() {
        timeline.innerHTML = '';
        if (frameList.length === 0) {
            timeline.innerHTML = '<p style="color: #666; width: 100%; text-align: center;">Frames will appear here...</p>';
            return;
        }

        frameList.forEach((img, index) => {
            const card = document.createElement('div');
            card.className = 'frame-card';
            
            const displayImg = new Image();
            displayImg.src = img.src;
            
            const ctrl = document.createElement('div');
            ctrl.className = 'controls';
            
            ctrl.innerHTML = `
                <button onclick="move(${index}, -1)">◀</button>
                <button onclick="duplicate(${index})">＋</button>
                <button onclick="move(${index}, 1)">▶</button>
                <button class="btn-del" onclick="remove(${index})">X</button>
            `;

            card.appendChild(displayImg);
            card.appendChild(ctrl);
            timeline.appendChild(card);
        });
    }

    function move(index, direction) {
        const newIndex = index + direction;
        if (newIndex >= 0 && newIndex < frameList.length) {
            const temp = frameList[index];
            frameList[index] = frameList[newIndex];
            frameList[newIndex] = temp;
            renderTimeline();
        }
    }

    function duplicate(index) {
        const copy = new Image();
        copy.src = frameList[index].src;
        frameList.splice(index + 1, 0, copy);
        renderTimeline();
    }

    function remove(index) {
        frameList.splice(index, 1);
        renderTimeline();
    }

    async function generateGif() {
        const status = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        const delay = parseInt(document.getElementById('delay').value);

        if (frameList.length === 0) {
            alert("Add some frames first!");
            return;
        }

        status.innerText = "⚡ Powering up AI magic (Processing)...";
        resultDiv.innerHTML = "";

        try {
            const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
            const workerScriptText = await response.text();
            const workerBlob = new Blob([workerScriptText], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(workerBlob);

            const gif = new GIF({
                workers: 4,
                quality: 1, // High quality
                width: 112,
                height: 112,
                transparent: 'rgba(0,0,0,0)',
                workerScript: workerUrl
            });

            const canvas = document.createElement('canvas');
            canvas.width = 112;
            canvas.height = 112;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            for (let img of frameList) {
                ctx.clearRect(0, 0, 112, 112);
                ctx.drawImage(img, 0, 0, 112, 112);
                gif.addFrame(ctx, {copy: true, delay: delay});
            }

            gif.on('finished', function(blob) {
                status.innerText = "✅ EMOTE READY";
                const url = URL.createObjectURL(blob);
                const finalImg = document.createElement('img');
                finalImg.src = url;
                
                const link = document.createElement('a');
                link.href = url;
                link.download = "twitch_emote_112.gif";
                link.innerHTML = "<br>🔥 DOWNLOAD YOUR DOPE GIF 🔥";
                link.style.display = "block";
                link.style.color = "#00ffcc";
                link.style.marginTop = "10px";

                resultDiv.appendChild(finalImg);
                resultDiv.appendChild(link);
                URL.revokeObjectURL(workerUrl);
            });

            gif.render();
        } catch (err) {
            status.innerText = "❌ Error: " + err.message;
        }
    }

    function loadImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
</script>

</body>
</html>
