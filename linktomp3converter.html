<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video → MP3 (GitHub Pages Edition)</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 40px;
}
input, button {
    width: 80%;
    padding: 12px;
    margin: 10px;
    border-radius: 4px;
    border: 1px solid #333;
}
input { background: #222; color: #fff; }
button { background: #ff4757; color: white; font-weight: bold; cursor: pointer; border: none; }
button:hover { background: #ff6b81; }
#status { margin-top: 20px; color: lime; font-family: monospace; white-space: pre-wrap; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<body>

<h1>🎧 Video → MP3 Converter (Static Host Fix)</h1>
<input id="url" placeholder="Direct video URL" />
<br>
<button id="btn">Convert to MP3</button>
<pre id="status">Idle</pre>

<script>
// Grab the global instances exposed by the v0.11 script tag
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: true });

const btn = document.getElementById("btn");
const status = document.getElementById("status");

// Handle internal logs
ffmpeg.setLogger(({ type, message }) => {
    console.log(message);
    if (message.includes('Duration')) {
        status.innerText = `Converting...\n${message}`;
    }
});

async function convert() {
    try {
        const url = document.getElementById("url").value.trim();
        if (!url) return alert("Please enter a video URL");

        btn.disabled = true;
        
        if (!ffmpeg.isLoaded()) {
            status.innerText = "Loading single-threaded FFmpeg core...";
            await ffmpeg.load();
        }

        status.innerText = "Downloading video bytes...";
        // Note: The source video URL must still allow CORS requests!
        const file = await fetchFile(url);

        status.innerText = "Writing to sandbox memory...";
        ffmpeg.FS('writeFile', 'input.mp4', file);

        status.innerText = "Extracting audio profile...";
        await ffmpeg.run('-i', 'input.mp4', '-vn', '-acodec', 'libmp3lame', '-b:a', '192k', 'output.mp3');

        status.innerText = "Packaging audio file download...";
        const data = ffmpeg.FS('readFile', 'output.mp3');

        const blob = new Blob([data.buffer], { type: 'audio/mp3' });
        const downloadUrl = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = downloadUrl;
        a.download = `audio_${Date.now()}.mp3`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        status.innerText = "Done! Check your downloads window.";
    } catch (err) {
        console.error(err);
        status.innerText = `Error: ${err.message}\nMake sure your video host allows CORS requests.`;
    } finally {
        btn.disabled = false;
    }
}

btn.addEventListener("click", convert);
</script>

</body>
</html>
