<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OBS Audio Asset Pipeline</title>
<style>
    body {
        font-family: 'Courier New', Courier, monospace;
        background: rgba(0, 0, 0, 0.85); /* Slightly transparent for OBS overlays */
        color: #00ffcc;
        text-align: center;
        padding: 30px;
        margin: 0;
        overflow: hidden;
    }
    .wrapper {
        border: 2px solid #00ffcc;
        background: #111;
        padding: 20px;
        border-radius: 8px;
        display: inline-block;
        min-width: 320px;
        box-shadow: 0 0 15px rgba(0, 255, 220, 0.3);
    }
    h1 {
        font-size: 18px;
        margin-top: 0;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    .status-box {
        background: #000;
        border: 1px solid #333;
        padding: 10px;
        margin: 15px 0;
        font-size: 12px;
        color: #fff;
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    button {
        width: 100%;
        padding: 12px;
        margin: 5px 0;
        font-weight: bold;
        background: #222;
        border: 1px solid #00ffcc;
        color: #00ffcc;
        cursor: pointer;
        text-transform: uppercase;
    }
    button:hover {
        background: #00ffcc;
        color: #000;
    }
    button:disabled {
        border-color: #444;
        color: #444;
        cursor: not-allowed;
        background: #111;
    }
    #stopBtn {
        border-color: #ff4757;
        color: #ff4757;
    }
    #stopBtn:hover:not(:disabled) {
        background: #ff4757;
        color: #000;
    }
</style>
</head>
<body>

<div class="wrapper">
    <h1>🎙️ OBS Audio Capture</h1>
    <div class="status-box" id="status">INITIALIZING SYSTEM... Click Link Stream to hook audio pipeline.</div>
    
    <button id="startBtn">🔴 Start Recording</button>
    <button id="stopBtn" disabled>⏹️ Stop & Save Track</button>
</div>

<script>
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const status = document.getElementById('status');

let mediaRecorder;
let audioChunks = [];

// Hook into OBS browser source audio layer via getUserMedia
async function initAudioPipeline() {
    try {
        status.innerText = "REQUESTING OBS AUDIO ROUTE...";
        
        // Capture the audio channel being piped directly from OBS
        const stream = await navigator.mediaDevices.getUserMedia({ 
            audio: {
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false,
                channelCount: 2 // Keep it pristine stereo
            }, 
            video: false 
        });

        // Use the native browser container layout container formats
        // audio/webm is natively supported across all modern web environments
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

        mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
                audioChunks.push(event.data);
            }
        };

        mediaRecorder.onstop = () => {
            status.innerText = "COMPILING CAPTURED FILE LAYER...";
            
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            audioChunks = []; // Clean memory cache frame
            
            const downloadUrl = URL.createObjectURL(audioBlob);
            
            // Generate standard structural force download link context
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = `obs_capture_${Date.now()}.webm`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            status.innerText = "SUCCESS! TRACK EXPORTED TO DOWNLOADS.";
        };

        status.innerText = "SYSTEM READY. PIPELINE LINKED LIVE.";
        startBtn.disabled = false;

    } catch (err) {
        console.error(err);
        status.innerText = `PIPELINE ERROR: Ensure OBS has full permissions enabled.`;
    }
}

startBtn.addEventListener('click', () => {
    if (!mediaRecorder) {
        initAudioPipeline().then(() => {
            startRecording();
        });
    } else {
        startRecording();
    }
});

function startRecording() {
    audioChunks = [];
    mediaRecorder.start(250); // Capture chunk intervals every 250ms
    status.innerText = "🔴 RECORDING LIVE FROM OBS PIPELINE...";
    startBtn.disabled = true;
    stopBtn.disabled = false;
}

stopBtn.addEventListener('click', () => {
    mediaRecorder.stop();
    startBtn.disabled = false;
    stopBtn.disabled = true;
});

// Auto-init fallback try when loaded inside OBS environment panel directly
window.addEventListener('DOMContentLoaded', () => {
    status.innerText = "AWAITING USER CORE ACTIVATION SIGNAL...";
});
</script>

</body>
</html>
