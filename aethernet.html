<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether Net: Infinite World</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-blue: #00f0ff;
            --neon-magenta: #ff00ff;
            --dark-bg: #0c0c14;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark-bg);
            font-family: 'Courier New', monospace;
            color: #fff; overflow: hidden;
            display: flex; flex-direction: column;
        }

        #hud {
            background: rgba(12, 12, 20, 0.95);
            border-bottom: 2px solid var(--neon-blue);
            padding: 12px; font-size: 0.8rem; z-index: 2000;
            display: flex; flex-direction: column; gap: 4px;
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.15);
        }

        .hud-row { display: flex; justify-content: space-between; }
        .accent { color: var(--neon-blue); font-weight: bold; }
        .score { color: var(--neon-green); font-weight: bold; }

        #map { 
            flex: 1; 
            width: 100%; 
            z-index: 1; 
            background-color: #111;
        }

        #controls {
            background: rgba(12, 12, 20, 0.95);
            border-top: 2px solid var(--neon-blue);
            padding: 12px; z-index: 2000;
            display: flex; flex-direction: column; gap: 8px;
        }

        .btn {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px; font-family: inherit; font-weight: bold;
            cursor: pointer; text-transform: uppercase; width: 100%;
        }
        .btn:active:not(:disabled) {
            background: var(--neon-blue); color: var(--dark-bg);
        }
        .btn:disabled { color: #444; border-color: #444; background: none; }

        .sim-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 4px; width: 180px; margin: 0 auto;
        }
        .sim-grid .btn { padding: 5px; font-size: 0.75rem; }

        #terminal-log {
            font-size: 0.7rem; color: #888; background: #000;
            padding: 6px; height: 40px; overflow-y: auto;
            border: 1px solid #222;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-row">
            <span>POS: <span id="gps-display" class="accent">Initializing...</span></span>
            <span>DATA FRAGMENTS: <span id="score-display" class="score">0</span></span>
        </div>
        <div class="hud-row">
            <span>STATUS: <span id="status-display">Scanning Sector...</span></span>
            <span>ZONE: <span id="zone-display" class="accent">Infinite Grid Engaged</span></span>
        </div>
    </div>

    <div id="map"></div>

    <div id="controls">
        <button id="action-btn" class="btn" disabled>Target Out Of Range</button>
        <div id="terminal-log">System boot complete. Deploying infinite sensory map...</div>
        
        <div class="sim-grid">
            <div></div><button class="btn" onclick="moveSim(0.00020, 0)">▲ N</button><div></div>
            <button class="btn" onclick="moveSim(0, -0.00025)">◀ W</button>
            <span style="font-size:0.6rem; text-align:center; align-self:center; color:#555;">D-PAD</span>
            <button class="btn" onclick="moveSim(0, 0.00025)">E ▶</button>
            <div></div><button class="btn" onclick="moveSim(-0.00020, 0)">▼ S</button><div></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const CONFIG = {
            interactionRadiusMeters: 35,
            generationTriggerDistanceMeters: 150 // Distance you can walk before a fresh wave spawns
        };

        let state = {
            playerLat: 53.5461, 
            playerLon: -113.4938,
            lastGenLat: 0,
            lastGenLon: 0,
            score: 0,
            isSimulating: true,
            entities: [], 
            nearestActiveTarget: null
        };

        // --- INITIALIZE MAP CONTAINER ---
        // FIX: Lowered minZoom to 12 so you can pinch/scroll to zoom out significantly further
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            minZoom: 12, 
            maxZoom: 19
        }).setView([state.playerLat, state.playerLon], 17);

        const baseTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        const safetyProximityRing = L.circle([state.playerLat, state.playerLon], {
            radius: CONFIG.interactionRadiusMeters,
            color: varStyle('--neon-green'),
            weight: 2,
            dashArray: '4, 4',
            fillColor: varStyle('--neon-green'),
            fillOpacity: 0.05
        }).addTo(map);

        const playerMarker = L.circleMarker([state.playerLat, state.playerLon], {
            radius: 9, color: '#ffffff', fillColor: varStyle('--neon-blue'), fillOpacity: 1, weight: 3
        }).addTo(map);

        function varStyle(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function sysLog(txt) {
            const logBox = document.getElementById('terminal-log');
            logBox.innerHTML += `<div>&gt; ${txt}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- DYNAMIC INFRASTRUCTURE GENERATION ---
        // Generates nodes procedurally spread out right in front of your path trajectory
        function appendProceduralNodes(originLat, originLon) {
            sysLog("Instantiating nearby network nodes...");
            
            // Random distribution offsets around your new localized location coordinates
            for (let i = 0; i < 5; i++) {
                const latOffset = (Math.random() - 0.5) * 0.0015;
                const lonOffset = (Math.random() - 0.5) * 0.0015;
                const isCentre = Math.random() > 0.75; // 25% chance to create an Aether Centre hub

                const targetLat = originLat + latOffset;
                const targetLon = originLon + lonOffset;

                let marker;
                if (isCentre) {
                    marker = L.circleMarker([targetLat, targetLon], {
                        radius: 14, color: varStyle('--neon-magenta'), fillColor: varStyle('--neon-magenta'), fillOpacity: 0.3, weight: 3
                    }).addTo(map).bindPopup(`<b>Aether Centre [Sector Hub]</b>`);
                } else {
                    marker = L.circleMarker([targetLat, targetLon], {
                        radius: 6, color: varStyle('--neon-blue'), fillColor: '#ffffff', fillOpacity: 0.6, weight: 2
                    }).addTo(map);
                }

                state.entities.push({
                    id: 'ent_' + Date.now() + '_' + i,
                    type: isCentre ? 'centre' : 'node',
                    name: isCentre ? `Aether Centre Substation` : `Data Cache [Secure Point]`,
                    lat: targetLat, lon: targetLon, active: true, markerObj: marker
                });
            }

            // Save our current baseline location 
            state.lastGenLat = originLat;
            state.lastGenLon = originLon;
        }

        // --- ENGINE TICK ---
        function syncGameplayState() {
            const currentPosition = [state.playerLat, state.playerLon];
            playerMarker.setLatLng(currentPosition);
            safetyProximityRing.setLatLng(currentPosition);
            
            // Keep view anchored tracking user position
            map.panTo(currentPosition);

            document.getElementById('gps-display').textContent = `${state.playerLat.toFixed(5)}, ${state.playerLon.toFixed(5)}`;

            // CRITICAL CHECK: Did the player walk past the active grid boundary threshold?
            const distanceFromLastGen = map.distance(currentPosition, [state.lastGenLat, state.lastGenLon]);
            if (distanceFromLastGen > CONFIG.generationTriggerDistanceMeters) {
                sysLog("Entering unexplored airspace. Syncing database map overlays...");
                appendProceduralNodes(state.playerLat, state.playerLon);
            }

            let closestDist = Infinity;
            let targetRef = null;

            state.entities.forEach(ent => {
                if (!ent.active) return;
                const distance = map.distance(currentPosition, [ent.lat, ent.lon]);
                if (distance < closestDist) {
                    closestDist = distance;
                    targetRef = ent;
                }
            });

            const actionBtn = document.getElementById('action-btn');
            state.nearestActiveTarget = targetRef;

            if (targetRef && closestDist <= CONFIG.interactionRadiusMeters) {
                document.getElementById('status-display').innerHTML = `Connected to <span style="color:var(--neon-green)">${targetRef.name}</span>`;
                actionBtn.disabled = false;
                actionBtn.textContent = targetRef.type === 'centre' ? "ENTER AETHER CENTRE" : "HARVEST DATA SPLICE";
                actionBtn.style.borderColor = "var(--neon-green)";
                actionBtn.style.color = "var(--neon-green)";
                actionBtn.style.background = "rgba(0, 255, 102, 0.15)";
            } else {
                document.getElementById('status-display').textContent = targetRef ? `Tracking: ${targetRef.name} (${Math.round(closestDist)}m)` : "Scanning local relays...";
                actionBtn.disabled = true;
                actionBtn.textContent = "Target Out Of Range";
                actionBtn.style.borderColor = "var(--neon-blue)";
                actionBtn.style.color = "var(--neon-blue)";
                actionBtn.style.background = "rgba(0, 240, 255, 0.05)";
            }
        }

        document.getElementById('action-btn').addEventListener('click', () => {
            const target = state.nearestActiveTarget;
            if (!target) return;

            if (target.type === 'node') {
                target.active = false;
                map.removeLayer(target.markerObj);
                state.score += 100;
                document.getElementById('score-display').textContent = state.score;
                sysLog(`Harvested ${target.name}.`);
            } else if (target.type === 'centre') {
                state.score += 500;
                document.getElementById('score-display').textContent = state.score;
                sysLog(`Synced with database at ${target.name}.`);
                alert(`Welcome to ${target.name}\nMatrix terminal access granted!`);
            }
            syncGameplayState();
        });

        // --- NAVIGATION HANDLERS ---
        function moveSim(dLat, dLon) {
            state.isSimulating = true;
            document.getElementById('zone-display').textContent = "SANDBOX DEVIATION";
            state.playerLat += dLat;
            state.playerLon += dLon;
            syncGameplayState();
        }

        function runLiveHardwareTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    if (!state.isSimulating || state.playerLat === 53.5461) {
                        state.isSimulating = false;
                        document.getElementById('zone-display').textContent = "LIVE GPS ONLINE";
                        state.playerLat = pos.coords.latitude;
                        state.playerLon = pos.coords.longitude;
                        
                        if(state.lastGenLat === 0) {
                            appendProceduralNodes(state.playerLat, state.playerLon);
                        }
                        syncGameplayState();
                    }
                }, (err) => {
                    sysLog(`GPS initialization delay: ${err.message}. Using Sandbox simulation.`);
                }, { enableHighAccuracy: true });
            }
        }

        // Boot Pipeline
        appendProceduralNodes(state.playerLat, state.playerLon);
        syncGameplayState();
        runLiveHardwareTracking();
    </script>
</body>
</html>
