<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether Net: Open World</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-blue: #00f0ff;
            --neon-magenta: #ff00ff;
            --dark-bg: #09090e;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark-bg);
            font-family: 'Courier New', monospace;
            color: #fff; overflow: hidden;
            display: flex; flex-direction: column;
        }

        #hud {
            background: rgba(9, 9, 14, 0.9);
            border-bottom: 2px solid var(--neon-blue);
            padding: 12px; font-size: 0.8rem; z-index: 2000;
            display: flex; flex-direction: column; gap: 4px;
        }

        .hud-row { display: flex; justify-content: space-between; }
        .accent { color: var(--neon-blue); font-weight: bold; }
        .score { color: var(--neon-green); font-weight: bold; }

        /* Map Container filling viewport */
        #map { flex: 1; width: 100%; z-index: 1; }

        /* Modified Cyberpunk shader filter optimized for CartoDB Dark Matter */
        .cyberpunk-tiles {
            filter: hue-rotate(140deg) saturate(180%) brightness(120%) contrast(120%);
        }

        #controls {
            background: rgba(9, 9, 14, 0.9);
            border-top: 2px solid var(--neon-blue);
            padding: 12px; z-index: 2000;
            display: flex; flex-direction: column; gap: 8px;
        }

        .btn {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px; font-family: inherit; font-weight: bold;
            cursor: pointer; text-transform: uppercase; width: 100%;
        }
        .btn:active:not(:disabled) {
            background: var(--neon-blue); color: var(--dark-bg);
        }
        .btn:disabled { color: #444; border-color: #444; background: none; }

        .sim-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 4px; width: 180px; margin: 0 auto;
        }
        .sim-grid .btn { padding: 5px; font-size: 0.75rem; }

        #terminal-log {
            font-size: 0.7rem; color: #888; background: #000;
            padding: 6px; height: 40px; overflow-y: auto;
            border: 1px solid #222;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-row">
            <span>POS: <span id="gps-display" class="accent">Initializing...</span></span>
            <span>DATA FRAGMENTS: <span id="score-display" class="score">0</span></span>
        </div>
        <div class="hud-row">
            <span>STATUS: <span id="status-display">Scanning Sector...</span></span>
            <span>ZONE: <span id="zone-display" class="accent">Street Scan Active</span></span>
        </div>
    </div>

    <div id="map"></div>

    <div id="controls">
        <button id="action-btn" class="btn" disabled>Target Out Of Range</button>
        <div id="terminal-log">System boot complete. Connecting to satellites...</div>
        
        <div class="sim-grid">
            <div></div><button class="btn" onclick="moveSim(0.00015, 0)">▲ N</button><div></div>
            <button class="btn" onclick="moveSim(0, -0.00015)">◀ W</button>
            <span style="font-size:0.6rem; text-align:center; align-self:center; color:#555;">D-PAD</span>
            <button class="btn" onclick="moveSim(0, 0.00015)">E ▶</button>
            <div></div><button class="btn" onclick="moveSim(-0.00015, 0)">▼ S</button><div></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- CONFIGURATION & STATE ---
        const CONFIG = {
            interactionRadiusMeters: 30, // Proximity threshold for hacking/interacting
            centerSpawns: [
                { latOffset: 0.0008, lonOffset: 0.0005, name: "Aether Centre: Prime Core" },
                { latOffset: -0.0009, lonOffset: -0.0007, name: "Aether Centre: Nexus Grid" }
            ],
            nodeOffsets: [
                { latOffset: 0.0003, lonOffset: -0.0004, name: "Data Cache Alpha" },
                { latOffset: -0.0004, lonOffset: 0.0005, name: "Data Cache Beta" },
                { latOffset: 0.0005, lonOffset: 0.0006, name: "Data Cache Gamma" }
            ]
        };

        let state = {
            playerLat: 53.5461, // Default fallback coordinates
            playerLon: -113.4938,
            score: 0,
            isSimulating: true,
            entities: [], // Holds nodes and processing data
            nearestActiveTarget: null
        };

        // --- INITIALIZE MAP CONTAINER ---
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([state.playerLat, state.playerLon], 17);

        // CHANGED: Swapped out base tiles to CartoDB Dark Matter.
        // This ensures paths, buildings, and streets are beautifully visible on dark UI grids.
        const baseTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Turn standard map colors into high-contrast cyberpunk neon roads
        baseTiles.getContainer().classList.add('cyberpunk-tiles');

        // Draw an interaction boundary around the player marker
        const safetyProximityRing = L.circle([state.playerLat, state.playerLon], {
            radius: CONFIG.interactionRadiusMeters,
            color: '#00ff66',
            weight: 1,
            fillColor: '#00ff66',
            fillOpacity: 0.08
        }).addTo(map);

        // Custom Player Avatar Marker element
        const playerMarker = L.circleMarker([state.playerLat, state.playerLon], {
            radius: 8, color: '#ffffff', fillColor: '#00f0ff', fillOpacity: 1, weight: 3
        }).addTo(map);

        // --- MATH / LOGS ---
        function sysLog(txt) {
            const logBox = document.getElementById('terminal-log');
            logBox.innerHTML += `<div>&gt; ${txt}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- ENTITY GRID GENERATION ---
        function seedWorldSector(originLat, originLon) {
            state.entities.forEach(e => map.removeLayer(e.markerObj));
            state.entities = [];

            // 1. Build Static Mega Centres (Gyms)
            CONFIG.centerSpawns.forEach((c, idx) => {
                const targetLat = originLat + c.latOffset;
                const targetLon = originLon + c.lonOffset;
                
                const marker = L.circleMarker([targetLat, targetLon], {
                    radius: 14, color: '#ff00ff', fillColor: 'rgba(255,0,255,0.2)', fillOpacity: 0.5, weight: 2
                }).addTo(map);
                
                marker.bindPopup(`<b>${c.name}</b><br>Secure sector hub.`);

                state.entities.push({
                    id: 'centre_' + idx, type: 'centre', name: c.name,
                    lat: targetLat, lon: targetLon, active: true, markerObj: marker
                });
            });

            // 2. Build Minor Cache Nodes (Items)
            CONFIG.nodeOffsets.forEach((n, idx) => {
                const targetLat = originLat + n.latOffset;
                const targetLon = originLon + n.lonOffset;

                const marker = L.circleMarker([targetLat, targetLon], {
                    radius: 6, color: '#00f0ff', fillColor: '#00f0ff', fillOpacity: 0.3, weight: 2
                }).addTo(map);

                state.entities.push({
                    id: 'node_' + idx, type: 'node', name: n.name,
                    lat: targetLat, lon: targetLon, active: true, markerObj: marker
                });
            });

            sysLog("World map populating complete.");
        }

        // --- ENGINE TICK ---
        function syncGameplayState() {
            const currentPosition = [state.playerLat, state.playerLon];
            playerMarker.setLatLng(currentPosition);
            safetyProximityRing.setLatLng(currentPosition);
            map.panTo(currentPosition);

            document.getElementById('gps-display').textContent = `${state.playerLat.toFixed(5)}, ${state.playerLon.toFixed(5)}`;

            let closestDist = Infinity;
            let targetRef = null;

            state.entities.forEach(ent => {
                if (!ent.active) return;
                const distance = map.distance(currentPosition, [ent.lat, ent.lon]);
                if (distance < closestDist) {
                    closestDist = distance;
                    targetRef = ent;
                }
            });

            const actionBtn = document.getElementById('action-btn');
            state.nearestActiveTarget = targetRef;

            if (targetRef && closestDist <= CONFIG.interactionRadiusMeters) {
                document.getElementById('status-display').innerHTML = `Connected to <span style="color:var(--neon-green)">${targetRef.name}</span>`;
                actionBtn.disabled = false;
                actionBtn.textContent = targetRef.type === 'centre' ? "ENTER AETHER CENTRE" : "HARVEST DATA SPLICE";
                actionBtn.style.borderColor = "var(--neon-green)";
                actionBtn.style.color = "var(--neon-green)";
            } else {
                document.getElementById('status-display').textContent = targetRef ? `Tracking: ${targetRef.name} (${Math.round(closestDist)}m out)` : "Scanning deep framework...";
                actionBtn.disabled = true;
                actionBtn.textContent = "Target Out Of Range";
                actionBtn.style.borderColor = "var(--neon-blue)";
                actionBtn.style.color = "var(--neon-blue)";
            }
        }

        document.getElementById('action-btn').addEventListener('click', () => {
            const target = state.nearestActiveTarget;
            if (!target) return;

            if (target.type === 'node') {
                target.active = false;
                map.removeLayer(target.markerObj);
                state.score += 100;
                document.getElementById('score-display').textContent = state.score;
                sysLog(`Downloaded data packets from ${target.name}.`);
            } else if (target.type === 'centre') {
                state.score += 500;
                document.getElementById('score-display').textContent = state.score;
                sysLog(`Synchronized terminal nodes at ${target.name}. Core secure!`);
                alert(`--- Welcome to ${target.name} ---\nYou have accessed the central base server matrix. +500 network credits established.`);
            }
            syncGameplayState();
        });

        // --- CONTROL TOGGLES (MANUAL MOVEMENT SANBOX & HARDWARE GEO) ---
        function moveSim(dLat, dLon) {
            state.isSimulating = true;
            document.getElementById('zone-display').textContent = "SIMULATION CONTROL";
            state.playerLat += dLat;
            state.playerLon += dLon;
            syncGameplayState();
        }

        function runLiveHardwareTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    // Only override position dynamically if player isn't actively utilizing sandbox overrides
                    if (!state.isSimulating || state.playerLat === 53.5461) {
                        state.isSimulating = false;
                        document.getElementById('zone-display').textContent = "LIVE GPS SYNCED";
                        state.playerLat = pos.coords.latitude;
                        state.playerLon = pos.coords.longitude;
                        
                        if(state.entities.length === 0) {
                            seedWorldSector(state.playerLat, state.playerLon);
                        }
                        syncGameplayState();
                    }
                }, (err) => {
                    sysLog(`Hardware tracking offline: ${err.message}. Sandbox running.`);
                }, { enableHighAccuracy: true });
            }
        }

        // Boot Executions
        seedWorldSector(state.playerLat, state.playerLon);
        syncGameplayState();
        runLiveHardwareTracking();
    </script>
</body>
</html>
