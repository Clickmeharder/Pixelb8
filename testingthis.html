<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelbot OMEGA | Persistent Analyst</title>
    <style>
        :root { --p8-pink: #f472b6; --p8-blue: #3b82f6; --p8-bg: #09090b; }
        
        * { box-sizing: border-box; }
        body { 
            background: var(--p8-bg); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        /* Side Panel */
        #side-panel { 
            width: 240px; background: #000; border-right: 1px solid #27272a; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 15px; 
            z-index: 10;
        }
        #bot-canvas { width: 160px; height: 160px; background: #111; border-radius: 20px; border: 2px solid var(--p8-pink); }
        .bot-label { color: var(--p8-pink); font-weight: bold; font-size: 1.1rem; letter-spacing: 2px; }

        /* Main Core */
        #main-core { 
            flex: 1; display: flex; flex-direction: column; 
            background: radial-gradient(circle at top right, #111, #000);
            position: relative;
        }
        
        #stage { 
            flex: 1; overflow-y: auto; padding: 30px; 
            display: flex; flex-direction: column; gap: 20px;
            padding-bottom: 120px; /* Space for fixed input */
        }

        /* Input Zone - FIXED TO BOTTOM TO PREVENT GHOSTING */
        .input-container {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            border-top: 1px solid #27272a; padding: 20px;
            z-index: 999; /* Highest Priority */
        }

        .controls { 
            display: flex; gap: 12px; max-width: 900px; margin: 0 auto; width: 100%; 
            pointer-events: auto; /* Ensure clicks pass through to children */
        }

        input[type="text"] { 
            flex: 1; background: #111; border: 1px solid #333; color: #fff; 
            padding: 14px 22px; border-radius: 30px; outline: none; font-size: 1rem;
            -webkit-user-select: text; user-select: text; /* ALLOW TYPING */
        }
        input:focus { border-color: var(--p8-pink); box-shadow: 0 0 10px rgba(244,114,182,0.2); }

        button { 
            background: var(--p8-pink); color: #000; border: none; 
            padding: 0 25px; border-radius: 30px; font-weight: 800; cursor: pointer; 
        }
        button:disabled { background: #222; color: #555; cursor: default; }

        /* Bubbles */
        .bubble { max-width: 85%; padding: 15px 20px; border-radius: 20px; line-height: 1.6; animation: slideIn 0.3s ease-out; }
        .ai-bubble { align-self: flex-start; background: #18181b; border: 1px solid #27272a; }
        .user-bubble { align-self: flex-end; background: var(--p8-pink); color: #000; font-weight: 500; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="side-panel">
    <div class="bot-label">PIXELBOT OMEGA</div>
    <canvas id="bot-canvas"></canvas>
    <div id="mood-label" style="font-size: 0.75rem; color: var(--p8-blue)">INITIALIZING...</div>
    <div style="margin-top: auto; width: 100%;">
        <label for="file-upload" style="display:block; text-align:center; padding:10px; border:1px dashed #444; border-radius:10px; font-size:0.7rem; cursor:pointer;">📁 INGEST DATA</label>
        <input type="file" id="file-upload" hidden multiple>
    </div>
</div>

<div id="main-core">
    <div id="stage">
        <div class="bubble ai-bubble">Hardware check complete. Awaiting Neural Link...</div>
    </div>

    <div class="input-container">
        <div class="controls">
            <input type="text" id="user-text" placeholder="Waiting for engine..." disabled>
            <button id="send-btn" disabled>SEND</button>
        </div>
    </div>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const stage = document.getElementById('stage');
    const userText = document.getElementById('user-text');
    const sendBtn = document.getElementById('send-btn');
    const moodLabel = document.getElementById('mood-label');

    // 1. Force focus and prevent "Tab-outs"
    const enableInput = () => {
        userText.disabled = false;
        sendBtn.disabled = false;
        userText.placeholder = "Querying local knowledge...";
        userText.focus();
    };

    // 2. Engine Init
    async function init() {
        try {
            const engine = await webllm.CreateMLCEngine("Llama-3.2-1B-Instruct-q4f32_1-MLC", { 
                initProgressCallback: (p) => {
                    moodLabel.innerText = `SYNCING ${Math.round(p.progress * 100)}%`;
                    if (p.progress === 1) {
                        moodLabel.innerText = "IDLE";
                        enableInput();
                    }
                }
            });

            const sendMessage = async () => {
                const val = userText.value.trim();
                if(!val) return;
                
                addMsg(val, 'user');
                userText.value = "";
                moodLabel.innerText = "THINKING";

                const reply = await engine.chat.completions.create({
                    messages: [{ role: "user", content: val }]
                });

                addMsg(reply.choices[0].message.content, 'ai');
                moodLabel.innerText = "IDLE";
                userText.focus();
            };

            sendBtn.onclick = sendMessage;
            userText.onkeydown = (e) => { 
                if(e.key === 'Enter') sendMessage();
                e.stopPropagation(); // Stop key events from bubbling up to parents
            };

        } catch (e) {
            moodLabel.innerText = "LINK ERROR";
            console.error(e);
        }
    }

    function addMsg(t, s) {
        const d = document.createElement('div');
        d.className = `bubble ${s}-bubble`;
        d.innerText = t;
        stage.appendChild(d);
        stage.scrollTop = stage.scrollHeight;
    }

    // Canvas Mascot (Minimal)
    const ctx = document.getElementById('bot-canvas').getContext('2d');
    function anim(t) {
        ctx.clearRect(0,0,200,200);
        ctx.fillStyle = "#3b82f6";
        ctx.roundRect(60, 60 + Math.sin(t/500)*5, 80, 70, 15);
        ctx.fill();
        requestAnimationFrame(anim);
    }
    anim(0);

    window.onload = init;
</script>
</body>
</html>
