<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELBOT OMEGA // ANALYST CONSOLE</title>
    <style>
        :root {
            --p8-pink: #f472b6; --p8-blue: #3b82f6; --p8-orange: #fb923c; 
            --p8-bg: #050507; --p8-surface: rgba(24, 24, 27, 0.7);
            --p8-border: rgba(255, 255, 255, 0.1);
            --p8-glow: rgba(244, 114, 182, 0.3);
            --font-main: 'JetBrains Mono', 'Inter', monospace;
        }

        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--p8-border) transparent; }
        body { 
            background: var(--p8-bg); color: #e4e4e7; margin: 0; 
            font-family: var(--font-main); height: 100vh; overflow: hidden;
            display: grid; grid-template-columns: 320px 1fr;
        }

        /* --- UI OVERLAYS & HUD --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        /* --- SIDEBAR: NEURAL ARCHIVE --- */
        #sidebar {
            background: #000; border-right: 1px solid var(--p8-border);
            display: flex; flex-direction: column; padding: 20px; gap: 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 10;
        }

        .console-header {
            font-size: 0.6rem; color: var(--p8-pink); letter-spacing: 4px;
            text-transform: uppercase; border-bottom: 1px solid var(--p8-pink);
            padding-bottom: 10px; margin-bottom: 10px; opacity: 0.8;
        }

        #mascot-container {
            position: relative; width: 100%; height: 220px;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            border: 1px solid var(--p8-border); border-radius: 4px; overflow: hidden;
        }

        #bot-canvas { width: 100%; height: 100%; }

        /* --- ANALYST REGISTRY --- */
        .registry-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .registry-list { 
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
            padding-right: 5px; margin-top: 10px;
        }
        .file-node {
            background: var(--p8-surface); border: 1px solid var(--p8-border);
            padding: 10px; border-radius: 4px; font-size: 0.7rem;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s; cursor: crosshair;
        }
        .file-node:hover { border-color: var(--p8-pink); background: rgba(244,114,182,0.05); }
        .file-node .meta { color: #555; font-size: 0.6rem; }
        .btn-purge { color: #444; cursor: pointer; font-size: 1rem; }
        .btn-purge:hover { color: #ef4444; }

        /* --- MAIN CORE --- */
        #main-viewport { display: flex; flex-direction: column; position: relative; }
        
        #terminal {
            flex: 1; overflow-y: auto; padding: 40px; display: flex;
            flex-direction: column; gap: 30px; padding-bottom: 160px;
        }

        .entry { max-width: 80%; animation: emerge 0.3s ease-out; position: relative; }
        @keyframes emerge { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .entry.ai { align-self: flex-start; }
        .entry.user { align-self: flex-end; color: var(--p8-pink); }

        .entry .label { 
            font-size: 0.6rem; font-weight: 900; letter-spacing: 2px; 
            margin-bottom: 8px; color: var(--p8-blue);
        }

        .entry .content {
            background: var(--p8-surface); backdrop-filter: blur(12px);
            border: 1px solid var(--p8-border); padding: 20px; border-radius: 2px;
            line-height: 1.6; font-size: 0.85rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* --- TRACE UI --- */
        .trace-block {
            margin-top: 15px; font-size: 0.7rem; border-left: 2px solid var(--p8-blue);
            padding-left: 15px; color: #71717a;
        }

        /* --- INTERACTION ZONE --- */
        #dock {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 30px 40px; background: linear-gradient(transparent, #050507 40%);
            z-index: 100;
        }

        .dock-inner {
            max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px;
        }

        .status-bar {
            display: flex; gap: 20px; font-size: 0.6rem; color: #555;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .status-bar span { display: flex; align-items: center; gap: 5px; }
        .indicator { width: 6px; height: 6px; border-radius: 50%; background: #222; }
        .indicator.active { background: var(--p8-pink); box-shadow: 0 0 8px var(--p8-pink); }

        .input-wrapper {
            display: flex; gap: 10px; background: rgba(0,0,0,0.8);
            border: 1px solid var(--p8-border); border-radius: 8px; padding: 5px;
            transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--p8-pink); box-shadow: 0 0 20px var(--p8-glow); }

        input {
            flex: 1; background: transparent; border: none; color: #fff;
            padding: 15px; outline: none; font-family: var(--font-main);
        }

        #sync-btn {
            background: var(--p8-pink); color: #000; border: none;
            padding: 0 30px; font-weight: 900; cursor: pointer; border-radius: 4px;
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px;
        }
        #sync-btn:disabled { background: #222; color: #444; }

        .upload-area {
            border: 1px dashed #222; padding: 10px; text-align: center;
            font-size: 0.6rem; color: #444; cursor: pointer; transition: 0.2s;
        }
        .upload-area:hover { border-color: var(--p8-blue); color: var(--p8-blue); }

        /* --- SCROLLBARS --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--p8-border); }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="console-header">Neural Interface // OMEGA</div>
    
    <div id="mascot-container">
        <canvas id="bot-canvas"></canvas>
    </div>

    <div class="registry-container">
        <div class="console-header" style="border:none; font-size: 0.55rem;">Local Data Registry</div>
        <div id="file-list" class="registry-list"></div>
        <label for="file-in" class="upload-area">UPLOAD_RAW_METRICS (.JSON, .CSV, .TXT)</label>
        <input type="file" id="file-in" hidden multiple>
    </div>

    <div id="system-stats" class="status-bar" style="flex-direction: column; gap: 5px;">
        <span>VRAM_BUF: <b id="vram-stat">STABLE</b></span>
        <span>LATENCY: <b id="lat-stat">0ms</b></span>
    </div>
</aside>

<main id="main-viewport">
    <div id="terminal">
        <div class="entry ai">
            <div class="label">PIXELBOT_OMEGA_V2.0</div>
            <div class="content">
                Neural link standby. WebGPU initialized. <br>
                Awaiting Entropia Universe data streams for ROI synthesis.
            </div>
        </div>
    </div>

    <div id="dock">
        <div class="dock-inner">
            <div class="status-bar">
                <span><div id="status-led" class="indicator"></div> Engine: <span id="status-text">DISCONNECTED</span></span>
                <span>Mode: <b style="color:var(--p8-pink)">ANALYST_PRO</b></span>
            </div>
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Querying Neural Core..." disabled>
                <button id="sync-btn" disabled>Sync</button>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    // --- CONFIG & STATE ---
    const DB_NAME = "Pixelbot_Omega_HighRes";
    const STORE_NAME = "knowledge_shards";
    let engine, db;
    let knowledgeBase = {}; 
    let registryManifest = [];

    const ui = {
        terminal: document.getElementById('terminal'),
        input: document.getElementById('user-input'),
        btn: document.getElementById('sync-btn'),
        fileList: document.getElementById('file-list'),
        led: document.getElementById('status-led'),
        status: document.getElementById('status-text'),
        vram: document.getElementById('vram-stat')
    };

    // --- 1. PERSISTENCE & ANALYST RAG ---
    async function initStorage() {
        return new Promise(res => {
            const req = indexedDB.open(DB_NAME, 3);
            req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
            req.onsuccess = e => { db = e.target.result; res(); };
        });
    }

    async function syncRegistry() {
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const keys = await new Promise(r => {
            store.getAllKeys().onsuccess = e => r(e.target.result);
        });
        
        registryManifest = keys;
        ui.fileList.innerHTML = '';
        knowledgeBase = {};

        for (const key of keys) {
            const content = await new Promise(r => {
                store.get(key).onsuccess = e => r(e.target.result);
            });
            knowledgeBase[key] = content;
            renderFileNode(key, content.length);
        }
    }

    function renderFileNode(name, size) {
        const div = document.createElement('div');
        div.className = 'file-node';
        div.innerHTML = `
            <div>
                <div>${name}</div>
                <div class="meta">${(size/1024).toFixed(1)} KB</div>
            </div>
            <span class="btn-purge" data-name="${name}">×</span>
        `;
        div.querySelector('.btn-purge').onclick = async (e) => {
            const n = e.target.dataset.name;
            db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).delete(n);
            await syncRegistry();
        };
        ui.fileList.appendChild(div);
    }

    // --- 2. THE SEARCH ARCHITECTURE (BM25-Lite) ---
    function performSemanticScan(query, topK = 3) {
        const terms = query.toLowerCase().match(/\w+/g) || [];
        let results = [];

        for (const [source, text] of Object.entries(knowledgeBase)) {
            const lines = text.split('\n');
            lines.forEach(line => {
                let score = 0;
                terms.forEach(t => {
                    if (line.toLowerCase().includes(t)) score += 1;
                });
                if (score > 0) results.push({ source, line, score });
            });
        }

        return results
            .sort((a, b) => b.score - a.score)
            .slice(0, 10)
            .map(r => `[REF: ${r.source}] ${r.line}`)
            .join('\n');
    }

    // --- 3. MASCOT EVOLUTION (State Machine) ---
    class OMEGAVisualizer {
        constructor() {
            this.canvas = document.getElementById('bot-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.state = 'IDLE'; // IDLE, THINKING, STRESSED, STREAMING
            this.particles = [];
            this.resize();
            this.animate();
        }

        resize() {
            this.canvas.width = this.canvas.offsetWidth * window.devicePixelRatio;
            this.canvas.height = this.canvas.offsetHeight * window.devicePixelRatio;
        }

        setState(s) { this.state = s; }

        animate() {
            const { ctx, canvas, state } = this;
            const t = Date.now() / 1000;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // DRAW CORE
            ctx.shadowBlur = (state === 'THINKING') ? 30 : 15;
            ctx.shadowColor = (state === 'STRESSED') ? '#fb923c' : '#f472b6';
            
            ctx.strokeStyle = ctx.shadowColor;
            ctx.lineWidth = 2;

            // Neural Rings
            for(let i=0; i<3; i++) {
                ctx.beginPath();
                let speed = (i + 1) * (state === 'THINKING' ? 4 : 1);
                let rot = t * speed;
                ctx.ellipse(centerX, centerY, 40 + i*15, 20 + i*5, rot, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Central "Eye"
            ctx.fillStyle = "#fff";
            let eyeSize = (state === 'STRESSED') ? 10 + Math.random()*5 : 12;
            ctx.beginPath();
            ctx.arc(centerX, centerY, eyeSize, 0, Math.PI*2);
            ctx.fill();

            // Stress Glitch Effect
            if (state === 'STRESSED' || state === 'THINKING') {
                ctx.fillStyle = "rgba(59, 130, 246, 0.5)";
                for(let i=0; i<5; i++) {
                    ctx.fillRect(centerX - 50 + Math.random()*100, centerY - 50 + Math.random()*100, 20, 1);
                }
            }

            requestAnimationFrame(() => this.animate());
        }
    }
    const mascot = new OMEGAVisualizer();

    // --- 4. ENGINE CORE & SOFT RESET ---
    async function bootEngine() {
        try {
            ui.status.innerText = "INITIALIZING WEBGPU...";
            engine = await webllm.CreateMLCEngine("Llama-3.2-1B-Instruct-q4f32_1-MLC", {
                initProgressCallback: (p) => {
                    mascot.setState('THINKING');
                    ui.status.innerText = `SYNCING_NEURAL_WEIGHTS: ${Math.round(p.progress * 100)}%`;
                    if (p.progress === 1) {
                        ui.status.innerText = "LINK_ESTABLISHED";
                        ui.led.classList.add('active');
                        ui.input.disabled = false;
                        ui.btn.disabled = false;
                        ui.input.placeholder = "Enter Analyst Query...";
                        mascot.setState('IDLE');
                    }
                }
            });
        } catch (err) {
            ui.status.innerText = "GPU_LINK_FAILURE";
            console.error(err);
        }
    }

    async function handleQuery() {
        const query = ui.input.value.trim();
        if (!query || !engine) return;

        ui.input.value = "";
        addEntry(query, 'user');
        mascot.setState('THINKING');
        
        const startTime = Date.now();

        // RAG Logic
        const context = performSemanticScan(query);
        
        // System Prompt Injection (Meta-Manifest)
        const systemPrompt = `
            ROLE: Pixelbot OMEGA. Senior Lead Technical Analyst for Pixelb8.com.
            TONE: Professional, Data-Driven, Tech-Heavy. 
            CONTEXT: You are specialized in Entropia Universe (Planet Calypso, Arkadia, Monria).
            
            KNOWLEDGE_MANIFEST: ${registryManifest.join(' | ') || 'No local shards loaded.'}
            
            LOCAL_DATA_EXTRACT:
            ${context || "No direct local matches found. Utilizing global Entropia datasets."}
            
            DIRECTIVE: Reference ROI, PED flow, and loot variance. If data is missing, state "Neural link shows data void in current registry."
        `;

        try {
            const chunks = await engine.chat.completions.create({
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: query }
                ],
                temperature: 0.2,
                stream: true
            });

            let fullResponse = "";
            const aiEntry = addEntry("", 'ai');
            const aiContent = aiEntry.querySelector('.content');

            for await (const chunk of chunks) {
                const delta = chunk.choices[0]?.delta?.content || "";
                fullResponse += delta;
                aiContent.innerText = fullResponse;
                ui.terminal.scrollTop = ui.terminal.scrollHeight;
                
                // Stress visualization based on token density
                if (fullResponse.length % 50 === 0) mascot.setState('STREAMING');
            }

            if (context) {
                const trace = document.createElement('div');
                trace.className = 'trace-block';
                trace.innerText = `>> NEURAL_TRACE_ACTIVE: Scanned ${registryManifest.length} shards. Found relevant clusters in ${context.split('\n').length} nodes.`;
                aiContent.appendChild(trace);
            }

            document.getElementById('lat-stat').innerText = `${Date.now() - startTime}ms`;
            mascot.setState('IDLE');

        } catch (e) {
            console.error(e);
            mascot.setState('STRESSED');
            addEntry("CRITICAL ERROR: Neural Link Dropped. VRAM threshold likely exceeded. Re-establishing...", 'ai');
            bootEngine(); // Soft reset
        }
    }

    function addEntry(text, type) {
        const div = document.createElement('div');
        div.className = `entry ${type}`;
        div.innerHTML = `
            <div class="label">${type === 'ai' ? 'PIXELBOT_OMEGA // RESPONSE' : 'ANALYST_SOURCE // QUERY'}</div>
            <div class="content">${text}</div>
        `;
        ui.terminal.appendChild(div);
        ui.terminal.scrollTop = ui.terminal.scrollHeight;
        return div;
    }

    // --- EVENTS ---
    ui.btn.onclick = handleQuery;
    ui.input.onkeydown = e => { if(e.key === 'Enter') handleQuery(); };

    document.getElementById('file-in').onchange = async (e) => {
        for (const file of e.target.files) {
            const text = await file.text();
            const tx = db.transaction(STORE_NAME, "readwrite");
            tx.objectStore(STORE_NAME).put(text, file.name);
            await new Promise(r => tx.oncomplete = r);
        }
        await syncRegistry();
        addEntry(`Data stream ingested: ${e.target.files.length} new shards indexed.`, 'ai');
    };

    window.onload = async () => {
        await initStorage();
        await syncRegistry();
        bootEngine();
    };

</script>
</body>
</html>
