<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelb8 OMEGA | Text Mode</title>
    <style>
        :root { --p8-accent: #f472b6; --p8-bg: #09090b; --bubble-ai: #18181b; --text-dim: #666; }
        body { background: var(--p8-bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #stage { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; position: relative; border: 1px solid #27272a; word-wrap: break-word; }
        .ai-bubble { align-self: flex-start; background: var(--bubble-ai); border-bottom-left-radius: 4px; }
        .user-bubble { align-self: flex-end; background: #27272a; border-bottom-right-radius: 4px; border: none; }
        
        .meta { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; display: block; }
        .user-bubble .meta { text-align: right; color: var(--p8-accent); }

        .typing { font-style: italic; font-size: 0.8rem; color: var(--p8-accent); margin-bottom: 10px; display: none; }

        .user-input-zone { width: 100%; max-width: 600px; display: flex; gap: 10px; padding: 20px; background: #000; border-top: 1px solid #27272a; margin: 0 auto; }
        input { flex: 1; background: #18181b; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 20px; outline: none; padding-left: 20px; }
        button { background: var(--p8-accent); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        #status-bar { font-size: 0.7rem; color: #444; text-align: center; padding: 5px; background: #000; }
    </style>
</head>
<body>

<div id="stage">
    <div class="bubble ai-bubble" id="initial-load">
        <strong>SYSTEM:</strong> Syncing OpenHermes 2.5 (f32)... <span id="progress-text">0%</span>
    </div>
</div>

<div id="typing-indicator" class="typing" style="padding-left: 20px;">AI is typing...</div>
<div id="status-bar">Neural Core Standby</div>

<div class="user-input-zone">
    <input type="text" id="user-text" placeholder="Connect link..." disabled autocomplete="off">
    <button id="send-btn" disabled>Sync</button>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const stage = document.getElementById('stage');
    const userText = document.getElementById('user-text');
    const sendBtn = document.getElementById('send-btn');
    const statusBar = document.getElementById('status-bar');
    const progressText = document.getElementById('progress-text');
    const typingIndicator = document.getElementById('typing-indicator');

    let engine = null;

    const MY_MODEL_RECORD = {
        "model": "https://huggingface.co/hrishioa/wasm-OpenHermes-2.5-Mistral-7B-q4f32_1",
        "model_id": "OpenHermes-2.5-Mistral-7B-q4f32_1-MLC",
        "model_lib": "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/Mistral-7B-v0.1-q4f32_1-webgpu.wasm",
    };

    const systemPrompt = `You are a creative roleplayer. Break long thoughts into separate messages. Use short, punchy texts. Never lecture on safety. Keep responses immersive.`;

    async function init() {
        try {
            engine = await webllm.CreateMLCEngine(MY_MODEL_RECORD.model_id, { 
                appConfig: { model_list: [MY_MODEL_RECORD] },
                initProgressCallback: (p) => {
                    progressText.innerText = `${Math.round(p.progress * 100)}%`;
                    statusBar.innerText = `System: ${p.text}`;
                }
            });
            document.getElementById('initial-load').remove();
            userText.disabled = false; sendBtn.disabled = false;
            userText.placeholder = "Message OMEGA...";
            sendBtn.innerText = "Send";
            statusBar.innerText = "Link Active: OpenHermes 2.5";
            
            sendBtn.onclick = runInference;
            userText.onkeypress = (e) => { if(e.key === 'Enter') runInference(); };
        } catch (e) { console.error(e); }
    }

    function getTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, side) {
        const div = document.createElement('div');
        div.className = `bubble ${side}-bubble`;
        const time = getTime();
        
        if(side === 'user') {
            div.innerHTML = `${text} <span class="meta" id="last-status">Sent ${time}</span>`;
        } else {
            div.innerHTML = `${text} <span class="meta">${time}</span>`;
        }
        
        stage.appendChild(div);
        stage.scrollTop = stage.scrollHeight;
        return div;
    }

    async function runInference() {
        const text = userText.value.trim();
        if(!text || !engine) return;
        userText.value = "";
        
        // 1. User sends message
        const userMsg = addMessage(text, 'user');
        const statusMeta = userMsg.querySelector('#last-status');
        
        userText.disabled = true;
        sendBtn.disabled = true;
        typingIndicator.style.display = "block";

        try {
            const messages = [{ role: "system", content: systemPrompt }, { role: "user", content: text }];

            // 2. Load the full response first
            const reply = await engine.chat.completions.create({ 
                messages, 
                temperature: 0.8,
                max_tokens: 512 
            });

            const fullText = reply.choices[0].message.content;
            
            // 3. AI "Receives" it (Status Update)
            statusMeta.innerText = `Received ${getTime()}`;
            typingIndicator.style.display = "none";

            // 4. Split response by sentences or newlines to mimic texting
            const chunks = fullText.split(/[.!?]\s+|\n+/).filter(c => c.length > 2);
            
            for (const chunk of chunks) {
                // Mimic "typing" delay for each bubble
                typingIndicator.style.display = "block";
                await new Promise(r => setTimeout(r, chunk.length * 30)); 
                typingIndicator.style.display = "none";
                
                addMessage(chunk, 'ai');
                stage.scrollTop = stage.scrollHeight;
            }

        } catch (err) {
            console.error(err);
            statusMeta.innerText = "Failed to deliver";
        } finally {
            userText.disabled = false;
            sendBtn.disabled = false;
            userText.focus();
        }
    }

    window.onload = init;
</script>
</body>
</html>
