<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelbot OMEGA | Persistent Lead Tech</title>
    <link rel="icon" type="image/png" href="assets/images/logo/pixelbotfavicon.png">
    <style>
        :root { 
            --p8-pink: #f472b6; --p8-blue: #3b82f6; --p8-orange: #fb923c; 
            --p8-bg: #09090b; --p8-surface: #18181b; --p8-border: #27272a;
        }
        
        * { box-sizing: border-box; font-family: 'JetBrains Mono', 'Inter', monospace; }
        body { background: var(--p8-bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar: Persistence & Mascot */
        #side-panel { 
            width: 260px; background: #000; border-right: 1px solid var(--p8-border); 
            display: flex; flex-direction: column; padding: 20px; gap: 15px; z-index: 10;
        }
        #bot-canvas { 
            width: 180px; height: 180px; background: #111; border-radius: 20px; 
            border: 2px solid var(--p8-pink); box-shadow: 0 0 20px rgba(244, 114, 182, 0.2); 
            flex-shrink: 0; align-self: center;
        }
        .bot-label { color: var(--p8-pink); font-weight: bold; font-size: 1rem; letter-spacing: 2px; text-align: center; }
        #mood-label { font-size: 0.7rem; color: var(--p8-blue); text-align: center; letter-spacing: 1px; font-weight: 800; }

        /* Knowledge Registry */
        #file-gallery { flex: 1; overflow-y: auto; margin-top: 10px; border-top: 1px solid #222; padding-top: 15px; }
        .gallery-wrap summary { list-style: none; cursor: pointer; font-size: 0.75rem; color: var(--p8-blue); font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .file-list { display: flex; flex-direction: column; gap: 6px; }
        .file-item { 
            background: var(--p8-surface); border: 1px solid #222; padding: 8px 10px; border-radius: 6px; 
            font-size: 0.65rem; color: #eee; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .file-item:hover { border-color: var(--p8-pink); }
        .delete-file { color: #555; cursor: pointer; font-weight: bold; padding: 0 5px; }
        .delete-file:hover { color: #ff4444; }

        /* Main Core & Chat */
        #main-core { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #111, #000); position: relative; }
        #stage { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 150px; }
        
        .bubble { max-width: 85%; padding: 15px 20px; border-radius: 20px; line-height: 1.6; font-size: 0.9rem; border: 1px solid var(--p8-border); position: relative; animation: slideIn 0.3s ease-out; }
        .ai-bubble { align-self: flex-start; background: #18181b; border-bottom-left-radius: 4px; }
        .user-bubble { align-self: flex-end; background: #27272a; color: var(--p8-pink); border-bottom-right-radius: 4px; }

        /* Thought Trace UI */
        .trace-wrap { margin-bottom: 10px; font-size: 0.7rem; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
        .trace-header { background: #111; padding: 6px 10px; color: var(--p8-blue); cursor: pointer; font-weight: bold; }
        .trace-body { padding: 10px; background: #000; color: #666; max-height: 120px; overflow-y: auto; white-space: pre-wrap; }

        /* Interaction Zone */
        #interaction-zone { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            border-top: 1px solid var(--p8-border); padding: 20px; z-index: 100;
        }
        .mode-dock { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; }
        .mode-btn { font-size: 0.6rem; padding: 4px 10px; border: 1px solid #333; border-radius: 20px; cursor: pointer; color: #555; transition: 0.2s; }
        .mode-btn.active { color: var(--p8-pink); border-color: var(--p8-pink); background: rgba(244,114,182,0.1); }

        .controls { display: flex; gap: 12px; max-width: 900px; margin: 0 auto; width: 100%; }
        input[type="text"] { 
            flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 14px 22px; 
            border-radius: 30px; outline: none; font-size: 1rem;
            -webkit-user-select: text !important; user-select: text !important;
        }
        input:focus { border-color: var(--p8-pink); box-shadow: 0 0 15px rgba(244,114,182,0.1); }
        button#send-btn { background: var(--p8-pink); color: #000; border: none; padding: 0 25px; border-radius: 30px; font-weight: 800; cursor: pointer; }
        button:disabled { background: #222; color: #555; cursor: not-allowed; }

        .upload-trigger { background: #111; border: 1px dashed #444; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 0.65rem; color: #aaa; text-align: center; display: block; margin-top: 10px; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="side-panel">
    <div class="bot-label">PIXELBOT OMEGA</div>
    <canvas id="bot-canvas"></canvas>
    <div id="mood-label">INITIALIZING...</div>

    <div id="file-gallery">
        <details class="gallery-wrap" open>
            <summary>NEURAL DATA STREAMS <span>▼</span></summary>
            <div id="file-list" class="file-list"></div>
            <label for="file-upload" class="upload-trigger">+ INGEST DATA</label>
            <input type="file" id="file-upload" hidden multiple>
        </details>
    </div>
</div>

<div id="main-core">
    <div id="stage">
        <div class="bubble ai-bubble">Neural Link Active. All local Knowledge Bases (IndexedDB) loaded and ready for Entropia analysis.</div>
    </div>

    <div id="interaction-zone">
        <div class="mode-dock">
            <div class="mode-btn active" data-mode="fast">FAST-SCAN</div>
            <div class="mode-btn" data-mode="thinking">THOUGHT-CHAIN</div>
            <div class="mode-btn" data-mode="pro">DEEPTHOUGHT PRO</div>
        </div>
        <div class="controls">
            <input type="text" id="user-text" placeholder="Syncing GPU..." disabled autocomplete="off">
            <button id="send-btn" disabled>SYNC</button>
        </div>
    </div>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const stage = document.getElementById('stage');
    const userText = document.getElementById('user-text');
    const sendBtn = document.getElementById('send-btn');
    const moodLabel = document.getElementById('mood-label');
    const fileListUI = document.getElementById('file-list');
    const modeBtns = document.querySelectorAll('.mode-btn');

    let knowledgeStore = {}; 
    let engine = null;
    let currentMode = 'fast';
    const DB_NAME = "PixelbotOMEGA_v2";
    const STORE_NAME = "knowledge";

    // --- 1. PERSISTENCE ENGINE (IndexedDB) ---
    async function initDB() {
        return new Promise(res => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
            req.onsuccess = e => res(e.target.result);
        });
    }

    async function saveFile(name, content) {
        const db = await initDB();
        db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).put(content, name);
    }

    async function deleteFile(name) {
        const db = await initDB();
        db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).delete(name);
        delete knowledgeStore[name];
        document.getElementById(`file-${name.replace(/\s+/g, '')}`)?.remove();
    }

    async function loadStoredKnowledge() {
        const db = await initDB();
        return new Promise(res => {
            const tx = db.transaction(STORE_NAME, "readonly");
            const store = tx.objectStore(STORE_NAME);
            store.openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) {
                    knowledgeStore[cursor.key] = cursor.value;
                    renderFileItem(cursor.key);
                    cursor.continue();
                } else res();
            };
        });
    }

    function renderFileItem(name) {
        const safeId = `file-${name.replace(/\s+/g, '')}`;
        if(document.getElementById(safeId)) return;
        const div = document.createElement('div');
        div.className = 'file-item';
        div.id = safeId;
        div.innerHTML = `<span>📄 ${name}</span><span class="delete-file" onclick="removeData('${name}')">×</span>`;
        fileListUI.appendChild(div);
    }
    window.removeData = (name) => deleteFile(name);

    // --- 2. MASCOT ENGINE (Full States) ---
    class Mascot {
        constructor() {
            this.canvas = document.getElementById('bot-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.canvas.width = 200; this.canvas.height = 200;
            this.state = 'idle'; this.frame = 0;
            this.animate();
        }
        setState(s) { 
            this.state = s; 
            moodLabel.innerText = s.toUpperCase(); 
            moodLabel.style.color = s === 'thinking' ? 'var(--p8-orange)' : 'var(--p8-blue)';
        }
        draw() {
            const ctx = this.ctx; const t = this.frame * 0.1;
            ctx.clearRect(0,0,200,200);
            let bounce = Math.sin(t) * 5;
            if(this.state === 'thinking') bounce = Math.sin(t*3) * 2;

            ctx.save(); ctx.translate(100, 100 + bounce);
            
            // Body
            ctx.fillStyle = "#3b82f6";
            this.roundRect(-40, -50, 80, 70, 15);
            
            // Screen
            ctx.fillStyle = "#1e3a8a";
            this.roundRect(-32, -42, 64, 48, 10);

            // Eyes
            ctx.fillStyle = "#fb923c";
            let eyeH = (Math.sin(t*0.2) > 0.98) ? 2 : 10;
            if(this.state === 'thinking') {
                let shift = Math.sin(t*2) * 8;
                ctx.fillRect(-20 + shift, -30, 8, eyeH);
                ctx.fillRect(10 + shift, -30, 8, eyeH);
            } else {
                ctx.fillRect(-20, -30, 10, eyeH);
                ctx.fillRect(10, -30, 10, eyeH);
            }

            // Mouth
            ctx.strokeStyle = "#fb923c"; ctx.lineWidth = 2;
            ctx.beginPath();
            let mWidth = (this.state === 'talking') ? Math.abs(Math.sin(t*5))*12 : 8;
            ctx.moveTo(-mWidth/2, -5); ctx.lineTo(mWidth/2, -5);
            ctx.stroke();

            ctx.restore();
        }
        roundRect(x, y, w, h, r) {
            this.ctx.beginPath(); this.ctx.moveTo(x+r, y); 
            this.ctx.arcTo(x+w, y, x+w, y+h, r); this.ctx.arcTo(x+w, y+h, x, y+h, r);
            this.ctx.arcTo(x, y+h, x, y, r); this.ctx.arcTo(x, y, x+w, y, r); this.ctx.fill();
        }
        animate() { this.frame++; this.draw(); requestAnimationFrame(() => this.animate()); }
    }
    const bot = new Mascot();

    // --- 3. LOGIC ENGINE ---
    const ENTROPIA_DOMAINS = ['planetcalypsoforum.com', 'entropiawiki.com', 'entropialife.com'];
    
    document.getElementById('file-upload').onchange = async (e) => {
        bot.setState('thinking');
        for (const file of Array.from(e.target.files)) {
            const text = await file.text();
            knowledgeStore[file.name] = text;
            await saveFile(file.name, text);
            renderFileItem(file.name);
        }
        bot.setState('idle');
    };

    modeBtns.forEach(btn => {
        btn.onclick = () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
        };
    });

    async function runInference() {
        const inputVal = userText.value.trim();
        if(!inputVal || !engine) return;
        userText.value = "";
        addMessage(inputVal, 'user');
        bot.setState('thinking');

        // Context Search
        const queryTerms = inputVal.toLowerCase().split(/\s+/).filter(t => t.length > 2);
        let contextBlocks = [];
        for (const [name, content] of Object.entries(knowledgeStore)) {
            const matches = content.split('\n').filter(line => 
                queryTerms.some(term => line.toLowerCase().includes(term))
            ).slice(0, 10);
            if(matches.length > 0) contextBlocks.push(`[SOURCE: ${name}]\n${matches.join('\n')}`);
        }
        const context = contextBlocks.join('\n\n');

        const isEntropia = /ped|calypso|arkadia|loot|mining|sweat/i.test(inputVal);
        const systemPrompt = `You are PIXELBOT OMEGA. Lead Tech Analyst for Entropia Universe. 
        MODE: ${currentMode}. 
        CONTEXT: ${context || "None"}. 
        If Entropia related, be technical. If context exists, prioritize it.`;

        try {
            const messages = [{ role: "system", content: systemPrompt }, { role: "user", content: inputVal }];
            const reply = await engine.chat.completions.create({ messages, temperature: currentMode === 'pro' ? 0.2 : 0.0 });
            let response = reply.choices[0].message.content;

            if (context) {
                const trace = `<details class="trace-wrap"><summary class="trace-header">🔍 NEURAL DATA TRACE</summary><div class="trace-body">${context}</div></details>`;
                response = trace + response;
            }

            bot.setState('talking');
            addMessage(response, 'ai', true);
            setTimeout(() => bot.setState('idle'), 2000);
        } catch (e) {
            addMessage("Link Dropped. Engine error.", 'ai');
            bot.setState('idle');
        }
    }

    async function init() {
        await loadStoredKnowledge();
        try {
            engine = await webllm.CreateMLCEngine("Llama-3.2-1B-Instruct-q4f32_1-MLC", { 
                initProgressCallback: (p) => {
                    moodLabel.innerText = `SYNCING ${Math.round(p.progress * 100)}%`;
                    if (p.progress === 1) {
                        bot.setState('idle');
                        userText.disabled = false; sendBtn.disabled = false;
                        userText.placeholder = "Query Analyst...";
                        userText.focus();
                    }
                }
            });
            sendBtn.onclick = runInference;
            userText.onkeydown = e => { if(e.key === 'Enter') runInference(); e.stopPropagation(); };
        } catch (e) { moodLabel.innerText = "GPU ERROR"; }
    }

    function addMessage(t, s, isHtml = false) {
        const div = document.createElement('div');
        div.className = `bubble ${s}-bubble`;
        isHtml ? div.innerHTML = t : div.innerText = t;
        stage.appendChild(div);
        stage.scrollTop = stage.scrollHeight;
    }

    window.onload = init;
</script>
</body>
</html>
