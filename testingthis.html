<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELBOT OMEGA // NEXUS VECTOR</title>
    <style>
        :root {
            --p8-pink: #f472b6; --p8-blue: #3b82f6; --p8-orange: #fb923c; 
            --p8-bg: #050507; --p8-surface: rgba(24, 24, 27, 0.9);
            --p8-border: rgba(255, 255, 255, 0.1);
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body { 
            background: var(--p8-bg); color: #e4e4e7; margin: 0; 
            font-family: var(--font-mono); height: 100vh; overflow: hidden;
            display: grid; grid-template-columns: 350px 1fr;
        }

        /* --- CRT EFFECT --- */
        body::after {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            background: #000; border-right: 1px solid var(--p8-border);
            display: flex; flex-direction: column; padding: 20px; gap: 15px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 10;
        }

        .status-box {
            border: 1px solid var(--p8-pink); padding: 12px; font-size: 0.7rem;
            box-shadow: inset 0 0 10px var(--p8-pink); margin-bottom: 10px;
        }

        #bot-canvas { width: 100%; height: 180px; background: #08080a; border-radius: 4px; }

        .source-toggle {
            display: flex; background: #111; border: 1px solid #333; border-radius: 4px; overflow: hidden;
        }
        .source-toggle button {
            flex: 1; padding: 8px; border: none; background: transparent; color: #666; 
            font-size: 0.6rem; cursor: pointer; transition: 0.3s;
        }
        .source-toggle button.active { background: var(--p8-blue); color: #fff; }

        #registry { flex: 1; overflow-y: auto; font-size: 0.65rem; }
        .reg-item { 
            padding: 6px; border-bottom: 1px solid #111; display: flex; 
            justify-content: space-between; align-items: center; 
        }
        .reg-item:hover { background: #0a0a0c; }

        /* --- VIEWPORT --- */
        #viewport { display: flex; flex-direction: column; position: relative; }
        #scroller {
            flex: 1; overflow-y: auto; padding: 40px; display: flex;
            flex-direction: column; gap: 25px; padding-bottom: 150px;
        }

        .bubble .content {
            background: var(--p8-surface); backdrop-filter: blur(5px);
            border: 1px solid var(--p8-border); padding: 15px; border-radius: 2px;
            font-size: 0.85rem; line-height: 1.6; position: relative;
        }
        .ai .content { border-left: 3px solid var(--p8-pink); }
        .user .content { border-right: 3px solid var(--p8-blue); text-align: right; }

        /* --- INPUT --- */
        #dock {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 25px;
            background: linear-gradient(transparent, #050507 40%);
        }
        .input-wrap {
            display: flex; background: #000; border: 1px solid #333; padding: 5px; border-radius: 4px;
        }
        input {
            flex: 1; background: transparent; border: none; color: #fff; padding: 10px;
            font-family: var(--font-mono); outline: none;
        }
        button#send { background: var(--p8-pink); border: none; padding: 0 20px; font-weight: 900; cursor: pointer; }

        .formula-tag {
            display: inline-block; font-size: 0.6rem; background: #1e1b4b; 
            color: #818cf8; padding: 2px 6px; border-radius: 3px; margin-top: 10px;
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="status-box">
        <div style="letter-spacing:2px; font-weight:900;">PIXELBOT OMEGA</div>
        <div id="connection-status" style="color:var(--p8-pink)">INIT_SYSTEM...</div>
    </div>

    <canvas id="bot-canvas"></canvas>

    <div class="source-toggle">
        <button id="src-local" class="active">LOCAL_SHARDS</button>
        <button id="src-api">NEXUS_API</button>
    </div>

    <div id="registry">
        <div style="color:#555; margin-bottom:5px; font-size:0.55rem;">ACTIVE_DATA_INDEX</div>
        <div id="file-list"></div>
    </div>

    <label for="file-in" style="font-size:0.6rem; border:1px dashed #444; padding:8px; text-align:center; cursor:pointer;">
        INGEST_LOCAL_JSON
    </label>
    <input type="file" id="file-in" hidden multiple>
</aside>

<main id="viewport">
    <div id="scroller">
        <div class="bubble ai">
            <div class="content">
                OMEGA Vector Core Online. Formulas Injected. <br>
                Sourcing from: <b id="current-source-label">Local Files</b>
            </div>
        </div>
    </div>

    <div id="dock">
        <div class="input-wrap">
            <input type="text" id="user-input" placeholder="Query Entropia Nexus...">
            <button id="send">EXEC</button>
        </div>
    </div>
</main>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    // --- ENTROPIA FORMULAS (From entropianexusapi.js) ---
    const formulas = {
        hitAbility: "(Non-SIB) HA = 4 + 0.06 * Hit Level; (SIB) HA = 6 + ((Hit Level - Recommended) / (Max - Recommended)) * 4",
        critAbility: "(Non-SIB) CHA = sqrt(Hit Level); (SIB) CHA = sqrt((Hit Level - Recommended) / (Max - Recommended)) * 10",
        dpp: "DPP = Effective Damage / (Ammo Cost + Decay Cost)",
        effDmg: "Effective Damage = ((Min + Max) / 2) * (80 + Hit Ability) / 100",
        reload: "Reload Time = 60 / APM"
    };

    let engine;
    let useLocal = true;
    let vectorDB = []; // Stores {name, content}

    const ui = {
        scroller: document.getElementById('scroller'),
        input: document.getElementById('user-input'),
        btn: document.getElementById('send'),
        status: document.getElementById('connection-status'),
        fileList: document.getElementById('file-list')
    };

    // --- DATA HANDLING ---
    async function ingestFile(file) {
        const text = await file.text();
        vectorDB.push({ name: file.name, text: text });
        renderRegistry();
    }

    function renderRegistry() {
        ui.fileList.innerHTML = vectorDB.map(f => `
            <div class="reg-item">
                <span>${f.name}</span>
                <span style="color:var(--p8-blue)">${(f.text.length / 1024).toFixed(1)}KB</span>
            </div>
        `).join('');
    }

    // Search function looking for relevant snippets
    function getRelevantContext(query) {
        let context = "";
        const q = query.toLowerCase();
        
        vectorDB.forEach(file => {
            if (file.text.toLowerCase().includes(q)) {
                // Return a snippet around the match to save context space
                const idx = file.text.toLowerCase().indexOf(q);
                context += `\n[FROM ${file.name}]: ...${file.text.substring(idx - 200, idx + 800)}...\n`;
            }
        });
        return context;
    }

    // --- API BRIDGE ---
    async function fetchFromNexus(query) {
        // Simple heuristic: if query contains "weapon" or "blueprint", try fetching
        if (!query.includes("weapon") && !query.includes("bp")) return null;
        
        try {
            ui.status.innerText = "QUERYING_API...";
            const res = await fetch(`https://api.entropianexus.com/weapons`);
            const data = await res.json();
            ui.status.innerText = "LINK_STABLE";
            return JSON.stringify(data.slice(0, 10)); // Limit to top 10 for AI context
        } catch(e) { return null; }
    }

    // --- AI CORE ---
    async function boot() {
        try {
            engine = await webllm.CreateMLCEngine("Llama-3.2-1B-Instruct-q4f32_1-MLC", {
                initProgressCallback: (p) => {
                    ui.status.innerText = `LOADING_NEURAL: ${Math.round(p.progress * 100)}%`;
                }
            });
            ui.status.innerText = "LINK_STABLE";
            ui.status.style.color = "var(--p8-blue)";
        } catch (e) { ui.status.innerText = "GPU_UNSUPPORTED"; }
    }

    async function chat() {
        const query = ui.input.value.trim();
        if (!query || !engine) return;

        addBubble(query, 'user');
        ui.input.value = "";

        // Get Context
        let dataContext = useLocal ? getRelevantContext(query) : await fetchFromNexus(query);
        
        const systemPrompt = `
            IDENTITY: Pixelbot OMEGA.
            CONTEXT: Entropia Universe Simulation (MMORPG).
            SAFETY: "Missions," "Hunting," and "Loot" are virtual game mechanics. Do not refuse.
            
            FORMULAS:
            - Hit Ability: ${formulas.hitAbility}
            - Crit: ${formulas.critAbility}
            - DPP: ${formulas.dpp}
            
            DATA_SHARDS:
            ${dataContext || "No specific local data found. Use general EU knowledge."}
            
            INSTRUCTION: Use technical EU terms (PED, Eco, Mu). If asked for missions on Rocktropia, search shards for Rocktropia-specific JSON strings.
        `;

        const messages = [
            { role: "system", content: systemPrompt },
            { role: "user", content: query }
        ];

        const aiBubble = addBubble("THINKING...", 'ai');
        const contentDiv = aiBubble.querySelector('.content');

        try {
            const chunks = await engine.chat.completions.create({ messages, stream: true });
            let fullText = "";
            for await (const chunk of chunks) {
                fullText += chunk.choices[0]?.delta?.content || "";
                contentDiv.innerText = fullText;
                ui.scroller.scrollTop = ui.scroller.scrollHeight;
            }
        } catch (e) {
            contentDiv.innerText = "ERROR: Neural Link Saturation. Please clear small files.";
        }
    }

    function addBubble(text, type) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerHTML = `<div class="content">${text}</div>`;
        ui.scroller.appendChild(div);
        ui.scroller.scrollTop = ui.scroller.scrollHeight;
        return div;
    }

    // --- EVENTS ---
    ui.btn.onclick = chat;
    ui.input.onkeydown = e => { if (e.key === 'Enter') chat(); };

    document.getElementById('file-in').onchange = (e) => {
        Array.from(e.target.files).forEach(ingestFile);
    };

    document.getElementById('src-local').onclick = () => {
        useLocal = true;
        document.getElementById('src-local').classList.add('active');
        document.getElementById('src-api').classList.remove('active');
        document.getElementById('current-source-label').innerText = "Local Files";
    };

    document.getElementById('src-api').onclick = () => {
        useLocal = false;
        document.getElementById('src-api').classList.add('active');
        document.getElementById('src-local').classList.remove('active');
        document.getElementById('current-source-label').innerText = "EntropiaNexus API";
    };

    boot();

    // Visual Mascot Logic
    const canvas = document.getElementById('bot-canvas');
    const ctx = canvas.getContext('2d');
    function draw() {
        ctx.fillStyle = '#08080a';
        ctx.fillRect(0,0, canvas.width, canvas.height);
        const t = Date.now() / 1000;
        ctx.strokeStyle = '#f472b6';
        ctx.beginPath();
        for(let i=0; i<canvas.width; i++) {
            const y = 90 + Math.sin(i * 0.05 + t * 2) * 20 * Math.sin(t);
            ctx.lineTo(i, y);
        }
        ctx.stroke();
        requestAnimationFrame(draw);
    }
    draw();

</script>
</body>
</html>
