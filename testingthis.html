<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PIXELBOT | Lead Tech Edition</title>
	<link rel="icon" type="image/png" href="assets/images/logo/pixelbotfavicon.png">
    <style>
        :root { 
            --p8-pink: #f472b6; --p8-blue: #3b82f6; --p8-bg: #09090b; 
            --p8-border: #27272a; --p8-surface: #18181b;
        }
        
        * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--p8-bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* UI Shell */
        #registry-sidebar { 
            width: 300px; background: #000; border-right: 1px solid var(--p8-border); 
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        .panel-header { padding: 15px; font-size: 0.8rem; font-weight: 800; border-bottom: 1px solid var(--p8-border); display: flex; justify-content: space-between; align-items: center; }

        /* File List Styles */
        #file-registry { flex: 1; overflow-y: auto; padding: 10px; }
        .file-item { 
            background: var(--p8-surface); margin-bottom: 5px; border-radius: 4px; border: 1px solid transparent;
            transition: 0.2s;
        }
        .file-summary { padding: 8px 12px; font-size: 0.75rem; cursor: pointer; display: flex; justify-content: space-between; }
        .file-summary:hover { border-color: var(--p8-pink); }
        .file-content { 
            max-height: 0; overflow: hidden; font-size: 0.7rem; color: #a1a1aa; 
            background: #000; padding: 0 12px; transition: max-height 0.3s ease-out;
        }
        .file-item.open .file-content { max-height: 200px; padding: 10px 12px; overflow-y: auto; border-top: 1px solid var(--p8-border); }

        /* Core Engine */
        #core-engine { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-stage { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* Thinking Indicator */
        .thought-process { 
            font-size: 0.7rem; color: var(--p8-blue); border-left: 2px solid var(--p8-blue);
            padding-left: 10px; margin-bottom: 5px; font-style: italic; opacity: 0.8;
        }

        /* Mode Selector */
        .mode-dock { display: flex; gap: 10px; padding: 10px 20px; background: #000; }
        .mode-btn { 
            font-size: 0.65rem; padding: 4px 10px; border: 1px solid #333; border-radius: 20px; 
            cursor: pointer; color: #555; font-weight: 700;
        }
        .mode-btn.active { color: var(--p8-pink); border-color: var(--p8-pink); background: rgba(244,114,182,0.1); }

        /* Input Zone */
        .input-zone { padding: 20px; background: rgba(0,0,0,0.8); border-top: 1px solid var(--p8-border); }
        .input-bar { 
            display: flex; background: var(--p8-surface); border-radius: 30px; 
            border: 1px solid #333; padding: 5px 15px; transition: 0.3s;
        }
        .input-bar:focus-within { border-color: var(--p8-pink); box-shadow: 0 0 15px rgba(244,114,182,0.15); }
        input { 
            flex: 1; background: transparent; border: none; color: #fff; padding: 12px; 
            outline: none; -webkit-user-select: text; user-select: text; 
        }
        button#send-trigger { background: var(--p8-pink); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; margin-left: 10px; }

        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 15px; font-size: 0.9rem; line-height: 1.5; }
        .ai { align-self: flex-start; background: var(--p8-surface); border: 1px solid var(--p8-border); }
        .user { align-self: flex-end; background: var(--p8-pink); color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div id="registry-sidebar">
    <div class="panel-header">
        <span>ASSET REGISTRY</span>
        <label for="upload" style="cursor:pointer; color:var(--p8-pink)">[+]</label>
        <input type="file" id="upload" hidden multiple>
    </div>
    <div id="file-registry">
        <div style="text-align:center; color:#444; font-size:0.7rem; margin-top:20px;">No files ingested.</div>
    </div>
</div>

<div id="core-engine">
    <div id="chat-stage"></div>

    <div class="mode-dock">
        <div class="mode-btn active" data-mode="fast">FAST-SCAN</div>
        <div class="mode-btn" data-mode="thinking">THOUGHT-CHAIN</div>
        <div class="mode-btn" data-mode="pro">DEEPTHOUGHT PRO</div>
    </div>

    <div class="input-zone">
        <div class="input-bar">
            <input type="text" id="main-input" placeholder="Query Entropia or System..." autocomplete="off">
            <button id="send-trigger">➔</button>
        </div>
    </div>
</div>

<script>
    const registry = document.getElementById('file-registry');
    const upload = document.getElementById('upload');
    const input = document.getElementById('main-input');
    const stage = document.getElementById('chat-stage');
    const modeBtns = document.querySelectorAll('.mode-btn');
    
    let currentMode = 'fast';
    let fileStore = [];

    // --- ENTROPIA CONTEXT ENGINE ---
    const ENTROPIA_DOMAINS = [
        'planetcalypsoforum.com', 'entropiawiki.com', 'entropialife.com', 
        'virtualsense.eu', 'cyreneforum.com', 'arkadiaforum.com'
    ];

    const getSearchQuery = (text) => {
        const isEntropia = /ped|calypso|arkadia|cyrene|mob|loot|sweat|mining/i.test(text);
        if (isEntropia) {
            return `site:${ENTROPIA_DOMAINS.join(' OR site:')} ${text}`;
        }
        return text; // Fallback to general web
    };

    // --- FILE REGISTRY LOGIC ---
    upload.onchange = (e) => {
        const files = Array.from(e.target.files);
        if(files.length > 0) registry.innerHTML = "";
        
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const content = ev.target.result;
                fileStore.push({ name: file.name, data: content });
                createFileUI(file.name, content);
            };
            reader.readAsText(file);
        });
    };

    function createFileUI(name, content) {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
            <div class="file-summary">
                <span>📄 ${name}</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="file-content">${content.substring(0, 1000)}...</div>
        `;
        item.onclick = () => item.classList.toggle('open');
        registry.appendChild(item);
    }

    // --- MODE SWITCHER ---
    modeBtns.forEach(btn => {
        btn.onclick = () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
        };
    });

    // --- CHAT EXECUTION ---
    async function processQuery() {
        const val = input.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        input.value = "";

        const finalQuery = getSearchQuery(val);
        console.log("Routing via:", finalQuery);

        // Simulated Thought Response
        const thought = document.createElement('div');
        thought.className = 'thought-process';
        stage.appendChild(thought);

        if (currentMode === 'pro') {
            thought.innerText = "Analyzing Entropia historical data + cross-referencing file registry...";
            await new Promise(r => setTimeout(r, 1200));
        } else if (currentMode === 'thinking') {
            thought.innerText = "Parsing query context...";
            await new Promise(r => setTimeout(r, 600));
        }

        const response = (finalQuery.includes('site:')) 
            ? `[ENTROPIA SECURE MODE] Scanning ${ENTROPIA_DOMAINS.length} sources for "${val}". Based on registry data and wiki patterns, the most efficient ROI path is...`
            : `[GENERAL MODE] Logic fallback engaged. Results for: ${val}`;

        addMsg(response, 'ai');
        input.focus();
    }

    function addMsg(text, sender) {
        const b = document.createElement('div');
        b.className = `bubble ${sender}`;
        b.innerText = text;
        stage.appendChild(b);
        stage.scrollTop = stage.scrollHeight;
    }

    input.onkeydown = (e) => e.key === 'Enter' && processQuery();
    document.getElementById('send-trigger').onclick = processQuery;

</script>
</body>
</html>
