<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelb8 OMEGA | Hermes Roleplay</title>
    <style>
        :root { 
            --p8-accent: #f472b6; 
            --p8-bg: #09090b; 
            --bubble-ai: #18181b; 
            --rp-glow: linear-gradient(45deg, #ff00cc, #3333ff, #00d4ff, #ff00cc);
        }
        
        body { background: var(--p8-bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #stage { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; align-items: center; scroll-behavior: smooth; }
        .bubble { max-width: 600px; width: 100%; padding: 20px; border-radius: 12px; line-height: 1.6; animation: fadeIn 0.4s ease; background: var(--bubble-ai); border: 1px solid #27272a; box-sizing: border-box; }
        .user-input-zone { width: 100%; max-width: 600px; display: flex; gap: 10px; padding: 20px; background: #000; border-top: 1px solid #27272a; margin: 0 auto; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input { flex: 1; background: #18181b; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--p8-accent); color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status-bar { font-size: 0.7rem; color: #666; padding: 5px 20px; background: #000; text-align: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div id="stage">
    <div style="font-size: 3rem; margin-bottom: 20px; animation: fadeIn 1s ease;">🎭</div>
    <div class="bubble" id="initial-load">
        <strong>OMEGA:</strong> Initializing Hermes 3 (3B) Neural Core...<br>
        <span id="progress-text">Waiting for WebGPU...</span>
    </div>
</div>

<div id="status-bar">System: Standby</div>

<div class="user-input-zone">
    <input type="text" id="user-text" placeholder="Establishing link..." disabled autocomplete="off">
    <button id="send-btn" disabled>Syncing...</button>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const stage = document.getElementById('stage');
    const userText = document.getElementById('user-text');
    const sendBtn = document.getElementById('send-btn');
    const statusBar = document.getElementById('status-bar');
    const progressText = document.getElementById('progress-text');

    let engine = null;
    const modelId = "Hermes-3-Llama-3.2-3B-q4f32_1-MLC"; // f32 for maximum PC compatibility
    
    // Core Roleplay instruction: Allows the AI to evolve based on the chat history alone.
    let systemPrompt = "You are a versatile and immersive roleplay partner. You do not lecture the user. You adapt your personality, tone, and character growth based on the evolving conversation. Stay in character and be descriptive.";

    async function init() {
        try {
            engine = await webllm.CreateMLCEngine(modelId, {
                initProgressCallback: (p) => {
                    progressText.innerText = `${Math.round(p.progress * 100)}% - ${p.text}`;
                    statusBar.innerText = `Loading: ${Math.round(p.progress * 100)}%`;
                }
            });
            
            // Clean up the stage for the story
            document.getElementById('initial-load').remove();
            addAiBubble("Neural link established. Hermes 3 (3B) is online. Start your story.");
            
            // Enable controls
            userText.disabled = false;
            sendBtn.disabled = false;
            userText.placeholder = "Type your story...";
            sendBtn.innerText = "Send";
            statusBar.innerText = "System: Active | Hermes 3 (3B)";
            
            sendBtn.onclick = runInference;
            userText.onkeypress = (e) => { if(e.key === 'Enter') runInference(); };

        } catch (e) {
            console.error(e);
            progressText.innerHTML = "<span style='color:#ff757d'>Initialization Failed. Ensure your browser supports WebGPU and you are running via a local server.</span>";
            statusBar.innerText = "System: Error";
        }
    }

    function addAiBubble(text) {
        const div = document.createElement('div');
        div.className = "bubble";
        div.innerHTML = `<strong>AI:</strong> ${text}`;
        stage.appendChild(div);
        stage.scrollTo({ top: stage.scrollHeight, behavior: 'smooth' });
    }

    async function runInference() {
        const text = userText.value.trim();
        if(!text || !engine) return;
        userText.value = "";
        
        // Disable input during generation
        userText.disabled = true;
        sendBtn.disabled = true;

        const uDiv = document.createElement('div');
        uDiv.className = "bubble"; uDiv.style.textAlign = "right"; uDiv.style.border = "none"; uDiv.innerHTML = `<span style="color:var(--p8-accent)">You:</span> ${text}`;
        stage.appendChild(uDiv);

        const aiDiv = document.createElement('div');
        aiDiv.className = "bubble"; aiDiv.innerHTML = "<strong>AI:</strong> ...";
        stage.appendChild(aiDiv);
        stage.scrollTo({ top: stage.scrollHeight, behavior: 'smooth' });

        try {
            const messages = [
                { role: "system", content: systemPrompt },
                { role: "user", content: text }
            ];

            const chunks = await engine.chat.completions.create({ messages, stream: true });
            let fullReply = "";
            
            for await (const chunk of chunks) {
                fullReply += chunk.choices[0]?.delta?.content || "";
                aiDiv.innerHTML = `<strong>AI:</strong> ${fullReply}`;
                stage.scrollTop = stage.scrollHeight;
            }
        } catch (err) {
            console.error("Inference Error:", err);
            aiDiv.innerHTML = "<strong>ERROR:</strong> Generation stalled. Check console.";
        } finally {
            userText.disabled = false;
            sendBtn.disabled = false;
            userText.focus();
        }
    }

    function addAiBubble(text) {
        const div = document.createElement('div');
        div.className = "bubble";
        div.innerHTML = `<strong>AI:</strong> ${text}`;
        stage.appendChild(div);
        stage.scrollTo({ top: stage.scrollHeight, behavior: 'smooth' });
    }

    init();
</script>
</body>
</html>
