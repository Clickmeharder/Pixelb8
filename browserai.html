<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelb8 OMEGA | Pixelbot Core</title>
    <style>
        :root { --p8-accent: #f472b6; --p8-bg: #09090b; --bubble-ai: #18181b; --text-dim: #666; }
        body { background: var(--p8-bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Layout */
        #stage { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .user-input-zone { width: 100%; max-width: 600px; display: flex; gap: 10px; padding: 20px; background: #000; border-top: 1px solid #27272a; margin: 0 auto; }
        
        /* Chat Elements */
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; border: 1px solid #27272a; position: relative; animation: fadeIn 0.3s ease; }
        .ai-bubble { align-self: flex-start; background: var(--bubble-ai); border-bottom-left-radius: 4px; padding-left: 55px; }
        .user-bubble { align-self: flex-end; background: #27272a; border-bottom-right-radius: 4px; border: none; }
        
        /* Pixelbot Canvas Avatar */
        .bot-avatar { position: absolute; left: 8px; top: 8px; width: 40px; height: 40px; background: #000; border-radius: 8px; border: 1px solid var(--p8-accent); box-shadow: 0 0 10px rgba(244, 114, 182, 0.3); }
        
        input { flex: 1; background: #18181b; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 20px; outline: none; }
        button { background: var(--p8-accent); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        #status-bar { font-size: 0.7rem; color: #444; text-align: center; padding: 5px; background: #000; border-top: 1px solid #111; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="stage">
    <div class="bubble ai-bubble" id="initial-load">
        <canvas class="bot-avatar" id="loader-bot"></canvas>
        <strong>SYSTEM:</strong> Pixelbot Syncing... <span id="progress-text">0%</span>
    </div>
</div>

<div class="user-input-zone">
    <input type="text" id="user-text" placeholder="Establishing link..." disabled autocomplete="off">
    <button id="send-btn" disabled>Sync</button>
</div>

<div id="status-bar">Neural Core: Standby | Pixelb8 OMEGA</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const stage = document.getElementById('stage');
    const userText = document.getElementById('user-text');
    const sendBtn = document.getElementById('send-btn');
    const progressText = document.getElementById('progress-text');
    let engine = null;

    // --- PIXELBOT CANVAS DRAWING ENGINE ---
    class Pixelbot {
        constructor(canvasId) {
            this.canvas = document.getElementById(canvasId);
            this.ctx = this.canvas.getContext('2d');
            this.canvas.width = 80; // Render at 2x for sharpness
            this.canvas.height = 80;
            this.frame = 0;
            this.animate();
        }

        draw() {
            const ctx = this.ctx;
            const t = this.frame * 0.1;
            ctx.clearRect(0, 0, 80, 80);
            
            const bounce = Math.sin(t) * 2;
            const glow = (Math.sin(t * 0.5) + 1) * 5;

            // Glow Effect
            ctx.shadowBlur = glow;
            ctx.shadowColor = "#f472b6";

            // Body (Blue)
            ctx.fillStyle = "#3b82f6";
            ctx.fillRect(25, 40 + bounce, 30, 25); 
            
            // Head (Blue)
            ctx.fillRect(20, 15 + bounce, 40, 25);

            // Eyes (Orange Glow)
            ctx.fillStyle = "#fb923c";
            ctx.fillRect(30, 25 + bounce, 6, 6);
            ctx.fillRect(44, 25 + bounce, 6, 6);

            // Antennas
            ctx.strokeStyle = "#fb923c";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(30, 15 + bounce); ctx.lineTo(25, 5 + bounce);
            ctx.moveTo(50, 15 + bounce); ctx.lineTo(55, 5 + bounce);
            ctx.stroke();

            // Arms
            ctx.fillStyle = "#2563eb";
            ctx.fillRect(15, 45 + bounce, 10, 15); // Left
            ctx.fillRect(55, 45 + bounce, 10, 15); // Right
        }

        animate() {
            this.frame++;
            this.draw();
            requestAnimationFrame(() => this.animate());
        }
    }

    // --- AI LOGIC ---
    const modelId = "Llama-3.2-3B-Instruct-q4f32_1-MLC";
    const systemPrompt = "You are Pixelbot, a helpful AI for Entropia Universe players. You provide PED calculations, coding help, and game tips. Keep it short.";

    async function init() {
        new Pixelbot('loader-bot');
        try {
            engine = await webllm.CreateMLCEngine(modelId, { 
                initProgressCallback: (p) => {
                    progressText.innerText = `${Math.round(p.progress * 100)}%`;
                    if (p.progress === 1) document.getElementById('initial-load')?.remove();
                }
            });
            userText.disabled = false; sendBtn.disabled = false;
            userText.placeholder = "Talk to Pixelbot...";
            sendBtn.onclick = runInference;
        } catch (e) { console.error("WebGPU Error", e); }
    }
//
    async function runInference() {
        const text = userText.value.trim();
        if(!text || !engine) return;
        userText.value = "";
        
        addMessage(text, 'user');
        
        const messages = [{ role: "system", content: systemPrompt }, { role: "user", content: text }];
        const reply = await engine.chat.completions.create({ messages, temperature: 0.7 });
        
        addMessage(reply.choices[0].message.content, 'ai');
    }

    function addMessage(text, side) {
        const div = document.createElement('div');
        div.className = `bubble ${side}-bubble`;
        
        if(side === 'ai') {
            const canvasId = `bot-${Date.now()}`;
            div.innerHTML = `<canvas class="bot-avatar" id="${canvasId}"></canvas><strong>Pixelbot:</strong><br>${text}`;
            stage.appendChild(div);
            new Pixelbot(canvasId);
        } else {
            div.innerText = text;
            stage.appendChild(div);
        }
        stage.scrollTop = stage.scrollHeight;
    }

    window.onload = init;
</script>
</body>
</html>
